<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Matchups</title>
<link rel="preconnect" href="https://hcwolbvmffkmjcxsumwn.supabase.co" crossorigin />
<style>
  /* Teal-on-dark-purple theme (matches the Same-Team Prop Checker). Scoped to .wrap. */
  .wrap{--brand:#06b6d4;--brand-dark:#0891b2;--glow:rgba(6,182,212,.28);--accent-soft:rgba(6,182,212,.14);
    --card:#231536;--inset:#1d1230;--surface:#2d1b45;--surface-2:#33204d;
    --ink:#e8e0f0;--muted:#a89bbe;--muted-2:#7a6b8f;--line:rgba(255,255,255,.10);--line-2:rgba(255,255,255,.06);
    --good:#6ee7b7;--good-bg:rgba(52,211,153,.16);--warn:#fcd34d;--warn-bg:rgba(251,191,36,.14);--away:#a5b4fc;--away-bg:rgba(129,140,248,.18);
    --radius:14px;--shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.28);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    max-width:1180px;margin:0 auto;padding:0 12px 48px;background:transparent;color:var(--ink);font-family:var(--font);-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;}
  .wrap,.wrap *,.wrap *::before,.wrap *::after{box-sizing:border-box;}
  .hdr{position:sticky;top:0;z-index:30;}
  .bar{background:rgba(26,16,40,.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--line);margin:0 -12px;padding:10px 12px;border-radius:0 0 14px 14px;}
  .bar-top{display:flex;align-items:center;gap:8px;}
  .title{font-size:15px;font-weight:700;color:var(--ink);margin-right:auto;display:flex;align-items:baseline;gap:8px;}
  .title .count{font-size:11px;font-weight:700;color:var(--brand);background:var(--accent-soft);padding:2px 7px;border-radius:999px;}
  .field{background:var(--surface);border:1px solid var(--line);border-radius:9px;font-family:var(--font);font-size:13px;color:var(--ink);padding:8px 10px;height:36px;}
  .field::placeholder{color:var(--muted-2);}
  .field:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px var(--glow);}
  .search{flex:0 1 230px;max-width:230px;min-width:0;margin-right:auto;}
  .icon-btn{height:36px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink);font-size:13px;font-weight:600;padding:0 12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .icon-btn:hover{border-color:var(--brand);color:var(--brand);}
  .badge-dot{background:var(--brand);color:#06222a;border-radius:999px;font-size:10px;min-width:16px;height:16px;padding:0 4px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;}
  .bar-row2{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;}
  .seg{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:0 10px;height:36px;}
  .seg label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .seg select{background:transparent;border:none;color:var(--ink);font-weight:600;font-size:13px;height:34px;max-width:240px;}
  .seg select option{color:var(--ink);background:var(--surface);}
  .hint{margin-top:7px;font-size:11px;font-weight:600;color:var(--muted);}
  .filters{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:10px;padding:10px 12px;display:none;}
  .filters.open{display:block;}
  .filters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px 10px;}
  .fg{display:flex;flex-direction:column;gap:3px;}
  .fg>label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  .fg select{background:var(--surface);border:1px solid var(--line);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--ink);padding:8px 9px;height:36px;}
  .fg select option{background:var(--surface);color:var(--ink);}
  .ms{position:relative;}
  .ms-btn{width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--ink);padding:8px 9px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .ms-btn::after{content:"\25BE";color:var(--muted);font-size:11px;}
  .ms-btn:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px var(--glow);}
  .ms-pop{position:absolute;top:calc(100% + 4px);left:0;min-width:100%;max-height:240px;overflow:auto;background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.45);z-index:40;padding:4px;}
  .ms-opt{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;font-size:13px;color:var(--ink);cursor:pointer;white-space:nowrap;}
  .ms-opt:hover{background:var(--inset);}
  .ms-opt input{width:15px;height:15px;accent-color:var(--brand);margin:0;flex:0 0 auto;}
  .ms-all{display:block;width:100%;text-align:left;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--brand);font-family:var(--font);font-size:11.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;padding:6px 8px;margin-bottom:4px;cursor:pointer;}
  .ms-all:hover{background:var(--inset);}
  .fg select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px var(--glow);}
  .filters-foot{display:flex;justify-content:flex-end;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-2);}
  .clear-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer;}
  .clear-btn:hover{border-color:var(--brand);color:var(--brand);}
  .grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px;}
  @media (min-width:680px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media (min-width:1020px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;font-variant-numeric:tabular-nums;content-visibility:auto;contain-intrinsic-size:auto 220px;}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--edge-c,var(--line));}
  .c-head{display:flex;align-items:flex-start;gap:10px;padding:13px 14px 0;cursor:pointer;}
  .c-main{flex:1;min-width:0;}
  .c-name{font-size:15px;font-weight:700;line-height:1.2;color:var(--ink);}
  .c-sub{margin-top:4px;font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .tag{font-weight:700;color:var(--ink);background:rgba(255,255,255,.07);border-radius:5px;padding:1px 5px;font-size:10.5px;letter-spacing:.3px;}
  .tag.home{background:var(--good-bg);color:var(--good);} .tag.away{background:var(--away-bg);color:var(--away);}
  .tag.gm{background:var(--inset);color:var(--muted);}
  .np-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12.5px;border-top:1px solid var(--line-2);}
  .np-row:first-child{border-top:none;}
  .np-nm{font-weight:700;}
  .np-why{color:var(--muted);font-size:11.5px;margin-left:auto;}
  .mtl{margin:10px 14px 0;font-size:12.5px;font-weight:600;color:var(--ink);}
  .mtl b{font-weight:800;color:var(--ink);} .mtl .op{color:var(--muted);}
  .odds{margin:11px 14px 0;display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .odds .o{padding:7px 6px 6px;text-align:center;border-right:1px solid var(--line);}
  .odds .o:last-child{border-right:none;}
  .odds .o .k{font-size:8.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted-2);}
  .odds .o .v{font-size:13px;font-weight:700;margin-top:2px;color:var(--ink);}
  .expand-row{display:flex;align-items:center;justify-content:space-between;margin:11px 14px 13px;}
  .status-line{font-size:11.5px;font-weight:700;color:var(--muted);}
  .status-line .conf{color:var(--good);} .status-line .proj{color:var(--warn);}
  .exp-btn{background:none;border:1px solid var(--line);color:var(--brand);font-weight:700;font-size:12px;border-radius:8px;padding:6px 12px;cursor:pointer;display:inline-flex;gap:6px;align-items:center;}
  .exp-btn:hover{border-color:var(--brand);}
  .exp-btn .car{transition:transform .15s ease;}
  @media (prefers-reduced-motion:reduce){.exp-btn .car{transition:none;}}
  .card.open .exp-btn .car{transform:rotate(180deg);}
  .detail{display:none;border-top:1px solid var(--line);background:var(--inset);padding:6px 14px 14px;}
  .card.open .detail{display:block;}
  .lp-row{cursor:pointer;}
  .lp-row .car-sm{display:inline-block;color:var(--muted-2);font-size:9px;transition:transform .12s ease;}
  .lp-row.open .car-sm{transform:rotate(90deg);}
  .lp-sub td{color:var(--muted);font-weight:500;}
  .lp-sub td:first-child{padding-left:18px;color:var(--muted-2);}
  @media (prefers-reduced-motion:reduce){.lp-row .car-sm{transition:none;}}
  .panel{margin-top:12px;}
  .panel-h{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--brand);margin:0 0 6px;}
  .mini-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table.mini{width:100%;border-collapse:collapse;font-size:11.5px;}
  table.mini th,table.mini td{padding:4px 6px;text-align:right;border-bottom:1px solid var(--line-2);white-space:nowrap;color:var(--ink);}
  table.mini th:first-child,table.mini td:first-child{text-align:left;color:var(--muted);font-weight:600;position:sticky;left:0;background:var(--inset);}
  table.mini thead th{color:var(--muted-2);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line);}
  table.mini td{font-weight:600;}
  .note-sm{font-size:10px;color:var(--muted-2);margin-top:5px;line-height:1.3;}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:3px 14px;font-size:11.5px;}
  .kv .k{color:var(--muted);} .kv .v{font-weight:600;text-align:right;color:var(--ink);}
  .wx{font-size:11px;color:var(--ink);display:flex;flex-direction:column;gap:2px;margin-top:6px;}
  .state{text-align:center;padding:60px 20px;color:var(--muted);}
  .state h3{color:var(--ink);margin:0 0 6px;font-size:16px;}
  .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;margin:0 auto 14px;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){.spinner{animation-duration:1.6s;}}
  .sentinel{height:1px;}
  .loadpill{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:var(--surface);color:var(--ink);border:1px solid var(--line);font-size:12px;font-weight:700;padding:8px 14px;border-radius:999px;box-shadow:0 4px 14px rgba(0,0,0,.4);z-index:50;}
  /* #5: tighter vertical rhythm on desktop/tablet only â€” mobile (<680px) keeps its spacing */
  @media (min-width:680px){
    .field,.fg select,.fg input,.ms-btn{height:32px;padding-top:5px;padding-bottom:5px;}
    .icon-btn,.seg{height:32px;}
    .seg select{height:30px;}
    .bar{padding-top:8px;padding-bottom:8px;display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;}
    .bar-top,.bar-row2{display:contents;}                                  /* dissolve the row boxes into one flex line */
    .title{order:1;} .search{order:2;margin-right:0;} .seg{order:3;}
    #filterToggle{order:90;margin-left:auto;}
    .bar-row2{margin-top:6px;}
    .filters{margin-top:8px;padding-top:8px;padding-bottom:8px;}
    .filters-grid{gap:6px 10px;}
    .grid{gap:8px;}
    .c-head{padding-top:10px;}
    .c-sub{margin-top:3px;}
    .cgrid{margin-top:8px;gap:5px;}
    .cell{padding-top:5px;padding-bottom:4px;}
    .expand-row{margin-top:8px;margin-bottom:9px;}
  }

  /* ---- Mobile: compact the sticky header so it doesn't eat the viewport ---- */
  @media (max-width:560px){
    .bar{padding:7px 10px;}
    .bar-row2{margin-top:6px;gap:6px;}
    .title{font-size:13.5px;gap:6px;}
    .title .count{font-size:10px;padding:1px 6px;}
    /* shrink every fixed-height control (36px -> 30px) and tighten type */
    .field,.icon-btn,.seg,.tg{height:30px;font-size:12px;}
    .field{padding:6px 8px;}
    .icon-btn{padding:0 9px;font-size:12px;}
    .seg{padding:0 7px;gap:4px;}
    .seg select,.seg .seg-lab{font-size:11.5px;}
    .seg-lab,.tg .tg-lab{font-size:9px;letter-spacing:.3px;}
    .tg{padding:2px;}
    .tg button{padding:4px 8px;font-size:11px;}
    /* let the control groups share rows instead of each taking a full line */
    .bar-break{display:none !important;}
    .filters{padding:8px 10px;margin-top:8px;}
    .fg select,.fg input,.ms-btn{height:32px;font-size:12.5px;}
  }
</style>

<body>
  <div class="wrap">
    <div class="hdr">
    <div class="bar">
      <div class="bar-top">
        <div class="title">Matchups <span class="count" id="count">â€”</span></div>
      </div>
      <div class="bar-top" style="margin-top:8px;">
        <input class="field search" id="search" type="search" placeholder="Search team or playerâ€¦" autocomplete="off" aria-label="Search" />
        <button class="icon-btn" id="filterToggle" aria-expanded="false">Filters <span class="badge-dot" id="filterCount" hidden>0</span></button>
      </div>
      <div class="bar-row2">
        <div class="seg"><label for="splitSel">Stats</label>
          <select id="splitSel">
            <option value="Full Season|All">Season Â· all games</option>
            <option value="Full Season|loc">Season Â· game location</option>
            <option value="Last 30 Days|All">Last 30 Days Â· all games</option>
            <option value="Last 30 Days|loc">Last 30 Days Â· game location</option>
          </select>
        </div>
      </div>
    </div>

    <div class="filters" id="filters">
      <div class="filters-grid">
        <div class="fg"><label>Team</label><div class="ms" data-ms="team"></div></div>

        <div class="fg"><label>Side</label><div class="ms" data-ms="side"></div></div>

      <div class="filters-foot"><button class="clear-btn" id="clearFilters">Clear all</button></div>
    </div>
    </div>

    <div id="content"><div class="state"><div class="spinner"></div><p>Loadingâ€¦</p></div></div>
    <div class="grid" id="grid" hidden></div>
    <div class="sentinel" id="sentinel"></div>
    <div class="loadpill" id="loadpill" hidden></div>
  </div>

<script>
/* Joins four Supabase tables on Matchup ID:
   BaseballMatchupsGame / ...Batters / ...Starters / ...Bullpen
   Each card = one team's lineup + the OPPOSING starter & bullpen it faces. */
const SUPABASE_URL = "https://hcwolbvmffkmjcxsumwn.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhjd29sYnZtZmZrbWpjeHN1bXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDAzNDQzMTIsImV4cCI6MjA1NTkyMDMxMn0.tM4RwXZpZM6ZHuFFMhWcKYLT3E4NA6Ig90CHw7QtJf0";
const CACHE_TTL = 3 * 60 * 1000;
const BATCH = 12;
const PAGE_SIZE = 1000;
const MAX_PARALLEL = 6;

const TEAM_NAME_MAP = {'Atlanta Dream':'ATL','Chicago Sky':'CHI','Connecticut Sun':'CON','Dallas Wings':'DAL','Golden State Valkyries':'GSV','Indiana Fever':'IND','Los Angeles Sparks':'LAS','Las Vegas Aces':'LVA','Minnesota Lynx':'MIN','New York Liberty':'NYL','Phoenix Mercury':'PHX','Portland Fire':'POR','Seattle Storm':'SEA','Toronto Tempo':'TOR','Washington Mystics':'WSH'};

/* WNBA card stats â€” [display, blobKey]. Avg on the face; Median/High/Low in the expand rows. */
const WNBA_STATS = [['MIN','MIN'],['PTS','PTS'],['REB','REB'],['AST','AST'],['3PM','FG3M'],['STL','STL'],['BLK','BLK'],['TOV','TOV'],['P+R','P+R'],['P+A','P+A'],['R+A','R+A'],['PRA','P+R+A'],['B+S','B+S']];
const fmt1 = v=>{const n=parseFloat(v);return isNaN(n)?'â€“':(n%1===0?n.toFixed(0):n.toFixed(1));};

/* ---------- State ---------- */
let CARDS = [], VIEW = [], rendered = 0;
const GMAP = new Map();
let split = 'Full Season|All';   // window + location
function newFilters(){return {search:'',team:new Set(),game:new Set(),side:new Set()};}
let filters = newFilters();
const els = {content:document.getElementById('content'),grid:document.getElementById('grid'),count:document.getElementById('count'),search:document.getElementById('search'),filters:document.getElementById('filters'),filterToggle:document.getElementById('filterToggle'),filterCount:document.getElementById('filterCount'),clearFilters:document.getElementById('clearFilters'),splitSel:document.getElementById('splitSel'),sentinel:document.getElementById('sentinel'),loadpill:document.getElementById('loadpill')};

/* ---------- Helpers ---------- */
const num = v=>{const n=parseFloat(v);return isNaN(n)?null:n;};
const raw = v=>{if(v==null)return 'â€“';const s=String(v).trim();return s===''?'â€“':s;};
const has = v=>v!=null&&String(v).trim()!==''&&String(v).trim()!=='-';
const fmt2 = v=>{const n=parseFloat(v);return isNaN(n)?'â€“':n.toFixed(2);};
const fmtAvg3 = v=>{const n=parseFloat(v);if(isNaN(n))return 'â€“';const sign=n<0?'-':'';const t=(Math.trunc(Math.abs(n)*1000)/1000).toFixed(3);return (sign+t).replace(/^(-?)0\./,'$1.');};
const fmtIP = v=>{if(v==null)return 'â€“';const s=String(v).trim();if(s===''||s==='-')return 'â€“';return s.includes('.')?s:s+'.0';};
const fmtPark = v=>{if(v==null)return 'â€“';const s=String(v).trim();if(s===''||s==='-')return 'â€“';return s.replace(/\((\d+)\)/g,' (#$1)');};
const fmtType = (t,v)=> t==='rate'?fmtAvg3(v) : t==='era'?fmt2(v) : t==='ip'?fmtIP(v) : t==='park'?fmtPark(v) : raw(v);
const esc = s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const CODE_ALIAS={PHO:'PHX',LOS:'LAS',WAS:'WSH',PDX:'POR'};   // tolerate feed variants
const canonTeam=c=>{const u=String(c||'').trim().toUpperCase();return CODE_ALIAS[u]||u;};
const abbrTeam=v=>{if(!v)return '';const s=String(v).trim();return TEAM_NAME_MAP[s]||canonTeam(s);};
function etTz(){const d=new Date(),y=d.getFullYear();const m1=new Date(y,2,1),n1=new Date(y,10,1);const dstStart=new Date(y,2,1+((7-m1.getDay())%7)+7);const dstEnd=new Date(y,10,1+((7-n1.getDay())%7));return (d>=dstStart&&d<dstEnd)?'EDT':'EST';}
const ET_TZ = etTz();
const fmtTime = v=>!v?'':String(v).replace(/\b(EST|EDT)\b/g,ET_TZ);
const stripHand = v=>String(v||'').replace(/\s*\([LRS]\)\s*$/i,'').trim();
const handOf = v=>{const m=String(v||'').match(/\(([LRS])\)\s*$/i);return m?m[1].toUpperCase():'';};
const readCols = (row,fn,set)=>{const o={};for(const t of set)o[t[1]]=row[fn(t[1])];return o;};

/* ---------- Data ---------- */
async function fetchPage(table,offset,extra,limit){const lim=limit||PAGE_SIZE;const url=`${SUPABASE_URL}/rest/v1/${table}?select=*`;const res=await fetch(url,{headers:{apikey:ANON_KEY,Authorization:"Bearer "+ANON_KEY,Accept:"application/json",'Range-Unit':'items',Range:`${offset}-${offset+lim-1}`,...extra}});if(!res.ok){const e=new Error(`Supabase ${res.status}`);e.status=res.status;throw e;}return {rows:await res.json(),contentRange:res.headers.get('content-range')};}
async function fetchTable(table){
  const first=await fetchPage(table,0,{Prefer:'count=exact'},PAGE_SIZE);
  const ps=first.rows.length||PAGE_SIZE;
  const m=/\/(\d+)$/.exec(first.contentRange||'');
  const total=m?parseInt(m[1],10):(first.rows.length<PAGE_SIZE?first.rows.length:null);
  let out=first.rows.slice();
  if(ps===0||(total!=null&&out.length>=total)||(total==null&&first.rows.length<PAGE_SIZE))return {rows:out, total};
  if(total!=null){
    const offsets=[];for(let o=ps;o<total;o+=ps)offsets.push(o);
    const results=new Array(offsets.length);let i=0;
    await Promise.all(Array.from({length:Math.min(MAX_PARALLEL,offsets.length)},async()=>{while(i<offsets.length){const idx=i++;const r=await fetchPage(table,offsets[idx],{},ps);results[idx]=r.rows;}}));
    for(const r of results) out=out.concat(r);
  }else{
    let offset=ps;while(true){const r=await fetchPage(table,offset,{},ps);out=out.concat(r.rows);if(r.rows.length<ps)break;offset+=ps;}
  }
  return {rows:out, total};
}

/* count-only probe used to confirm a table isn't mid-upload */
async function countTable(table){try{const r=await fetchPage(table,0,{Prefer:'count=exact'},1);const m=/\/(\d+)$/.exec(r.contentRange||'');return m?parseInt(m[1],10):null;}catch(e){return null;}}
/* Load one table, retrying if we catch it mid-upload (count unstable / rows != count). */
async function fetchTableVerified(table){
  const TRIES=4; let last=[];
  for(let t=0;t<TRIES;t++){
    const {rows,total}=await fetchTable(table);
    last=rows;
    const after=await countTable(table);
    if(total!=null && rows.length===total && after===total) return {rows, complete:true};
    await new Promise(r=>setTimeout(r, 400*(t+1)));
  }
  return {rows:last, complete:false};
}

/* ---------- Build cards ---------- */
function parseMatchup(s){
  const str=String(s||'');
  const gm=str.match(/\s*\(Game\s*\d+\)\s*$/);   // trailing doubleheader tag, e.g. " (Game 1)"
  const gameTag=gm?gm[0].trim():'';
  const clean=gm?str.slice(0,gm.index):str;          // team names without the tag so abbrTeam matches
  const sep=clean.includes(' @ ')?' @ ':(clean.includes(' vs ')?' vs ':null);
  if(!sep)return {awayFull:'',homeFull:'',gameTag:gameTag};
  const [a,h]=clean.split(sep).map(x=>x.split(',')[0].trim());
  return {awayFull:a,homeFull:h,gameTag:gameTag};
}
function lineupStatusOf(lineup){
  const blob=(lineup||[]).map(p=>String(p.status||'')).join(' ').toLowerCase();
  if(blob.includes('conf')) return 'Confirmed';
  if(blob.includes('proj')||blob.includes('expect')) return 'Projected';
  return 'Projected';
}
function codeOf(v){const s=String(v||'').trim();return TEAM_NAME_MAP[s]||canonTeam(s);}
const CODE_TO_NAME={}; for(const [n,c] of Object.entries(TEAM_NAME_MAP)) CODE_TO_NAME[c]=n;
function parseJSON(x){try{return JSON.parse(x);}catch(e){return null;}}

/* game odds keyed by sorted team-pair: {spread:{CODE:line}, ml:{CODE:odds}, total} */
function buildOdds(rows){
  const byGame={};
  for(const r of rows||[]){
    const m=r['Game Matchup']; if(!m) continue;
    const parts=String(m).split('@').map(x=>codeOf(x.trim())); if(parts.length!==2) continue;
    const key=parts.slice().sort().join('|');
    const g=byGame[key]||(byGame[key]={spread:{},ml:{},total:null});
    const prop=String(r['Game Prop Type']||'').toLowerCase(), label=r['Game Label'], line=num(r['Game Line']), om=r['Game Median Odds'];
    if(prop==='spread'){const c=codeOf(label); if(c&&line!=null&&g.spread[c]==null)g.spread[c]=line;}
    else if(prop==='total'){if(/over/i.test(String(label))&&line!=null&&g.total==null)g.total=line;}
    else if(prop==='moneyline'){const c=codeOf(label); if(c&&g.ml[c]==null&&om!=null)g.ml[c]=om;}
  }
  return byGame;
}

function buildCards(gameRows,playerRows,defRows,oddsRows){
  const oddsByGame=buildOdds(oddsRows);
  const playersByCard={}, defByCard={};
  for(const pr of playerRows||[]){const k=pr['Matchup ID']+'|'+pr['Team']; (playersByCard[k]=playersByCard[k]||[]).push(pr);}
  for(const d of defRows||[]){const k=d['Matchup ID']+'|'+d['Team']; (defByCard[k]=defByCard[k]||[]).push(d);}

  const cards=[]; GMAP.clear();
  for(const g of gameRows||[]){
    const team=codeOf(g['Team']), opp=codeOf(g['Opponent']); if(!team||!opp) continue;
    const isHome=String(g['Home/Away'])==='Home';
    const key=g['Matchup ID']+'|'+g['Team'];
    const awayCode=isHome?opp:team, homeCode=isHome?team:opp;
    const matchupAb=`${awayCode} @ ${homeCode}`;
    const pairKey=[team,opp].sort().join('|');
    const odds=oddsByGame[pairKey]||{spread:{},ml:{},total:null};

    const players=(playersByCard[key]||[]).map(pr=>({name:pr['Player'],pos:pr['Position'],role:pr['Role'],injury:pr['Injury'],status:pr['Status'],tag:pr['Tag'],blob:parseJSON(pr['Stats JSON'])||{}}));
    const defense={};
    for(const d of (defByCard[key]||[])) defense[d['Time Period']+'|'+d['Stat Split']]={games:num(d['Games'])||0,data:parseJSON(d['Defense JSON'])||{allowed:{},ranks:{}}};

    const starters=players.filter(p=>p.role==='Starter'), bench=players.filter(p=>p.role==='Bench'), notPlaying=players.filter(p=>p.role==='Not Playing');
    const card={key,id:String(g['Matchup ID']),team,teamFull:CODE_TO_NAME[team]||team,opp,oppFull:CODE_TO_NAME[opp]||opp,
      isHome,loc:isHome?'Home':'Away',gametime:fmtTime(g['Game Time']),matchupAb,
      spread:odds.spread[team],total:odds.total,ml:odds.ml[team],
      oppPace:g['Opp Pace'],oppPaceRank:g['Opp Pace Rank'],
      players,starters,bench,notPlaying,defense,
      status: starters.length?'Confirmed':'Projected',
      game:{matchupAb},
      _q:`${team} ${CODE_TO_NAME[team]||''} ${opp} ${matchupAb} ${players.map(p=>p.name).join(' ')}`.toLowerCase()};
    cards.push(card); GMAP.set(key,card);
  }
  const gmMin=g=>{const m=String(g.gametime||'').match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);if(!m)return Infinity;let h=parseInt(m[1],10)%12;if(/pm/i.test(m[3]))h+=12;return h*60+parseInt(m[2],10);};
  cards.sort((a,b)=>{const ta=gmMin(a),tb=gmMin(b);if(ta!==tb)return ta-tb;if(a.matchupAb!==b.matchupAb)return a.matchupAb.localeCompare(b.matchupAb);return a.isHome===b.isHome?0:(a.isHome?1:-1);});
  return cards;
}

/* variant getter â€” resolve a player's stat cell for the selected window+location (role already baked into the blob) */
function getCell(blob,cardLoc){
  if(!blob) return null;
  const [period,locMode]=split.split('|');
  const pk=period==='Full Season'?'FS':'L30';
  const loc=locMode==='loc'?(cardLoc==='Home'?'Home':(cardLoc==='Away'?'Away':'All')):'All';
  return blob[pk+'|'+loc]||blob[pk+'|All']||null;
}

function uniq(getter){return [...new Set(CARDS.map(getter).filter(v=>v!=null&&v!==''))];}
/* ---------- Filters: in-memory persistence + multi-select (#9/#10) ---------- */
function saveFilters(){}   /* in-memory only: persist across tab switches (iframe stays mounted), reset on a real (re)load */
function loadFilters(){filters=newFilters();}
const MS = {};
function closeAllMS(){Object.values(MS).forEach(c=>{c.pop.hidden=true;c.btn.setAttribute('aria-expanded','false');});}
function buildMS(container,key){
  if(!container) return;
  container.innerHTML='';
  const btn=document.createElement('button'); btn.type='button'; btn.className='ms-btn'; btn.setAttribute('aria-expanded','false'); btn.textContent='All';
  const pop=document.createElement('div'); pop.className='ms-pop'; pop.hidden=true;
  container.appendChild(btn); container.appendChild(pop);
  const ctrl={key,btn,pop,options:[],
    syncLabel(){const ex=filters[key].size; btn.textContent = ex===0 ? 'All' : ((ctrl.options.length-ex)+' selected');},   // set = DESELECTED values
    setOptions(opts){
      const norm=opts.map(o=>Array.isArray(o)?o:[o,o]);
      ctrl.options=norm;
      const vals=new Set(norm.map(x=>String(x[0])));
      [...filters[key]].forEach(v=>{if(!vals.has(v))filters[key].delete(v);});
      pop.innerHTML='';
      const allBtn=document.createElement('button'); allBtn.type='button'; allBtn.className='ms-all';
      const syncAll=()=>{allBtn.textContent = filters[key].size===0 ? 'Deselect all' : 'Select all';};
      allBtn.addEventListener('click',e=>{
        e.stopPropagation();
        if(filters[key].size===0){ norm.forEach(x=>filters[key].add(String(x[0]))); } else { filters[key].clear(); }
        pop.querySelectorAll('input[type=checkbox]').forEach(cb=>{cb.checked=!filters[key].has(cb.value);});
        syncAll(); ctrl.syncLabel(); applyFilters();
      });
      pop.appendChild(allBtn);
      norm.forEach(([value,label])=>{
        const val=String(value);
        const row=document.createElement('label'); row.className='ms-opt';
        const cb=document.createElement('input'); cb.type='checkbox'; cb.value=val; cb.checked=!filters[key].has(val);
        cb.addEventListener('change',()=>{if(cb.checked)filters[key].delete(val);else filters[key].add(val);syncAll();ctrl.syncLabel();applyFilters();});
        const span=document.createElement('span'); span.textContent=label;
        row.appendChild(cb); row.appendChild(span); pop.appendChild(row);
      });
      syncAll(); ctrl.syncLabel();
    }
  };
  btn.addEventListener('click',e=>{e.stopPropagation();const willOpen=pop.hidden;closeAllMS();pop.hidden=!willOpen;btn.setAttribute('aria-expanded',String(willOpen));});
  pop.addEventListener('click',e=>e.stopPropagation());
  MS[key]=ctrl; return ctrl;
}
loadFilters();
buildMS(document.querySelector('.ms[data-ms="team"]'),'team');
buildMS(document.querySelector('.ms[data-ms="game"]'),'game');
buildMS(document.querySelector('.ms[data-ms="side"]'),'side');
document.addEventListener('click',closeAllMS);

function populateFilters(){
  MS.team.setOptions(uniq(c=>c.team).sort());
  MS.game.setOptions(uniq(c=>c.game.matchupAb));
  MS.side.setOptions(['Away','Home']);
  els.search.value=filters.search||'';
}
function applyFilters(){
  const s=filters.search.trim().toLowerCase();
  VIEW=CARDS.filter(c=>{
    if(s&&!c._q.includes(s))return false;
    if(filters.team.has(c.team))return false;
    if(filters.game.has(c.game.matchupAb))return false;
    if(filters.side.has(c.loc))return false;
    return true;
  });
  rendered=0;els.grid.innerHTML='';els.grid.hidden=VIEW.length===0;els.count.textContent=VIEW.length.toLocaleString();
  if(VIEW.length===0){els.content.innerHTML='<div class="state"><h3>No matching teams</h3><p>Loosen a filter to see more.</p></div>';els.content.hidden=false;}
  else{els.content.hidden=true;fillViewport();}
  const active=(filters.team.size?1:0)+(filters.game.size?1:0)+(filters.side.size?1:0);
  els.filterCount.hidden=active===0;els.filterCount.textContent=active;
}

/* ---------- Render ---------- */
function statTable(set,rows){
  const heads=set.map(([d])=>`<th>${esc(d)}</th>`).join('');
  const body=rows.map(([lbl,obj])=>{
    const tds=set.map(([,col,typ])=>`<td>${fmtType(typ,obj?obj[col]:null)}</td>`).join('');
    return `<tr><td>${esc(lbl)}</td>${tds}</tr>`;
  }).join('');
  return `<div class="mini-scroll"><table class="mini"><thead><tr><th></th>${heads}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function playerTable(players,cardLoc){
  const heads=WNBA_STATS.map(([d])=>`<th>${esc(d)}</th>`).join('');
  const rowFor=(cell,key)=>WNBA_STATS.map(([,k])=>`<td>${cell&&cell.stats&&cell.stats[k]?fmt1(cell.stats[k][key]):'â€“'}</td>`).join('');
  let body='';
  players.forEach((p,i)=>{
    const cell=getCell(p.blob,cardLoc);
    const tag=p.tag?` <span class="tag gm">${esc(p.tag)}</span>`:'';
    const lbl=`${esc(p.name)}${p.pos?' <span style="color:var(--muted-2)">'+esc(p.pos)+'</span>':''}${tag}`;
    body+=`<tr class="lp-row" data-idx="${i}"><td><span class="car-sm">&#9656;</span> ${lbl}</td>${rowFor(cell,'avg')}</tr>`;
    body+=`<tr class="lp-sub" data-idx="${i}" hidden><td>&#8627; Median</td>${rowFor(cell,'med')}</tr>`;
    body+=`<tr class="lp-sub" data-idx="${i}" hidden><td>&#8627; High</td>${rowFor(cell,'hi')}</tr>`;
    body+=`<tr class="lp-sub" data-idx="${i}" hidden><td>&#8627; Low</td>${rowFor(cell,'lo')}</tr>`;
  });
  return `<div class="mini-scroll"><table class="mini"><thead><tr><th></th>${heads}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function defenseTable(cell){
  const heads=WNBA_STATS.map(([d])=>`<th>${esc(d)}</th>`).join('');
  const aRow=WNBA_STATS.map(([,k])=>`<td>${cell&&cell.data.allowed[k]!=null?fmt1(cell.data.allowed[k]):'â€“'}</td>`).join('');
  const rRow=WNBA_STATS.map(([,k])=>{const rk=cell&&cell.data.ranks[k];return `<td>${rk!=null?('#'+rk):'â€“'}</td>`;}).join('');
  return `<div class="mini-scroll"><table class="mini"><thead><tr><th></th>${heads}</tr></thead><tbody><tr><td>Allowed/G</td>${aRow}</tr><tr><td>Rank</td>${rRow}</tr></tbody></table></div>`;
}
function teamSpread(c){ if(c.spread==null) return 'â€“'; const n=parseFloat(c.spread); if(isNaN(n)) return 'â€“'; return c.team+' '+(n>0?'+':'')+(n%1===0?n.toFixed(1):String(n)); }
function cardHTML(c){
  const sideTag=c.isHome?'<span class="tag home">Home</span>':'<span class="tag away">Away</span>';
  const edge=c.isHome?'var(--good)':'var(--away)';
  const statusCls=c.status==='Confirmed'?'conf':'proj';
  const paceTxt=c.oppPace!=null?(fmt1(c.oppPace)+(c.oppPaceRank!=null?(' (#'+c.oppPaceRank+')'):'')):'â€“';
  const mlTxt=c.ml!=null?((c.ml>0?'+':'')+c.ml):'â€“';
  return `
  <div class="card" data-key="${esc(c.key)}" style="--edge-c:${edge}">
    <div class="c-head">
      <div class="c-main"><div class="c-name">${esc(c.teamFull||c.team)}</div>
        <div class="c-sub"><span class="tag">${esc(c.team)}</span> ${sideTag} <span>${esc(c.matchupAb)}${c.gametime?' Â· '+esc(c.gametime):''}</span></div></div>
    </div>
    <div class="mtl">${c.isHome?'vs':'@'} <b>${esc(c.oppFull||c.opp)}</b> Â· Opp pace ${esc(paceTxt)}</div>
    <div class="odds">
      <div class="o"><div class="k">Spread</div><div class="v">${esc(teamSpread(c))}</div></div>
      <div class="o"><div class="k">Total</div><div class="v">${c.total!=null?esc(fmt1(c.total)):'â€“'}</div></div>
      <div class="o"><div class="k">Moneyline</div><div class="v">${esc(mlTxt)}</div></div>
    </div>
    <div class="expand-row"><div class="status-line">Lineup: <span class="${statusCls}">${esc(c.status)}</span></div>
      <button class="exp-btn" type="button">Detail <span class="car">&#9662;</span></button></div>
    <div class="detail"></div>
  </div>`;
}
function detailHTML(c){
  const [perRaw,locMode]=split.split('|');
  const perLbl=perRaw==='Full Season'?'Full season':'Last 30 days';
  const locLbl=locMode==='loc'?(c.loc==='Home'?'home games':'away games'):'all games';
  const splitNote=`${perLbl} Â· ${locLbl}`;
  const startersPanel=`<div class="panel"><div class="panel-h">Starters</div>${c.starters.length?playerTable(c.starters,c.loc):'<div class="note-sm">No starters for this split.</div>'}<div class="note-sm">${esc(splitNote)} Â· tap a player for Median / High / Low.</div></div>`;
  const benchPanel=c.bench.length?`<div class="panel"><div class="panel-h">Bench</div>${playerTable(c.bench,c.loc)}<div class="note-sm">tap a player for Median / High / Low.</div></div>`:'';
  const npPanel=c.notPlaying.length?`<div class="panel"><div class="panel-h">Not playing</div>${c.notPlaying.map(p=>`<div class="np-row"><span class="np-nm">${esc(p.name)}</span><span class="tag gm">${esc(p.tag||'OUT')}</span><span class="np-why">${esc(p.injury||'')}</span></div>`).join('')}</div>`:'';
  const defLoc=locMode==='loc'?(c.isHome?'Away':'Home'):'All';
  const defCell=c.defense[perRaw+'|'+defLoc]||c.defense[perRaw+'|All'];
  const defNote=locMode==='loc'?(c.isHome?'away games':'home games'):'all games';
  const defPanel=`<div class="panel"><div class="panel-h">${esc(c.oppFull||c.opp)} defense â€” allowed / game (rank)</div>${defCell?defenseTable(defCell):'<div class="note-sm">No defensive data for this split.</div>'}<div class="note-sm">${perLbl} Â· ${defNote} Â· lower rank = allows more. Opponent pace ${c.oppPace!=null?esc(fmt1(c.oppPace)):'â€“'}${c.oppPaceRank!=null?(' (#'+c.oppPaceRank+')'):''}.</div></div>`;
  return startersPanel+benchPanel+npPanel+defPanel;
}
function renderMore(){if(rendered>=VIEW.length)return;const slice=VIEW.slice(rendered,rendered+BATCH);els.grid.insertAdjacentHTML('beforeend',slice.map(cardHTML).join(''));rendered+=slice.length;}
function fillViewport(){let guard=0;do{renderMore();guard++;}while(rendered<VIEW.length&&els.sentinel.getBoundingClientRect().top<window.innerHeight+700&&guard<50);}
const io=new IntersectionObserver(e=>{if(e[0].isIntersecting)fillViewport();},{rootMargin:'700px'});io.observe(els.sentinel);

/* ---------- Events ---------- */
function refreshOpen(){document.querySelectorAll('.card.open').forEach(card=>{const c=GMAP.get(card.dataset.key);if(c)card.querySelector('.detail').innerHTML=detailHTML(c);});}
els.grid.addEventListener('click',e=>{
  const lp=e.target.closest('.lp-row');
  if(lp){const t=lp.closest('table');const i=lp.getAttribute('data-idx');t.querySelectorAll('.lp-sub[data-idx="'+i+'"]').forEach(r=>{r.hidden=!r.hidden;});lp.classList.toggle('open');return;}
  const card=e.target.closest('.card');if(!card)return;
  if(!e.target.closest('.exp-btn')&&!e.target.closest('.c-head'))return;
  const opening=!card.classList.contains('open');
  if(opening){const d=card.querySelector('.detail');const c=GMAP.get(card.dataset.key);if(c)d.innerHTML=detailHTML(c);}
  card.classList.toggle('open');
});
let searchTimer;
els.search.addEventListener('input',e=>{filters.search=e.target.value;clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,120);});
els.filterToggle.addEventListener('click',()=>{const open=els.filters.classList.toggle('open');els.filterToggle.setAttribute('aria-expanded',open);});
document.querySelectorAll('[data-filter]').forEach(el=>{const k=el.getAttribute('data-filter');el.addEventListener('input',()=>{filters[k]=el.value;applyFilters();});});
els.clearFilters.addEventListener('click',()=>{const sv=filters.search;filters=newFilters();filters.search=sv;Object.values(MS).forEach(c=>c.setOptions(c.options));applyFilters();});
els.splitSel.addEventListener('change',e=>{split=e.target.value;refreshOpen();});

/* ---------- Cache ---------- */
async function cacheGet(key){if(location.protocol==='file:'||!('caches'in self))return null;try{const c=await caches.open('bbmatch-v2');const r=await c.match('/'+key);return r?await r.json():null;}catch(e){return null;}}
async function cacheSet(key,obj){if(location.protocol==='file:'||!('caches'in self))return;try{const c=await caches.open('bbmatch-v2');await c.put('/'+key,new Response(JSON.stringify(obj),{headers:{'Content-Type':'application/json'}}));}catch(e){}}

/* ---------- Boot ---------- */
function ingest(d){CARDS=buildCards(d.games,d.players,d.defense,d.odds);populateFilters();applyFilters();}
function showEmpty(){els.grid.hidden=true;els.content.hidden=false;els.content.innerHTML='<div class="state"><h3>Nothing to show yet</h3><p>Check back closer to game time.</p></div>';}
async function boot(){
  els.loadpill.hidden=false;els.loadpill.textContent='Loadingâ€¦';
  const cached=await cacheGet('all');
  const warm=cached&&cached.games;
  if(warm){ingest(cached);if((Date.now()-cached.t)<=CACHE_TTL){els.loadpill.hidden=true;return;}}
  try{
    const [g,pl,df,od]=await Promise.all([
      fetchTableVerified('WBasketMatchupsGame'),fetchTableVerified('WBasketMatchupsPlayers'),
      fetchTableVerified('WBasketMatchupsDefense'),fetchTableVerified('WBasketGameOdds')]);
    const allComplete=g.complete&&pl.complete&&df.complete&&od.complete;   // every table caught in a stable state
    const d={t:Date.now(),games:g.rows,players:pl.rows,defense:df.rows,odds:od.rows};
    if(allComplete||!warm) ingest(d);        // adopt if verified, or on a cold load show what we have
    els.loadpill.hidden=true;                // (!allComplete && warm) â†’ keep the good cached view
    if(!CARDS.length){showEmpty();return;}
    if(allComplete) cacheSet('all',d);       // only cache when all four tables verified complete
  }catch(err){
    els.loadpill.hidden=true;
    if(!CARDS.length){els.content.innerHTML='<div class="state"><h3>Couldnâ€™t load right now</h3><p>Please refresh in a moment.</p></div>';els.content.hidden=false;}
  }
}
boot();
