const fmtPct = n=>n==null?'–':n.toFixed(1)+'%';
const raw = v=>{if(v==null)return '–';const s=String(v).trim();return s===''?'–':s;};
const fmtAvg = v=>{const n=parseFloat(v);return isNaN(n)?'–':n.toFixed(1);};
const fmtRate = v=>{if(v==null)return '–';const s=String(v).trim();if(s==='')return '–';return s.replace(/^(-?)0\.(?=\d)/,'$1.');};
const esc = s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const CODE_ALIAS={SD:'SDP',SF:'SFG',TB:'TBR',WSH:'WSN',KC:'KCR',CWS:'CHW'};
const canonTeam=c=>{const u=String(c||'').trim().toUpperCase();return CODE_ALIAS[u]||u;};
const abbrTeam=v=>{if(!v)return '';const s=String(v).trim();return TEAM_NAME_MAP[s]||canonTeam(s);};
const abbrProp = v=>!v?'':(PROP_ABBR[v]||v);
function etTz(){const d=new Date(),y=d.getFullYear();const m1=new Date(y,2,1),n1=new Date(y,10,1);const dstStart=new Date(y,2,1+((7-m1.getDay())%7)+7);const dstEnd=new Date(y,10,1+((7-n1.getDay())%7));return (d>=dstStart&&d<dstEnd)?'EDT':'EST';}
const ET_TZ = etTz();
const abbrMatchup = v=>!v?'':String(v).replace(MATCHUP_RE,m=>TEAM_LC[m.toLowerCase()]||m).replace(/\b(?:EST|EDT)\b/g,ET_TZ);   // #13: keep gametime, relabel ET zone
const order = v=>{const m=String(v||'').match(/\((\d+)\)/);return m?m[1]:null;};
const lineupTag = v=>{if(!v)return '';const st=/proj/i.test(v)?'Proj':(/conf/i.test(v)?'Conf':'');const o=order(v);if(!st&&!o)return '';return `${st}${o?' #'+o:''}`;};
const fmtPark = v=>!v?'–':String(v).replace(/\((\d+)\)/g,' (#$1)');
const titleCase = s=>String(s).replace(/\b\w/g,c=>c.toUpperCase());
const capWx = w=>{const parts=String(w).split('|');if(parts.length)parts[parts.length-1]=titleCase(parts[parts.length-1]);return parts.join('|');};
function clrColors(p){if(p==null)return{edge:'var(--line)',bg:'rgba(255,255,255,.05)',fg:'#7a6b8f'};if(p<25)return{edge:'#f87171',bg:'rgba(248,113,113,.16)',fg:'#fca5a5'};if(p<40)return{edge:'#fb923c',bg:'rgba(251,146,60,.16)',fg:'#fdba74'};if(p<55)return{edge:'#fbbf24',bg:'rgba(251,191,36,.15)',fg:'#fcd34d'};if(p<70)return{edge:'#34d399',bg:'rgba(52,211,153,.16)',fg:'#6ee7b7'};return{edge:'#10b981',bg:'rgba(16,185,129,.24)',fg:'#34d399'};}

/* ---------- Data ---------- */
function buildQuery(){return `${SUPABASE_URL}/rest/v1/${TABLE}?select=*`;}
async function fetchPage(url,offset,extra,limit){const lim=limit||PAGE_SIZE;const res=await fetch(url,{headers:{apikey:ANON_KEY,Authorization:"Bearer "+ANON_KEY,Accept:"application/json",'Range-Unit':'items',Range:`${offset}-${offset+lim-1}`,...(extra||{})}});if(!res.ok){const e=new Error(`Supabase ${res.status}`);e.status=res.status;throw e;}return {rows:await res.json()};}
// Paginate until a short page — no count=exact (COUNT on the daily delete+insert table gets slow with dead tuples).
async function fetchAll(cb){
  const url=buildQuery();let out=[],offset=0,first=true;
  while(true){
    const r=await fetchPage(url,offset,{},PAGE_SIZE);
    out=out.concat(r.rows);
    if(cb&&first&&r.rows.length){cb(r.rows,null,true,out.length);first=false;}
    else if(cb)cb(null,null,false,out.length);
    if(r.rows.length<PAGE_SIZE)break;
    offset+=PAGE_SIZE;
  }
  return out;
}
async function fetchVerified(cb){
  let rows=await fetchAll(cb);
  if(rows.length===0){await new Promise(r=>setTimeout(r,500));rows=await fetchAll(null);}   // possibly mid delete+insert
  return {rows, complete:true};
}

/* ---------- Grouping ---------- */
function buildGroups(rows){
  const map=new Map();
  for(const row of rows){
    const player=row[F.player];if(!player)continue;
    const prop=row[F.prop],line=row[F.line],key=`${player}|${prop}|${line}`;
    let g=map.get(key);
    if(!g){
      g={key,player,team:abbrTeam(row[F.team]),opp:abbrTeam(row[F.opponent]),role:row[F.role]||'',prop,line:num(line),
        matchup:row[F.matchup],
        medOver:oddsInt(row[F.medOver]),medUnder:oddsInt(row[F.medUnder]),
        bestOver:oddsInt(row[F.bestOver]),bestOverBk:row[F.bestOverBk],bestUnder:oddsInt(row[F.bestUnder]),bestUnderBk:row[F.bestUnderBk],
        variants:{},_q:String(player).toLowerCase(),_matchupAb:abbrMatchup(row[F.matchup])};
      map.set(key,g);
    }
    const vk=`${row[F.period]}|${row[F.split]}`;
    g.variants[vk]={clr:num(String(row[F.clearance]||'').replace('%','')),
      gCleared:row[F.cleared]!=null&&row[F.cleared]!==''?parseInt(row[F.cleared],10):null,
      gTotal:row[F.games]!=null&&row[F.games]!==''?parseInt(row[F.games],10):null,
      avg:num(row[F.avg]),median:num(row[F.median]),high:num(row[F.high]),low:num(row[F.low]),
      oppAllowed:num(row[F.oppAllowed]),oppRank:num(row[F.oppRank])};
  }
  const arr=[...map.values()];
  GMAP.clear();
  for(const g of arr){
    // player's location TODAY (for the 'loc' cell) from the matchup: "AWAY @ HOME"
    const parts=String(g.matchup||'').split('@').map(x=>abbrTeam(x.trim()));
    g.location = parts.length===2 ? (parts[1]===g.team?'Home':'Away') : null;
    g._season=g.variants['Full Season|All']||Object.values(g.variants)[0]||null;
    GMAP.set(g.key,g);
  }
  return arr;
}

/* variant getters */
function variantFor(g,period,splitMode){const split=splitMode==='loc'?(g.location||'All'):splitMode;return g.variants[`${period}|${split}`]||g.variants[`${period}|All`]||null;}
function cellVar(g,period,sp){if(sp==='loc'){if(!g.location)return null;return g.variants[`${period}|${g.location}`]||null;}return g.variants[`${period}|${sp}`]||null;}
function clrVar(g,key){const [period,sp]=key.slice(4).split('|');return cellVar(g,period,sp);}
function activeVar(g){const [period,sp]=sortMode.slice(4).split('|');return cellVar(g,period,sp)||variantFor(g,period,'All')||g._season;}
function recomputeProd(){for(const g of GROUPS){g._prodVar=activeVar(g);}}

/* ---------- Filters / sort ---------- */
function uniq(getter){return [...new Set(GROUPS.map(getter).filter(v=>v!=null&&v!==''))];}
/* ---------- Filters: persistence + multi-select (#9/#10) ---------- */
function saveFilters(){}   /* filters live in memory only: persist across tab switches (iframe stays mounted), reset on a real (re)load */
function loadFilters(){filters=newFilters();}
const MS = {};
function closeAllMS(){Object.values(MS).forEach(c=>{c.pop.hidden=true;c.btn.setAttribute('aria-expanded','false');});}
function buildMS(container,key){
  if(!container) return;
  container.innerHTML='';
  const btn=document.createElement('button'); btn.type='button'; btn.className='ms-btn'; btn.setAttribute('aria-expanded','false'); btn.textContent='All';
  const pop=document.createElement('div'); pop.className='ms-pop'; pop.hidden=true;
  container.appendChild(btn); container.appendChild(pop);
  const ctrl={key,btn,pop,options:[],
    syncLabel(){const ex=filters[key].size; btn.textContent = ex===0 ? 'All' : ((ctrl.options.length-ex)+' selected');},   // set = DESELECTED values
    setOptions(opts){
      const norm=opts.map(o=>Array.isArray(o)?o:[o,o]);
      ctrl.options=norm;
      const vals=new Set(norm.map(x=>String(x[0])));
      [...filters[key]].forEach(v=>{if(!vals.has(v))filters[key].delete(v);});
      pop.innerHTML='';
      const allBtn=document.createElement('button'); allBtn.type='button'; allBtn.className='ms-all';
      const syncAll=()=>{allBtn.textContent = filters[key].size===0 ? 'Deselect all' : 'Select all';};
      allBtn.addEventListener('click',e=>{
        e.stopPropagation();
        if(filters[key].size===0){ norm.forEach(x=>filters[key].add(String(x[0]))); } else { filters[key].clear(); }
        pop.querySelectorAll('input[type=checkbox]').forEach(cb=>{cb.checked=!filters[key].has(cb.value);});
        syncAll(); ctrl.syncLabel(); saveFilters(); applyFilters();
      });
      pop.appendChild(allBtn);
      norm.forEach(([value,label])=>{
        const val=String(value);
        const row=document.createElement('label'); row.className='ms-opt';
        const cb=document.createElement('input'); cb.type='checkbox'; cb.value=val; cb.checked=!filters[key].has(val);
        cb.addEventListener('change',()=>{if(cb.checked)filters[key].delete(val);else filters[key].add(val);syncAll();ctrl.syncLabel();saveFilters();applyFilters();});
        const span=document.createElement('span'); span.textContent=label;
        row.appendChild(cb); row.appendChild(span); pop.appendChild(row);
      });
      syncAll(); ctrl.syncLabel();
    }
  };
  btn.addEventListener('click',e=>{e.stopPropagation();const willOpen=pop.hidden;closeAllMS();pop.hidden=!willOpen;btn.setAttribute('aria-expanded',String(willOpen));});
  pop.addEventListener('click',e=>e.stopPropagation());
  MS[key]=ctrl; return ctrl;
}
loadFilters();
buildMS(document.querySelector('.ms[data-ms="team"]'),'team');
buildMS(document.querySelector('.ms[data-ms="prop"]'),'prop');
buildMS(document.querySelector('.ms[data-ms="line"]'),'line');

function populateFilters(){
  MS.team.setOptions(uniq(g=>g.team).sort());
  MS.prop.setOptions(orderProps(uniq(g=>g.prop)).map(v=>[v,abbrProp(v)]));
  MS.line.setOptions(uniq(g=>g.line).sort((a,b)=>a-b).map(v=>[String(v),String(v)]));
  MS.role.setOptions(uniq(g=>g.role).filter(Boolean).sort());
  document.querySelectorAll('input[data-filter]').forEach(el=>{const k=el.getAttribute('data-filter'); el.value=(filters[k]!=null)?filters[k]:'';});
  els.search.value=filters.search||'';
}
function applySort(){
  recomputeProd();
  const dir=sortDir==='asc'?1:-1;
  const cv=g=>clrVar(g,sortMode);
  SORTED=GROUPS.slice().sort((a,b)=>{
    const va=cv(a),vb=cv(b);
    const pa=va?va.clr:null,pb=vb?vb.clr:null;
    if(pa==null&&pb==null) return a._q<b._q?-1:a._q>b._q?1:0;
    if(pa==null) return 1; if(pb==null) return -1;
    if(pa!==pb) return (pa-pb)*dir;                                  // 1) clearance %
    const na=(va&&va.gCleared!=null)?va.gCleared:-1, nb=(vb&&vb.gCleared!=null)?vb.gCleared:-1;
    if(na!==nb) return nb-na;                                        // 2) tie -> more games cleared first
    return a._q<b._q?-1:a._q>b._q?1:0;                               // 3) still tied -> name A->Z
  });
  applyFilters();
}
function applyFilters(){
  const s=filters.search.trim().toLowerCase();
  const gMin=filters.gMin!==''?parseInt(filters.gMin,10):null;
  const cMin=filters.clrMin!==''?parseFloat(filters.clrMin):null;
  const boMin=filters.boMin!==''?parseInt(filters.boMin,10):null,boMax=filters.boMax!==''?parseInt(filters.boMax,10):null;
  const buMin=filters.buMin!==''?parseInt(filters.buMin,10):null,buMax=filters.buMax!==''?parseInt(filters.buMax,10):null;
  const moMin=filters.medMin!==''?parseInt(filters.medMin,10):null,moMax=filters.medMax!==''?parseInt(filters.medMax,10):null;
  const activeClr=g=>{const v=sortMode.startsWith('clr:')?clrVar(g,sortMode):cellVar(g,'Full Season','All');return v?v.clr:null;};
  VIEW=SORTED.filter(g=>{
    if(s&&!g._q.includes(s))return false;
    if(filters.team.has(g.team))return false;
    if(filters.prop.has(g.prop))return false;
    if(filters.line.has(String(g.line)))return false;
    if(filters.role.has(g.role))return false;
    if(gMin!=null){const sv=cellVar(g,'Full Season','All');if(!sv||sv.gTotal==null||sv.gTotal<gMin)return false;}
    if(cMin!=null){const c=activeClr(g);if(c==null||c<cMin)return false;}
    if(boMin!=null&&(g.bestOver==null||g.bestOver<boMin))return false;
    if(boMax!=null&&(g.bestOver==null||g.bestOver>boMax))return false;
    if(buMin!=null&&(g.bestUnder==null||g.bestUnder<buMin))return false;
    if(buMax!=null&&(g.bestUnder==null||g.bestUnder>buMax))return false;
    if(moMin!=null&&(g.medOver==null||g.medOver<moMin))return false;
    if(moMax!=null&&(g.medOver==null||g.medOver>moMax))return false;
    return true;
  });
  rendered=0;els.grid.innerHTML='';els.grid.hidden=VIEW.length===0;els.count.textContent=VIEW.length.toLocaleString();
  if(VIEW.length===0){els.content.innerHTML='<div class="state"><h3>No matching props</h3><p>Loosen a filter to see more.</p></div>';els.content.hidden=false;}
  else{els.content.hidden=true;fillViewport();}
  const active=(filters.team.size?1:0)+(filters.prop.size?1:0)+(filters.line.size?1:0)+(filters.role.size?1:0)+['clrMin','boMin','boMax','buMin','buMax','medMin','medMax'].filter(k=>filters[k]!=='').length+(filters.gMin!==''&&filters.gMin!=='0'?1:0);
  els.filterCount.hidden=active===0;els.filterCount.textContent=active;
}

/* ---------- Render ---------- */
function clrCell(g,key,label){
  const v=clrVar(g,key);const active=sortMode===key?' active':'';
  if(!v||v.clr==null)return `<div class="cell empty${active}"><div class="cl">${esc(label)}</div><div class="cv">–</div><div class="cg">&nbsp;</div></div>`;
  const c=clrColors(v.clr);
  return `<button type="button" class="cell${active}" data-sortkey="${key}" style="--cbg:${c.bg};--cfg:${c.fg}"><div class="cl">${esc(label)}</div><div class="cv">${fmtPct(v.clr)}</div><div class="cg">${v.gCleared??'–'}/${v.gTotal??'–'}</div></button>`;
}

  const roleTag=g.role&&g.role!=='All'?`<span class="tag lu ${/starter/i.test(g.role)?'conf':'proj'}">${esc(g.role)}</span>`:'';
  const loc=g.location||'Loc';
  const av=clrVar(g,sortMode.startsWith('clr:')?sortMode:'clr:Full Season|All');

      <div class="o"><div class="k">Median</div><div class="v">${fmtOdds(g.medOver)}</div><div class="b">U ${fmtOdds(g.medUnder)}</div></div>
      <div class="o"><div class="k">Best Under</div><div class="v">${fmtOdds(g.bestUnder)}</div><div class="b">${esc(g.bestUnderBk||'')}</div></div>
    </div>

      <button class="exp-btn" type="button">Detail <span class="car">▾</span></button></div>
    <div class="detail"></div>

}

/* ---------- Detail (lazy) ---------- */
function detailHTML(g){
  const yesNo=/double double|triple double/i.test(g.prop);   // DD/TD: Avg/Med/High/Low are meaningless (0/1)
  const oppCell=v=>v.oppAllowed!=null?(fmtAvg(v.oppAllowed)+(v.oppRank!=null?` <span style="color:var(--muted-2)">(#${v.oppRank})</span>`:'')):'–';
  const rowFor=(label,period,sp)=>{
    const v=cellVar(g,period,sp);
    const cols=yesNo?4:8;
    if(!v)return `<tr><td class="rl">${esc(label)}</td><td colspan="${cols-1}" style="color:var(--muted-2)">no games</td></tr>`;
    const clr=v.clr!=null?fmtPct(v.clr):'–';
    if(yesNo){   // Clr% | Cleared | Opp Allowed only
      return `<tr><td class="rl">${esc(label)}</td><td>${clr}</td><td>${v.gCleared??'–'}/${v.gTotal??'–'}</td><td>${oppCell(v)}</td></tr>`;
    }
    return `<tr><td class="rl">${esc(label)}</td><td>${clr}</td><td>${v.gCleared??'–'}/${v.gTotal??'–'}</td><td>${fmtAvg(v.avg)}</td><td>${fmtAvg(v.median)}</td><td>${raw(v.high)}</td><td>${raw(v.low)}</td><td>${oppCell(v)}</td></tr>`;
  };
  const loc=g.location||'Loc';
  const head=yesNo
    ? `<tr><th></th><th>Clr%</th><th>Cleared</th><th>Opp Allowed</th></tr>`
    : `<tr><th></th><th>Clr%</th><th>Cleared</th><th>Avg</th><th>Med</th><th>High</th><th>Low</th><th>Opp Allowed</th></tr>`;
  const oppNote=yesNo?"Opp Allowed = total DD/TD the opponent has given up (location-matched)." : "Opp Allowed = opponent's location-matched allowed per game for this stat.";
  return `<div class="panel"><div class="panel-h">Clearance${yesNo?'':' & distribution'} — ${esc(g.role||'')} · vs ${esc(g.opp||'—')}</div>
    <div class="mini-scroll"><table class="mini clr-detail${yesNo?' yn':''}"><thead>${head}</thead><tbody>
      ${rowFor('Season · All','Full Season','All')}
      ${rowFor('Season · '+loc,'Full Season','loc')}
      ${rowFor('L30 · All','Last 30 Days','All')}
      ${rowFor('L30 · '+loc,'Last 30 Days','loc')}
    </tbody></table></div>
    <div class="note-sm" style="color:var(--muted-2);font-size:11px;margin-top:6px">${oppNote} Rank 1 = allows most.</div>
  </div>`;
}

/* ---------- Cache (Cache API) ---------- */
async function cacheGet(key){if(location.protocol==='file:'||!('caches'in self))return null;try{const c=await caches.open('wnbaclear-v1');const r=await c.match('/'+key);return r?await r.json():null;}catch(e){return null;}}
async function cacheSet(key,obj){if(location.protocol==='file:'||!('caches'in self))return;try{const c=await caches.open('wnbaclear-v1');await c.put('/'+key,new Response(JSON.stringify(obj),{headers:{'Content-Type':'application/json'}}));}catch(e){}}

/* ---------- Boot (stream the full table; cache; stale-while-revalidate) ---------- */
function fmtN(n){return n>=1000?(((n/1000).toFixed(n>=10000?0:1)).replace(/\.0$/,''))+'k':String(n);}
function setProg(loaded,total){if(!els.loadpill)return;els.loadpill.hidden=false;els.loadpill.textContent='Loading…';}
function setProgDone(){if(els.loadpill)els.loadpill.hidden=true;}
function ingest(rows){GROUPS=buildGroups(rows);populateFilters();applySort();}
async function boot(){
  const cacheKey=TABLE;
  const cached=await cacheGet(cacheKey);
  const warm=cached&&Array.isArray(cached.rows)&&cached.rows.length;
  if(warm){ingest(cached.rows);if((Date.now()-cached.t)<=CACHE_TTL)return;}
  try{
    // stream-paint only on a cold load; on revalidate keep the cached view until a verified read lands
    const cb=(firstRows,total,isFirst,loaded)=>{
      if(!warm&&isFirst&&firstRows&&firstRows.length) ingest(firstRows);
      setProg(loaded,total);
    };
    const {rows,complete}=await fetchVerified(warm?null:cb);
    setProgDone();
    if(complete) ingest(rows);                 // verified full read → adopt it
    else if(!warm) ingest(rows);               // cold load we couldn't verify → show it, but don't cache
    // (!complete && warm) → leave the good cached view untouched
    if(!GROUPS.length){
      els.grid.hidden=true;els.content.hidden=false;
      els.content.innerHTML=`<div class="state"><h3>Nothing to show yet</h3><p>Check back closer to game time.</p></div>`;
      return;
    }
    if(complete&&rows.length) cacheSet(cacheKey,{t:Date.now(),rows});   // only cache a verified full read
  }
  catch(err){setProgDone();if(!GROUPS.length){els.content.innerHTML=`<div class="state"><h3>Couldn't load right now</h3><p>Please refresh in a moment.</p></div>`;els.content.hidden=false;}}
}
boot();
</script>
</body>
</html>
