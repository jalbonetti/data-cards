function evColors(pct){
  if (pct==null) return { edge:'var(--line)', bg:'rgba(255,255,255,.05)', fg:'#7a6b8f' };
  if (pct < 0)   return { edge:'#f87171', bg:'rgba(248,113,113,.16)', fg:'#fca5a5' };
  if (pct < 5)   return { edge:'#2c6b53', bg:'rgba(52,211,153,.08)', fg:'#6ee7b7' };
  if (pct < 12)  return { edge:'#34d399', bg:'rgba(52,211,153,.16)', fg:'#6ee7b7' };
  if (pct < 25)  return { edge:'#10b981', bg:'rgba(16,185,129,.24)', fg:'#34d399' };
  return            { edge:'#10b981', bg:'rgba(16,185,129,.34)', fg:'#a7f3d0' };
}

function betDescription(r){
  const lab = (r.label||'').trim();
  const isYesNo = /^(yes|no)$/i.test(lab);
  const side = lab ? `<span class="side">${esc(lab)}</span>` : '';
  if (isYesNo) return `${esc(abbrProp(r.prop))} ${side}`.trim();
  const line = r.line!=null ? ` ${r.line}` : '';
  return `${esc(abbrProp(r.prop))} ${side}${line}`.trim();
}

/* Game selection headline: the actual ticket you'd tap.
   Spread → "ATH -1.5" (team + signed line); Total → "Over 6.5" (side + line);
   Moneyline → "BOS" (team, no line). Returns escaped HTML. */
function gameSelection(r){
  const mkt = String(r.prop||'').toLowerCase();
  const lab = r.label || '';
  if (mkt === 'total'){
    const ln = r.line!=null ? ` ${r.line}` : '';
    return `${esc(lab)}${ln}`;
  }
  if (mkt === 'spread'){
    const ln = r.line!=null ? ` ${r.line>0?'+':''}${r.line}` : '';
    return `${esc(abbrTeam(lab))}${ln}`;
  }
  return esc(abbrTeam(lab));            // moneyline
}

/* ---------- Data ----------
   - Explicit column list instead of select=* (smaller payloads)
   - Range + Prefer: count=exact on the first page → total known up front
   - Remaining pages fetched in parallel (HTTP/2 multiplexes them)
   - Server-side order by "EV %" desc → page 1 is the default view,
     so we can render it immediately while the rest loads.
   - onFirst(rows) fires after page 1 for progressive rendering.
------------------------------------------------------------------ */
function buildQuery(table, lean){
  const F = fieldMap(MODES[mode].prefix);
  const select = lean
    ? Object.values(F).filter(Boolean).map(c => `"${c}"`).join(',')
    : '*';
  let url = `${SUPABASE_URL}/rest/v1/${table}?select=${encodeURIComponent(select)}`;
  if (lean) url += `&order=${encodeURIComponent('EV %')}.desc.nullslast`;
  return url;
}

async function fetchPage(url, offset, extraHeaders, limit){
  const lim = limit || PAGE_SIZE;
  const res = await fetch(url, {
    headers: {
      apikey: ANON_KEY, Authorization: "Bearer "+ANON_KEY, Accept: "application/json",
      'Range-Unit': 'items', Range: `${offset}-${offset + lim - 1}`,
      ...extraHeaders
    }
  });
  if (!res.ok) { const e = new Error(`Supabase ${res.status}`); e.status = res.status; throw e; }
  return { rows: await res.json(), contentRange: res.headers.get('content-range') };
}

/* count-only probe used to confirm the table isn't mid-upload */
async function countOnly(url){try{const r=await fetchPage(url,0,{Prefer:'count=exact'},1);const m=/\/(\d+)$/.exec(r.contentRange||'');return m?parseInt(m[1],10):null;}catch(e){return null;}}
async function fetchAll(table, onFirst){
  let lean = true, url = buildQuery(table, true), first;
  try {
    first = await fetchPage(url, 0, { Prefer: 'count=exact' });
  } catch (err) {
    // If the quoted column list / ordered query isn't accepted, fall back to select=*
    if (err.status === 400 || err.status === 404) {
      lean = false; url = buildQuery(table, false);
      first = await fetchPage(url, 0, { Prefer: 'count=exact' });
    } else throw err;
  }

  let out = first.rows;
  const ps = first.rows.length || PAGE_SIZE;                 // real page size the server allows (cap-proof)
  const m = /\/(\d+)$/.exec(first.contentRange || '');
  const total = m ? parseInt(m[1], 10) : (first.rows.length < PAGE_SIZE ? first.rows.length : null);

  if (onFirst && out.length) onFirst(out, total);
  if (ps === 0 || (total != null && out.length >= total) || (total == null && first.rows.length < PAGE_SIZE)) return {rows:out, total, url};

  if (total != null) {
    // Known total → fire remaining pages in parallel, stepping by the real page size
    const offsets = [];
    for (let o = ps; o < total; o += ps) offsets.push(o);
    const results = new Array(offsets.length);
    let i = 0;
    await Promise.all(Array.from({ length: Math.min(MAX_PARALLEL, offsets.length) }, async () => {
      while (i < offsets.length) {
        const idx = i++;
        results[idx] = (await fetchPage(url, offsets[idx], undefined, ps)).rows;
      }
    }));
    out = out.concat(...results);
  } else {
    // Unknown total → serial until a short page
    let offset = ps, more = true;
    while (more) {
      const { rows } = await fetchPage(url, offset, undefined, ps);
      out = out.concat(rows);
      more = rows.length === ps; offset += ps;
    }
  }
  return {rows:out, total, url};
}

/* Load the full table, retrying if we catch it mid-upload. A stable table reports the
   same count before and after paging through it and the rows match that count; a table
   being wiped/refilled doesn't. Only a passing read is treated as complete/cacheable. */
async function fetchVerified(table, onFirst){
  const TRIES=4; let last=[];
  for(let t=0;t<TRIES;t++){
    const {rows,total,url}=await fetchAll(table, t===0?onFirst:undefined);
    last=rows;
    const after=await countOnly(url);
    if(total!=null && rows.length===total && after===total) return {rows, complete:true};
    await new Promise(r=>setTimeout(r, 400*(t+1)));   // caught mid-upload — back off and retry
  }
  return {rows:last, complete:false};
}

function normalize(rows) {
  const F = fieldMap(MODES[mode].prefix);
  const isGame = mode === 'game';
  const out = [];
  for (const row of rows) {
    const matchup = row[F.matchup];
    const name = isGame ? null : row[F.name];
    if (isGame ? !matchup : !name) continue;   // game rows are keyed on the matchup
    const link = row[F.link];
    const rec = {
      name, matchup, team: isGame ? null : row[F.team],
      prop: row[F.prop], label: row[F.label], line: num(row[F.line]),
      book: row[F.book],
      bookOdds: oddsInt(row[F.bookOdds]), medianOdds: oddsInt(row[F.medianOdds]),
      bestOdds: oddsInt(row[F.bestOdds]), bestBooks: row[F.bestBooks],
      ev: num(row[F.ev]), kelly: num(row[F.kelly]),
      link: (link && /^https?:\/\//i.test(link)) ? link : null,
      /* Precomputed once so filter/sort/render passes don't redo string work */
      _matchupAb: abbrMatchup(matchup),
    };
    /* search key: player name for props; full + abbreviated matchup for games
       (so "boston" and "BOS" both match) */
    rec._q = isGame
      ? (String(matchup||'') + ' ' + rec._matchupAb).toLowerCase()
      : String(name).toLowerCase();
    out.push(rec);
  }
  return out;
}

const evPct = (r) => r.ev;
const kellyPct = (r) => r.kelly;

/* ---------- Filters / sort ----------
   Sort is applied ONCE into SORTED whenever data or the sort control
   changes. applyFilters() is then a single O(n) pass — filtering a
   sorted array preserves order, so keystrokes never trigger a re-sort.
------------------------------------------------------------------ */
function uniqueSorted(key){ return [...new Set(RAW.map(r=>r[key]).filter(v=>v!=null&&v!==''))].sort(); }

const PROP_ORDER = ['Hits','Total Bases','Singles','Doubles','Triples','Home Runs','Runs Scored','RBIs','Hits + Runs + RBIs','Walks','Stolen Bases','Strikeouts','Outs Recorded','Pitching Outs','Hits Allowed','Earned Runs','Record a Win'];
function orderProps(vals){const idx=p=>{const i=PROP_ORDER.indexOf(p);return i<0?999:i;};return vals.slice().sort((a,b)=>{const d=idx(a)-idx(b);return d!==0?d:String(a).localeCompare(String(b));});}
/* ---------- Filters: in-memory per-mode persistence + multi-select (#9/#10) ---------- */
const MODE_FILTERS={};   /* in-memory only: persist across tab/mode switches within a page load, reset on a real (re)load */
function saveFilters(){MODE_FILTERS[mode]=filters;}
function loadFilters(){filters = MODE_FILTERS[mode] || newFilters();}
const MS = {};
function closeAllMS(){Object.values(MS).forEach(c=>{c.pop.hidden=true;c.btn.setAttribute('aria-expanded','false');});}
function buildMS(container,key){
  if(!container) return;
  container.innerHTML='';
  const btn=document.createElement('button'); btn.type='button'; btn.className='ms-btn'; btn.setAttribute('aria-expanded','false'); btn.textContent='All';
  const pop=document.createElement('div'); pop.className='ms-pop'; pop.hidden=true;
  container.appendChild(btn); container.appendChild(pop);
  const ctrl={key,btn,pop,options:[],
    syncLabel(){const ex=filters[key].size; btn.textContent = ex===0 ? 'All' : ((ctrl.options.length-ex)+' selected');},   // set = DESELECTED values
    setOptions(opts){
      const norm=opts.map(o=>Array.isArray(o)?o:[o,o]);
      ctrl.options=norm;
      const vals=new Set(norm.map(x=>String(x[0])));
      [...filters[key]].forEach(v=>{if(!vals.has(v))filters[key].delete(v);});
      pop.innerHTML='';
      const allBtn=document.createElement('button'); allBtn.type='button'; allBtn.className='ms-all';
      const syncAll=()=>{allBtn.textContent = filters[key].size===0 ? 'Deselect all' : 'Select all';};
      allBtn.addEventListener('click',e=>{
        e.stopPropagation();
        if(filters[key].size===0){ norm.forEach(x=>filters[key].add(String(x[0]))); } else { filters[key].clear(); }
        pop.querySelectorAll('input[type=checkbox]').forEach(cb=>{cb.checked=!filters[key].has(cb.value);});
        syncAll(); ctrl.syncLabel(); saveFilters(); applyFilters();
      });
      pop.appendChild(allBtn);
      norm.forEach(([value,label])=>{
        const val=String(value);
        const row=document.createElement('label'); row.className='ms-opt';
        const cb=document.createElement('input'); cb.type='checkbox'; cb.value=val; cb.checked=!filters[key].has(val);
        cb.addEventListener('change',()=>{if(cb.checked)filters[key].delete(val);else filters[key].add(val);syncAll();ctrl.syncLabel();saveFilters();applyFilters();});
        const span=document.createElement('span'); span.textContent=label;
        row.appendChild(cb); row.appendChild(span); pop.appendChild(row);
      });
      syncAll(); ctrl.syncLabel();
    }
  };
  btn.addEventListener('click',e=>{e.stopPropagation();const willOpen=pop.hidden;closeAllMS();pop.hidden=!willOpen;btn.setAttribute('aria-expanded',String(willOpen));});
  pop.addEventListener('click',e=>e.stopPropagation());
  MS[key]=ctrl; return ctrl;
}
loadFilters();
['matchup','team','prop','label','book','bestBooks'].forEach(k=>buildMS(document.querySelector('.ms[data-ms="'+k+'"]'),k));
document.addEventListener('click',closeAllMS);

function populateFilters(){
  MS.matchup.setOptions(uniqueSorted('matchup').map(v=>[v,abbrMatchup(v)]));
  MS.team.setOptions(uniqueSorted('team'));
  MS.prop.setOptions(orderProps(uniqueSorted('prop')).map(v=>[v,abbrProp(v)]));
  MS.label.setOptions(uniqueSorted('label'));
  MS.book.setOptions(uniqueSorted('book'));
  MS.bestBooks.setOptions(uniqueSorted('bestBooks'));
  document.querySelectorAll('input[data-filter]').forEach(el=>{const k=el.getAttribute('data-filter'); el.value=(filters[k]!=null)?filters[k]:'';});
  els.search.value=filters.search||'';
}

/* Relabels the chrome that differs between player-prop and game modes:
   title, search placeholder, Prop→Market / Label→Side, hides Team. */
function applyModeUI(){
  const isGame = mode === 'game';
  if (els.titleText) els.titleText.textContent = isGame ? 'Game Odds' : 'Prop Odds';
  els.search.placeholder = isGame ? 'Search team…' : 'Search player…';
  els.search.setAttribute('aria-label', isGame ? 'Search team' : 'Search player');
  const q = sel => document.querySelector(sel);
  const propG  = q('.ms[data-ms="prop"]')?.closest('.fg')?.querySelector('label');
  const labelG = q('.ms[data-ms="label"]')?.closest('.fg')?.querySelector('label');
  const teamG  = q('.ms[data-ms="team"]')?.closest('.fg');
  if (propG)  propG.textContent  = isGame ? 'Market' : 'Prop';
  if (labelG) labelG.textContent = isGame ? 'Side' : 'Label';
  if (teamG)  teamG.hidden = isGame;          // Game Odds has no Team column
  const nameOpt = q('#sortField option[value="name"]');
  if (nameOpt) nameOpt.textContent = isGame ? 'Matchup' : 'Name';
}

function applySort(){
  const dir = sort.dir==='asc' ? 1 : -1;
  const get = { ev:evPct, kelly:kellyPct, best:r=>r.bestOdds, line:r=>r.line, name:r=>r._q }[sort.field];
  SORTED = RAW.slice().sort((a,b)=>{
    const va=get(a), vb=get(b);
    if (sort.field==='name'){ return va<vb ? -1*dir : va>vb ? 1*dir : 0; }
    if (va==null) return 1; if (vb==null) return -1;
    return (va-vb)*dir;
  });
  applyFilters();
}

function applyFilters(){
  const s = filters.search.trim().toLowerCase();
  const evMin = filters.evMin!=='' ? parseFloat(filters.evMin) : null;
  const bMin = filters.bestMin!=='' ? parseInt(filters.bestMin,10) : null;
  const bMax = filters.bestMax!=='' ? parseInt(filters.bestMax,10) : null;
  const mMin = filters.medMin!=='' ? parseInt(filters.medMin,10) : null;
  const mMax = filters.medMax!=='' ? parseInt(filters.medMax,10) : null;

  VIEW = SORTED.filter(r => {
    if (s && !r._q.includes(s)) return false;
    if (filters.matchup.has(r.matchup)) return false;
    if (filters.team.has(r.team)) return false;
    if (filters.prop.has(r.prop)) return false;
    if (filters.label.has(r.label)) return false;
    if (filters.book.has(r.book)) return false;
    if (filters.bestBooks.has(r.bestBooks)) return false;
    if (evMin!=null && (evPct(r)==null || evPct(r) < evMin)) return false;
    if (bMin!=null && (r.bestOdds==null || r.bestOdds < bMin)) return false;
    if (bMax!=null && (r.bestOdds==null || r.bestOdds > bMax)) return false;
    if (mMin!=null && (r.medianOdds==null || r.medianOdds < mMin)) return false;
    if (mMax!=null && (r.medianOdds==null || r.medianOdds > mMax)) return false;
    return true;
  });

  rendered = 0; els.grid.innerHTML = ''; els.grid.hidden = VIEW.length===0;
  els.count.textContent = VIEW.length.toLocaleString();
  if (VIEW.length===0){
    els.content.innerHTML = '<div class="state"><h3>No matching bets</h3><p>Loosen a filter or clear the search to see more.</p></div>';
    els.content.hidden = false;
  } else { els.content.hidden = true; fillViewport(); }
  updateFilterBadge();
}

function updateFilterBadge(){
  const active = (filters.matchup.size?1:0)+(filters.team.size?1:0)+(filters.prop.size?1:0)+(filters.label.size?1:0)+(filters.book.size?1:0)+(filters.bestBooks.size?1:0)+['evMin','bestMin','bestMax','medMin','medMax'].filter(k => filters[k]!=='').length;
  els.filterCount.hidden = active===0; els.filterCount.textContent = active;
}

/* ---------- Render ---------- */
function cardHTML(r){
  const ev = evPct(r), k = kellyPct(r);
  const c = evColors(ev);
  const betAmt = (k!=null) ? (bankroll * (k/100)) : null;
  const isGame = mode === 'game';
  const head = isGame
    ? `<div class="c-name">${gameSelection(r)}</div>
        <div class="c-sub">${esc(r._matchupAb)}</div>`
    : `<div class="c-name">${esc(r.name)}</div>
        <div class="c-sub"><span class="team-tag">${esc(abbrTeam(r.team))}</span> ${esc(r._matchupAb)}</div>`;
  const betLine = isGame ? esc(r.prop||'') : betDescription(r);   // market name for games
  return `
  <div class="card" style="--edge:${c.edge}">
    <div class="c-head">
      <div>
        ${head}
      </div>
      <div class="ev" style="--ev-bg:${c.bg};--ev-fg:${c.fg}"><div class="v">${fmtPct(ev)}</div><div class="k">EV</div></div>
    </div>
    <div class="bet-line">${betLine}</div>
    <div class="odds">
      <div class="o"><div class="k">Book</div><div class="v">${fmtOdds(r.bookOdds)}</div><div class="b">${esc(r.book||'')}</div></div>
      <div class="o"><div class="k">Median</div><div class="v">${fmtOdds(r.medianOdds)}</div><div class="b">&nbsp;</div></div>
      <div class="o best"><div class="k">Best</div><div class="v">${fmtOdds(r.bestOdds)}</div><div class="b">${esc(r.bestBooks||'')}</div></div>
    </div>
    <div class="c-foot">
      <div class="sizing" data-k="${k!=null?k:''}">Bet size ${fmtPct(k)}${betAmt!=null?` · <span class="amt">$${betAmt.toFixed(2)}</span>`:''}</div>
      ${r.link ? `<a class="bet-btn" href="${esc(r.link)}" target="_blank" rel="noopener noreferrer">Bet →</a>` : `<span class="bet-btn dead">No link</span>`}
    </div>
  </div>`;
}

function renderMore(){
  if (rendered >= VIEW.length) return;
  const slice = VIEW.slice(rendered, rendered + BATCH);
  els.grid.insertAdjacentHTML('beforeend', slice.map(cardHTML).join(''));
  rendered += slice.length;
}

/* Keeps appending batches until the sentinel is pushed below the
   viewport (+margin). Fixes the "stuck at 30 cards" case where the
   sentinel was already intersecting so the observer never re-fired. */
function fillViewport(){
  let guard = 0;
  do {
    renderMore();
    guard++;
  } while (
    rendered < VIEW.length &&
    els.sentinel.getBoundingClientRect().top < window.innerHeight + 600 &&
    guard < 50
  );
}

const io = new IntersectionObserver((entries)=>{ if (entries[0].isIntersecting) fillViewport(); }, { rootMargin: '600px' });
io.observe(els.sentinel);

/* ---------- Events ---------- */
let searchTimer;
els.search.addEventListener('input', e=>{
  filters.search = e.target.value;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{saveFilters();applyFilters();}, 120);   // debounce: don't churn 40k rows per keystroke
});
els.filterToggle.addEventListener('click', ()=>{
  const open = els.filters.classList.toggle('open');
  els.filterToggle.setAttribute('aria-expanded', open);
});
document.querySelectorAll('input[data-filter]').forEach(el=>{
  const key = el.getAttribute('data-filter');
  el.addEventListener('input', ()=>{ filters[key]=el.value; saveFilters(); applyFilters(); });
});
els.clearFilters.addEventListener('click', ()=>{
  const sv=filters.search; filters=newFilters(); filters.search=sv;
  document.querySelectorAll('input[data-filter]').forEach(el=>{ el.value=''; });
  Object.values(MS).forEach(c=>c.setOptions(c.options));
  saveFilters(); applyFilters();
});
els.sortField.addEventListener('change', e=>{ sort.field=e.target.value; sort.dir = e.target.value==='name' ? 'asc':'desc'; els.sortDir.textContent = sort.dir==='asc'?'▲':'▼'; applySort(); });
els.sortDir.addEventListener('click', ()=>{ sort.dir = sort.dir==='asc'?'desc':'asc'; els.sortDir.textContent = sort.dir==='asc'?'▲':'▼'; applySort(); });

/* Bankroll: update dollar amounts in place — no grid wipe, no lost scroll position */
els.bankroll.addEventListener('input', e=>{
  bankroll = parseFloat(e.target.value)||0;
  els.grid.querySelectorAll('.sizing').forEach(elm=>{
    const k = parseFloat(elm.dataset.k);
    if (isNaN(k)) return;
    elm.innerHTML = `Bet size ${fmtPct(k)} · <span class="amt">$${(bankroll*(k/100)).toFixed(2)}</span>`;
  });
});

els.modeToggle.addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-mode]'); if(!btn) return;
  const next = btn.getAttribute('data-mode'); if(next===mode) return;
  saveFilters();
  mode = next;
  [...els.modeToggle.children].forEach(b=>{
    const on = b===btn;
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', on);
  });
  loadFilters();
  applyModeUI();
  RAW = []; SORTED = []; els.grid.innerHTML=''; els.grid.hidden=true;
  els.content.hidden=false; els.content.innerHTML='<div class="state"><div class="spinner"></div><p>Loading…</p></div>';
  boot();
});

/* ---------- Cache (Cache API — sessionStorage's ~5MB quota fails
   silently on 40k-row days; Cache API holds tens of MB) ---------- */
async function cacheGet(key){
  try {
    const c = await caches.open('bbprops-v1');
    const r = await c.match('/'+key);
    return r ? await r.json() : null;
  } catch(e){ return null; }
}
async function cacheSet(key, obj){
  try {
    const c = await caches.open('bbprops-v1');
    await c.put('/'+key, new Response(JSON.stringify(obj), { headers: {'Content-Type':'application/json'} }));
  } catch(e){ /* private mode / quota — stay in-memory */ }
}

/* ---------- Boot (stale-while-revalidate, progressive render) ---------- */
function ingest(rows){ RAW = normalize(rows); populateFilters(); applySort(); }

async function boot(){
  const seq = ++bootSeq;                 // invalidate any in-flight fetch from a previous mode
  const table = MODES[mode].table;
  const cacheKey = `bbprops_${mode}`;

  const cached = await cacheGet(cacheKey);
  if (seq !== bootSeq) return;
  const warm = cached && Array.isArray(cached.rows) && cached.rows.length;
  if (warm){
    ingest(cached.rows);
    if ((Date.now() - cached.t) <= CACHE_TTL) return;
  }

  try {
    const { rows, complete } = await fetchVerified(table, (firstPage)=>{
      // Page 1 arrives ordered by EV desc — render immediately (cold load only)
      if (seq === bootSeq && !warm && !RAW.length) ingest(firstPage);
    });
    if (seq !== bootSeq) return;
    if (complete) ingest(rows);          // verified full read → adopt it
    else if (!warm) ingest(rows);        // cold load we couldn't verify → show it, but don't cache
    // (!complete && warm) → leave the good cached view untouched
    if (complete && rows.length) cacheSet(cacheKey, { t: Date.now(), rows });   // only cache a verified full read
  } catch(err){
    if (seq !== bootSeq) return;
    if (!RAW.length){
      els.content.innerHTML = `<div class="state"><h3>Couldn't load right now</h3>
        <p>Please refresh in a moment.</p></div>`;
      els.content.hidden = false;
    }
  }
}
applyModeUI();
boot();
</script>
</body>
