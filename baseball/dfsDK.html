<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>DraftKings DFS — Card Layout</title>
<link rel="preconnect" href="https://hcwolbvmffkmjcxsumwn.supabase.co" crossorigin />
<style>
  /* All styles scoped to .wrap so the host page's theme (background, fonts, CSS vars) is never touched. */
  .wrap{--brand:#06b6d4;--brand-dark:#0891b2;--glow:rgba(6,182,212,.28);--accent-soft:rgba(6,182,212,.14);--page-bg:#1a1028;--card:#231536;--inset:#1d1230;--surface:#2d1b45;--surface-2:#33204d;--ink:#e8e0f0;--muted:#a89bbe;--muted-2:#7a6b8f;--line:rgba(255,255,255,.10);--line-2:rgba(255,255,255,.06);--good:#6ee7b7;--good-bg:rgba(52,211,153,.16);--warn:#fcd34d;--warn-bg:rgba(251,191,36,.14);--away:#a5b4fc;--away-bg:rgba(129,140,248,.18);--radius:14px;--shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.28);--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    max-width:1180px;margin:0 auto;padding:0 12px 48px;background:transparent;color:var(--ink);font-family:var(--font);-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;}
  .wrap,.wrap *,.wrap *::before,.wrap *::after{box-sizing:border-box;}
  .hdr{position:sticky;top:0;z-index:30;}
  .bar{background:rgba(26,16,40,.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--line);margin:0 -12px;padding:10px 12px;border-radius:0 0 14px 14px;}
  .bar-top{display:flex;align-items:center;gap:8px;}
  .title{font-size:15px;font-weight:700;color:var(--ink);margin-right:auto;display:flex;align-items:baseline;gap:8px;}
  .title .count{font-size:11px;font-weight:600;color:var(--brand);background:var(--accent-soft);padding:2px 7px;border-radius:999px;}
  .field{background:var(--surface);border:1px solid var(--line);border-radius:9px;font-family:var(--font);font-size:13px;color:var(--ink);padding:8px 10px;height:36px;}
  .field::placeholder{color:var(--muted-2);}
  .field:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px var(--glow);}
  .search{flex:0 1 230px;max-width:230px;min-width:0;margin-right:auto;}
  .icon-btn{height:36px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink);font-size:13px;font-weight:600;padding:0 12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .icon-btn:hover{border-color:var(--brand);color:var(--brand);}
  .badge-dot{background:var(--brand);color:#06222a;border-radius:999px;font-size:10px;min-width:16px;height:16px;padding:0 4px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;}
  .bar-row2{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;}
  .seg{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:0 10px;height:36px;}
  .seg label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .seg select{background:transparent;border:none;color:var(--ink);font-weight:600;font-size:13px;height:34px;max-width:230px;}
  .seg select option,.seg select optgroup{color:var(--ink);background:var(--surface);}
  .dir-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:13px;cursor:pointer;}
  .tg{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;height:36px;align-items:center;}
  .tg button{border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer;white-space:nowrap;}
  .tg button.t-on{background:var(--brand);color:#06222a;}
  .tg .tg-lab{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);padding:0 4px 0 6px;}
  .hint{margin-top:7px;font-size:11px;font-weight:600;color:var(--muted);}
  .filters{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:10px;padding:10px 12px;display:none;}
  .filters.open{display:block;}
  .filters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px 10px;}
  .fg{display:flex;flex-direction:column;gap:3px;}
  .fg>label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  .fg select,.fg input{background:var(--surface);border:1px solid var(--line);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--ink);padding:8px 9px;height:36px;}
  .fg select:focus,.fg input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px var(--glow);}
  .fg select option{background:var(--surface);color:var(--ink);}
  .ms{position:relative;}
  .ms-btn{width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--ink);padding:8px 9px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .ms-btn::after{content:"\25BE";color:var(--muted);font-size:11px;}
  .ms-btn:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px var(--glow);}
  .ms-pop{position:absolute;top:calc(100% + 4px);left:0;min-width:100%;max-height:240px;overflow:auto;background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.45);z-index:40;padding:4px;}
  .ms-opt{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;font-size:13px;color:var(--ink);cursor:pointer;white-space:nowrap;}
  .ms-opt:hover{background:var(--inset);}
  .ms-opt input{width:15px;height:15px;accent-color:var(--brand);margin:0;flex:0 0 auto;}
  .ms-all{display:block;width:100%;text-align:left;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--brand);font-family:var(--font);font-size:11.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;padding:6px 8px;margin-bottom:4px;cursor:pointer;}
  .ms-all:hover{background:var(--inset);}
  .fg-range{display:flex;gap:6px;}
  .fg-range input{flex:1;min-width:0;width:100%;}
  .filters-foot{display:flex;justify-content:flex-end;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-2);}
  .clear-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer;}
  .clear-btn:hover{border-color:var(--brand);color:var(--brand);}
  .grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px;}
  @media (min-width:680px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media (min-width:1020px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;font-variant-numeric:tabular-nums;content-visibility:auto;contain-intrinsic-size:auto 300px;}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--edge-c,var(--line));}
  .c-head{display:flex;align-items:flex-start;gap:10px;padding:13px 14px 0;cursor:pointer;}
  .c-main{flex:1;min-width:0;}
  .c-name{font-size:15px;font-weight:700;line-height:1.2;}
  .c-sub{margin-top:4px;font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .c-matchup{margin-top:3px;font-size:11.5px;color:var(--muted);}
  .tag{font-weight:700;color:var(--ink);background:var(--line-2);border-radius:5px;padding:1px 5px;font-size:10.5px;letter-spacing:.3px;}
  .tag.lu.conf{background:var(--good-bg);color:var(--good);}
  .tag.lu.proj{background:var(--warn-bg);color:var(--warn);}
  .vbadge{flex:none;text-align:center;border-radius:10px;padding:5px 10px;background:var(--vb-bg,var(--surface));min-width:64px;}
  .vbadge .v{font-size:17px;font-weight:800;color:var(--vb-fg,var(--ink));line-height:1.05;}
  .vbadge .k{font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-top:2px;}
  /* 2x2 split grid — the anchor + the sort control (value ratio per split) */
  .cgrid{margin:11px 14px 0;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .cell{appearance:none;border:1px solid var(--line);background:var(--cbg,var(--surface));border-radius:10px;padding:7px 9px 6px;text-align:left;cursor:pointer;font-family:inherit;color:var(--ink);transition:box-shadow .12s ease;}
  .cell .cl{font-size:8.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);}
  .cell .cv{font-size:18px;font-weight:800;line-height:1.05;color:var(--cfg,var(--ink));margin-top:1px;}
  .cell .cg{font-size:10px;color:var(--muted);font-weight:600;}
  .cell.active{border-color:var(--brand);box-shadow:0 0 0 2px var(--glow);}
  .cell.empty{cursor:default;background:var(--surface);opacity:.7;}
  .cell.empty .cv{color:var(--muted-2);}
  @media (prefers-reduced-motion:reduce){.cell{transition:none;}}
  .odds{margin:11px 14px 0;display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line-2);border-radius:9px;overflow:hidden;}
  .odds.dfsref{grid-template-columns:repeat(4,1fr);}
  .odds .o{padding:7px 6px 6px;text-align:center;border-right:1px solid var(--line-2);}
  .odds .o:last-child{border-right:none;}
  .odds .o .k{font-size:8.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted-2);}
  .odds .o .v{font-size:14px;font-weight:700;margin-top:2px;}
  .odds .o .b{font-size:9.5px;color:var(--muted);margin-top:1px;line-height:1.1;}
  .expand-row{display:flex;align-items:center;justify-content:space-between;margin:11px 14px 13px;}
  .matchup-mini{font-size:11.5px;color:var(--muted);}
  .matchup-mini b{color:var(--ink);font-weight:700;}
  .exp-btn{background:none;border:1px solid var(--line);color:var(--brand);font-weight:700;font-size:12px;border-radius:8px;padding:6px 12px;cursor:pointer;display:inline-flex;gap:6px;align-items:center;}
  .exp-btn .car{transition:transform .15s ease;}
  @media (prefers-reduced-motion:reduce){.exp-btn .car{transition:none;}}
  .card.open .exp-btn .car{transform:rotate(180deg);}
  .detail{display:none;border-top:1px solid var(--line);background:var(--inset);padding:6px 14px 14px;}
  .card.open .detail{display:block;}
  .panel{margin-top:12px;}
  .panel-h{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--brand);margin:0 0 6px;}
  .mini-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table.mini{width:100%;border-collapse:collapse;font-size:11.5px;}
  table.mini th,table.mini td{padding:4px 6px;text-align:right;border-bottom:1px solid var(--line-2);white-space:nowrap;}
  table.mini th:first-child,table.mini td:first-child{text-align:left;color:var(--muted);font-weight:600;position:sticky;left:0;background:var(--inset);}
  table.mini thead th{color:var(--muted-2);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line);}
  table.mini td{font-weight:600;}
  .pf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px 12px;font-size:11px;margin-top:3px;}
  .pf-grid>div{display:flex;justify-content:space-between;gap:6px;border-bottom:1px solid var(--line-2);padding:2px 0;}
  .pf-grid .pfk{color:var(--muted);font-weight:700;}
  .pf-grid .pfv{font-weight:600;}
  .note-sm{font-size:10px;color:var(--muted-2);margin-top:5px;line-height:1.3;}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:3px 14px;font-size:11.5px;}
  .kv .k{color:var(--muted);} .kv .v{font-weight:600;text-align:right;}
  .wx{font-size:11px;color:var(--ink);display:flex;flex-direction:column;gap:2px;margin-top:6px;}
  .state{text-align:center;padding:60px 20px;color:var(--muted);}
  .state h3{color:var(--ink);margin:0 0 6px;font-size:16px;}
  .state code{background:var(--surface);border:1px solid var(--line);padding:1px 5px;border-radius:4px;}
  .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;margin:0 auto 14px;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){.spinner{animation-duration:1.6s;}}
  .sentinel{height:1px;}
  .loadpill{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:var(--surface);color:var(--ink);border:1px solid var(--line);font-size:12px;font-weight:700;padding:8px 14px;border-radius:999px;box-shadow:0 4px 14px rgba(0,0,0,.4);z-index:50;}
  /* #5: tighter vertical rhythm on desktop/tablet only — mobile (<680px) keeps its spacing */
  @media (min-width:680px){
    .field,.fg select,.fg input,.ms-btn{height:32px;padding-top:5px;padding-bottom:5px;}
    .icon-btn,.seg{height:32px;}
    .seg select{height:30px;}
    .bar{padding-top:8px;padding-bottom:8px;display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;}
    .bar-top,.bar-row2{display:contents;}                                  /* dissolve the row boxes into one flex line */
    .title{order:1;} .search{order:2;margin-right:0;} .seg{order:3;}
    .slate-seg{order:88;margin-left:auto;} #modeToggle{order:89;} #filterToggle{order:90;}
    .bar-row2{margin-top:6px;}
    .filters{margin-top:8px;padding-top:8px;padding-bottom:8px;}
    .filters-grid{gap:6px 10px;}
    .grid{gap:8px;}
    .c-head{padding-top:10px;}
    .c-sub{margin-top:3px;}
    .cgrid{margin-top:8px;gap:5px;}
    .cell{padding-top:5px;padding-bottom:4px;}
    .expand-row{margin-top:8px;margin-bottom:9px;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="hdr">
    <div class="bar">
      <div class="bar-top">
        <div class="title"><span id="titleText">DraftKings DFS · Batters</span> <span class="count" id="count">—</span></div>
        <div class="tg" id="modeToggle"><span class="tg-lab">DraftKings</span>
          <button data-mode="batter" class="t-on" aria-pressed="true">Batter</button>
          <button data-mode="pitcher" aria-pressed="false">Pitcher</button>
        </div>
      </div>
      <div class="bar-top" style="margin-top:8px;">
        <input class="field search" id="search" type="search" placeholder="Search player…" autocomplete="off" aria-label="Search player" />
        <button class="icon-btn" id="filterToggle" aria-expanded="false">Filters <span class="badge-dot" id="filterCount" hidden>0</span></button>
      </div>
      <div class="bar-row2">
        <div class="seg"><label for="sortSel">Rank by</label>
          <select id="sortSel">
            <option value="proj:pts">Projection</option>
            <option value="proj:val">Value (pts/$)</option>
            <option value="rost">Rostership</option>
            <option value="output">Output</option>
          </select>
          <button class="dir-btn" id="sortDir" title="Toggle direction">▼</button>
        </div>
        <div class="seg"><label for="owSel">Output</label>
          <select id="owSel">
            <option value="Full Season|All">Season · All</option>
            <option value="Full Season|loc">Season · Location</option>
            <option value="Last 30 Days|All">L30 · All</option>
            <option value="Last 30 Days|loc">L30 · Location</option>
          </select>
          <select id="basisSel">
            <option value="med">Median</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="seg slate-seg"><label for="slateSel">Slate</label>
          <select id="slateSel"><option value="">All slates</option></select>
        </div>
      </div>
    </div>

    <div class="filters" id="filters">
      <div class="filters-grid">
        <div class="fg"><label>Team</label><div class="ms" data-ms="team"></div></div>
        <div class="fg"><label>Position</label><div class="ms" data-ms="pos"></div></div>
        <div class="fg"><label data-hand-label>Bats</label><div class="ms" data-ms="hand"></div></div>
        <div class="fg"><label>Price</label>
          <div class="fg-range">
            <input type="number" data-filter="prMin" inputmode="numeric" placeholder="Min" />
            <input type="number" data-filter="prMax" inputmode="numeric" placeholder="Max" />
          </div>
        </div>
        <div class="fg"><label>Min points</label><input type="number" data-filter="projMin" inputmode="decimal" placeholder="e.g. 8" /></div>
        <div class="fg"><label>Min value</label><input type="number" data-filter="valMin" inputmode="decimal" placeholder="e.g. 2.5" /></div>
        <div class="fg"><label>Min games</label><input type="number" data-filter="gMin" inputmode="numeric" placeholder="e.g. 20" /></div>
      </div>
      <div class="filters-foot"><button class="clear-btn" id="clearFilters">Clear all</button></div>
    </div>
    </div>

    <div id="content"><div class="state"><div class="spinner"></div><p>Loading…</p></div></div>
    <div class="grid" id="grid" hidden></div>
    <div class="sentinel" id="sentinel"></div>
    <div class="loadpill" id="loadpill" hidden></div>
  </div>

<script>
/* ============================================================
   CONFIG — public anon key. Read-only public access.
   This file builds from the {BOOK} tables: Batter -> BaseballBatter+BOOK, Pitcher -> BaseballStarter+BOOK.
   FD and DK are produced from one source; only the book token differs.
   ============================================================ */
const SUPABASE_URL = "https://hcwolbvmffkmjcxsumwn.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhjd29sYnZtZmZrbWpjeHN1bXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDAzNDQzMTIsImV4cCI6MjA1NTkyMDMxMn0.tM4RwXZpZM6ZHuFFMhWcKYLT3E4NA6Ig90CHw7QtJf0";
const BOOK = "DK";
const BOOK_NAME = BOOK==='DK'?'DraftKings':'FanDuel';
const CACHE_TTL = 3 * 60 * 1000;
const BATCH = 24;
const PAGE_SIZE = 1000;
const MAX_PARALLEL = 6;

const TEAM_NAME_MAP = {'Arizona Diamondbacks':'ARI','Atlanta Braves':'ATL','Baltimore Orioles':'BAL','Boston Red Sox':'BOS','Chicago Cubs':'CHC','Chicago White Sox':'CHW','Cincinnati Reds':'CIN','Cleveland Guardians':'CLE','Colorado Rockies':'COL','Detroit Tigers':'DET','Houston Astros':'HOU','Kansas City Royals':'KCR','Los Angeles Angels':'LAA','Los Angeles Dodgers':'LAD','Miami Marlins':'MIA','Milwaukee Brewers':'MIL','Minnesota Twins':'MIN','New York Mets':'NYM','New York Yankees':'NYY','Athletics':'ATH','Philadelphia Phillies':'PHI','Pittsburgh Pirates':'PIT','San Diego Padres':'SDP','San Francisco Giants':'SFG','Seattle Mariners':'SEA','St. Louis Cardinals':'STL','Tampa Bay Rays':'TBR','Texas Rangers':'TEX','Toronto Blue Jays':'TOR','Washington Nationals':'WSN'};
const TEAM_LC = Object.fromEntries(Object.entries(TEAM_NAME_MAP).map(([k,v])=>[k.toLowerCase(),v]));
const MATCHUP_RE = new RegExp(Object.keys(TEAM_NAME_MAP).sort((a,b)=>b.length-a.length).map(s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|'),'gi');

/* Stat-set definitions — [display, columnToken, formatType].
   Batter & pitcher lines are aligned: the hit ladder (H,1B,2B,3B,HR) sits in the
   same slots in both, with rates pushed to the end. */
const SET_BAT = [['PA','PA','int'],['AB','AB','int'],['H','H','int'],['1B','1B','int'],['2B','2B','int'],['3B','3B','int'],['HR','HR','int'],['RBI','RBI','int'],['R','R','int'],['BB','BB','int'],['SO','SO','int'],['HBP','HBP','int'],['SB','SB','int'],['AVG','AVG','rate'],['H/PA','HpPA','rate']];
const SET_PIT = [['IP','IP','ip'],['TBF','TBF','int'],['H','H','int'],['1B','1B','int'],['2B','2B','int'],['3B','3B','int'],['HR','HR','int'],['ER','ER','int'],['R','R','int'],['BB','BB','int'],['SO','SO','int'],['HBP','HBP','int'],['AVG','AVG','rate'],['ERA','ERA','era'],['H/BF','H/BF','rate']];
const SET_OPP_SP = [['TBF','TBF','int'],['H','H','int'],['1B','1B','int'],['2B','2B','int'],['3B','3B','int'],['HR','HR','int'],['R','R','int'],['ER','ER','int'],['BB','BB','int'],['HBP','HBP','int'],['AVG','AVG','rate'],['ERA','ERA','era']];
const SET_OPP_BP = [['IP','IP','ip'],['TBF','TBF','int'],['H','H','int'],['1B','1B','int'],['2B','2B','int'],['3B','3B','int'],['HR','HR','int'],['R','R','int'],['ER','ER','int'],['BB','BB','int'],['HBP','HBP','int'],['AVG','AVG','rate'],['ERA','ERA','era']];
const PF_SET = [[BOOK,BOOK+' PF'],['H','H PF'],['1B','1B PF'],['2B','2B PF'],['3B','3B PF'],['HR','HR PF'],['R','R PF'],['SO','SO PF'],['BB','BB PF']];

const MODES = {
  batter:  { table:"BaseballBatter"+BOOK,  role:"Batter",  title:"Batters",  handLabel:"Bats" },
  pitcher: { table:"BaseballStarter"+BOOK, role:"Starter", title:"Pitchers", handLabel:"Throws" }
};
let mode = 'batter';
let valBasis = 'med';   // 'med' | 'high' — which projection drives the value ratio
const M = ()=>MODES[mode];
const ownSet = ()=> mode==='batter' ? SET_BAT : SET_PIT;

/* Column-name map for the active mode. */
function fieldMap(){

function posMatch(g){
  if(filters.pos.size===0) return true;   // filters.pos = DESELECTED slots; empty => all shown

  for(const [label,covers] of POS_ACTIVE){ if(!filters.pos.has(label) && covers.some(c=>pp.has(c))) return true; }

const MS = {};

  const pop=document.createElement('div'); pop.className='ms-pop'; pop.hidden=true;
  container.appendChild(btn); container.appendChild(pop);

    syncLabel(){const ex=filters[key].size; btn.textContent = ex===0 ? 'All' : ((ctrl.options.length-ex)+' selected');},
    setOptions(opts){
      ctrl.options=opts.slice();
      [...filters[key]].forEach(v=>{if(!opts.includes(v))filters[key].delete(v);});
      pop.innerHTML='';
      const allBtn=document.createElement('button'); allBtn.type='button'; allBtn.className='ms-all';
      const syncAll=()=>{allBtn.textContent = filters[key].size===0 ? 'Deselect all' : 'Select all';};

        e.stopPropagation();

        const row=document.createElement('label'); row.className='ms-opt';

        const span=document.createElement('span'); span.textContent=label;
        row.appendChild(cb); row.appendChild(span); pop.appendChild(row);

/* ---------- Helpers ---------- */
const num = v=>{const n=parseFloat(v);return isNaN(n)?null:n;};
const raw = v=>{if(v==null)return '–';const s=String(v).trim();return s===''?'–':s;};
const fmtAvg = v=>{const n=parseFloat(v);return isNaN(n)?'–':n.toFixed(1);};                 // projection pts (1 dp)
const fmt2 = v=>{const n=parseFloat(v);return isNaN(n)?'–':n.toFixed(2);};                   // ERA (2 dp)
const fmtRatio = v=>{const n=parseFloat(v);return isNaN(n)?'–':n.toFixed(2);};               // value ratio
/* averages: truncate (not round) to 3 places, force 3, MLB no-leading-zero (.308, .200, .000) */
const fmtAvg3 = v=>{const n=parseFloat(v);if(isNaN(n))return '–';const sign=n<0?'-':'';const t=(Math.trunc(Math.abs(n)*1000)/1000).toFixed(3);return (sign+t).replace(/^(-?)0\./,'$1.');};
/* innings: keep baseball thirds notation but always show a decimal place (47 -> 47.0) */
const fmtIP = v=>{if(v==null)return '–';const s=String(v).trim();if(s===''||s==='-')return '–';return s.includes('.')?s:s+'.0';};
/* park factor: turn "102 (7)" into "102 (#7)" */
const fmtPark = v=>{if(v==null)return '–';const s=String(v).trim();if(s===''||s==='-')return '–';return s.replace(/\((\d+)\)/g,' (#$1)');};
const fmtPrice = v=>{const n=parseFloat(v);return isNaN(n)?'–':'$'+Math.round(n).toLocaleString();};
const fmtRost = v=>{if(v==null)return '–';const s=String(v).trim();if(s===''||s==='-')return '–';return s.includes('%')?s:(s+'%');};
const fmtRostPct = v=>{if(v==null)return '–';const s=String(v).trim();if(s===''||s==='-')return '–';const n=parseFloat(s.replace('%',''));if(isNaN(n))return '–';if(n<=0)return '0%';if(n<1)return '<1%';return Math.round(n)+'%';};   // #6: whole %, sub-1% => <1%
const fmtType = (t,v)=> t==='rate'?fmtAvg3(v) : t==='era'?fmt2(v) : t==='ip'?fmtIP(v) : raw(v);
const esc = s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const CODE_ALIAS={SD:'SDP',SF:'SFG',TB:'TBR',WSH:'WSN',KC:'KCR',CWS:'CHW'};
const canonTeam=c=>{const u=String(c||'').trim().toUpperCase();return CODE_ALIAS[u]||u;};
const abbrTeam=v=>{if(!v)return '';const s=String(v).trim();return TEAM_NAME_MAP[s]||canonTeam(s);};
function etTz(){const d=new Date(),y=d.getFullYear();const m1=new Date(y,2,1),n1=new Date(y,10,1);const dstStart=new Date(y,2,1+((7-m1.getDay())%7)+7);const dstEnd=new Date(y,10,1+((7-n1.getDay())%7));return (d>=dstStart&&d<dstEnd)?'EDT':'EST';}
const ET_TZ = etTz();
const abbrMatchup = v=>!v?'':String(v).replace(MATCHUP_RE,m=>TEAM_LC[m.toLowerCase()]||m).replace(/\b(?:EST|EDT)\b/g,ET_TZ);   // #13: keep gametime, relabel ET zone
const order = v=>{const m=String(v||'').match(/\((\d+)\)/);return m?m[1]:null;};
const lineupTag = v=>{if(!v)return '';const st=/proj/i.test(v)?'Proj':(/conf/i.test(v)?'Conf':'');const o=order(v);if(!st&&!o)return '';return `${st}${o?' #'+o:''}`;};
const titleCase = s=>String(s).replace(/\b\w/g,c=>c.toUpperCase());
const capWx = w=>{const parts=String(w).split('|');if(parts.length)parts[parts.length-1]=titleCase(parts[parts.length-1]);return parts.join('|');};
const handTag = h=>{if(!h)return '';if(mode==='batter')return (h==='B'?'S':h)+'HB';return h+'HP';};

/* Value-ratio color scale (projected pts per $1k). Higher = better value = greener. */
function valColors(r){
  if(r==null)return{edge:'var(--line)',bg:'rgba(255,255,255,.05)',fg:'#7a6b8f'};
  if(r<1)    return{edge:'#f87171',bg:'rgba(248,113,113,.16)',fg:'#fca5a5'};
  if(r<1.75) return{edge:'#fb923c',bg:'rgba(251,146,60,.16)',fg:'#fdba74'};
  if(r<2.5)  return{edge:'#fbbf24',bg:'rgba(251,191,36,.15)',fg:'#fcd34d'};
  if(r<3.25) return{edge:'#34d399',bg:'rgba(52,211,153,.16)',fg:'#6ee7b7'};
  return            {edge:'#10b981',bg:'rgba(16,185,129,.24)',fg:'#34d399'};
}
// same 5-color ramp, but keyed to a 0..1 position so each stat can be scaled to its own field range
function rampColor(t){
  if(t==null||isNaN(t))return{edge:'var(--line)',bg:'rgba(255,255,255,.05)',fg:'#7a6b8f'};
  if(t<0.2)return{edge:'#f87171',bg:'rgba(248,113,113,.16)',fg:'#fca5a5'};
  if(t<0.4)return{edge:'#fb923c',bg:'rgba(251,146,60,.16)',fg:'#fdba74'};
  if(t<0.6)return{edge:'#fbbf24',bg:'rgba(251,191,36,.15)',fg:'#fcd34d'};
  if(t<0.8)return{edge:'#34d399',bg:'rgba(52,211,153,.16)',fg:'#6ee7b7'};
  return{edge:'#10b981',bg:'rgba(16,185,129,.24)',fg:'#34d399'};
}
function pct(v,arr){if(v==null||!arr||arr.length<2)return null;let below=0;for(const x of arr)if(x<v)below++;return below/(arr.length-1);}   // percentile rank in the field (outlier-robust)
function pctColor(v,arr,invert){const t=pct(v,arr);if(t==null)return rampColor(null);return rampColor(invert?1-t:t);}

/* ---------- Data ---------- */
function buildQuery(){ return `${SUPABASE_URL}/rest/v1/${M().table}?select=*`; }
async function fetchPage(url,offset,extra,limit){const lim=limit||PAGE_SIZE;const res=await fetch(url,{headers:{apikey:ANON_KEY,Authorization:"Bearer "+ANON_KEY,Accept:"application/json",'Range-Unit':'items',Range:`${offset}-${offset+lim-1}`,...extra}});if(!res.ok){const e=new Error(`Supabase ${res.status}`);e.status=res.status;throw e;}return {rows:await res.json(),contentRange:res.headers.get('content-range')};}
async function fetchAll(cb){
  const url=buildQuery();
  const first=await fetchPage(url,0,{Prefer:'count=exact'},PAGE_SIZE);
  const ps=first.rows.length||PAGE_SIZE;
  const m=/\/(\d+)$/.exec(first.contentRange||'');
  const total=m?parseInt(m[1],10):(first.rows.length<PAGE_SIZE?first.rows.length:null);
  let out=first.rows.slice();
  if(cb)cb(out,total,true,out.length);
  if(ps===0||(total!=null&&out.length>=total)||(total==null&&first.rows.length<PAGE_SIZE))return {rows:out, total, url};
  if(total!=null){
    const offsets=[];for(let o=ps;o<total;o+=ps)offsets.push(o);
    const results=new Array(offsets.length);let i=0,loaded=out.length;
    await Promise.all(Array.from({length:Math.min(MAX_PARALLEL,offsets.length)},async()=>{while(i<offsets.length){const idx=i++;const r=await fetchPage(url,offsets[idx],{},ps);results[idx]=r.rows;loaded+=r.rows.length;if(cb)cb(null,total,false,loaded);}}));
    for(const r of results) out=out.concat(r);
  }else{
    let offset=ps;while(true){const r=await fetchPage(url,offset,{},ps);out=out.concat(r.rows);if(cb)cb(null,null,false,out.length);if(r.rows.length<ps)break;offset+=ps;}
  }
  return {rows:out, total, url};
}

/* ---------- Grouping ---------- */
const readCols=(row,fn,set)=>{const o={};for(const t of set)o[t[1]]=row[fn(t[1])];return o;};
function buildGroups(rows){
  const F=fieldMap(); const role=M().role; const isBat=mode==='batter';
  const set=ownSet();
  const map=new Map();
  for(const row of rows){
    const player=row[F.player]; if(!player) continue;
    let g=map.get(player);
    if(!g){
      g={key:player, player, team:row[F.team], hand:row[F.hand], pos:row[F.pos], price:num(row[F.price]),
        rostership:row[F.rostership], projection:row[F.projection], gp:row[F.gp], lineup:row[F.lineup],
        matchup:row[F.matchup], spread:row[F.spread], total:row[F.total],
        stadium:row[F.stadium], dome:row[F.dome], wx:[row[F.wx1],row[F.wx2],row[F.wx3],row[F.wx4]].filter(Boolean),
        pf:PF_SET.map(([lbl,col])=>[lbl,row[col]]),
        variants:{}, _q:String(player).toLowerCase(), _matchupAb:abbrMatchup(row[F.matchup])};
      g.slateMap=parseSlateRost(row[F.slateRost]); g._slates=new Set(Object.keys(g.slateMap));
      if(isBat){
        g.sp=row['Starter'];
        g.bpNL=row['Bullpen L Count']; g.bpNR=row['Bullpen R Count'];
      }else{
        g.luNL=row['Lineup Lefties']; g.luNR=row['Lineup Righties']; g.luNS=row['Lineup Switch'];
        g.luO=readCols(row,c=>`Lineup ${c}`,SET_BAT);
        g.luV=readCols(row,c=>`Lineup V ${c}`,SET_BAT);
      }
      map.set(player,g);
    }
    const vk=`${row[F.period]}|${row[F.split]}`;
    const vv={ratio:num(row[F.ratioMed]), ratioHigh:num(row[F.ratioHigh]),
      med:num(row[F.projMed]), avg:num(row[F.projAvg]), high:num(row[F.projHigh]), low:num(row[F.projLow]), mode:row[F.projMode],
      prod:{O:readCols(row,c=>`${role} ${c}`,set), L:readCols(row,c=>`${role} L ${c}`,set), R:readCols(row,c=>`${role} R ${c}`,set)}};
    if(isBat){ vv.spO=readCols(row,c=>`Starter ${c}`,SET_OPP_SP); vv.spV=readCols(row,c=>`Starter ${c} V`,SET_OPP_SP); vv.bpL=readCols(row,c=>`Bullpen ${c} L`,SET_OPP_BP); vv.bpR=readCols(row,c=>`Bullpen ${c} R`,SET_OPP_BP); }
    g.variants[vk]=vv;
  }
  const arr=[...map.values()];
  GMAP.clear();
  for(const g of arr){
    const ks=Object.keys(g.variants);
    g.location=ks.some(k=>k.endsWith('|Home'))?'Home':(ks.some(k=>k.endsWith('|Away'))?'Away':null);
    g._season=g.variants['Full Season|All']||Object.values(g.variants)[0]||null;
    GMAP.set(g.key,g);
  }
  return arr;
}

/* variant getters */
function cellVar(g,period,sp){if(sp==='loc'){if(!g.location)return null;return g.variants[`${period}|${g.location}`]||null;}return g.variants[`${period}|${sp}`]||null;}
function keyVar(g,key){const [period,sp]=key.split('|');return cellVar(g,period,sp);}
function activeVar(g){const [period,sp]=dispWS.split('|');return cellVar(g,period,sp)||g.variants[`${period}|All`]||g._season;}
const ratioOf=v=>v?(valBasis==='high'?v.ratioHigh:v.ratio):null;   // value ratio for active basis
const projOf =v=>v?(valBasis==='high'?v.high:v.med):null;          // historical median/high (raw)
const projPts = g=>{const p=(g.projection===''||g.projection==null)?null:Number(g.projection);return (p==null||isNaN(p))?null:p;};   // market projection (pts)
const projValue = g=>{const p=projPts(g),pr=Number(g.price);return (p!=null&&pr>0)?p/(pr/1000):null;};                                 // projection value (pts per $1k)
const isWS = m=>m.indexOf(':')<0&&m.indexOf('|')>=0;
function outputVal(g){const [period,sp]=dispWS.split('|');const v=cellVar(g,period,sp);return v?(valBasis==='high'?v.high:v.med):null;}
function outputLabel(g){const [period,sp]=dispWS.split('|');const per=period==='Full Season'?'Season':'L30';const loc=(sp==='loc')?((g&&g.location)?g.location:'Loc'):'All';return per+' · '+loc+' · '+(valBasis==='high'?'High':'Med');}
function sortValue(g){
  if(sortMode==='proj:pts')return projPts(g);
  if(sortMode==='proj:val')return projValue(g);
  if(sortMode==='rost'){const r=Number(g.rostership);return isNaN(r)?null:r;}
  if(sortMode==='output')return outputVal(g);
  return null;
}
function sortCard(g,key,label,valStr,sub,col){const active=sortMode===key?' active':'';const st=col?` style="--cbg:${col.bg};--cfg:${col.fg}"`:'';return `<button type="button" class="cell${active}" data-sortkey="${key}"${st}><div class="cl">${esc(label)}</div><div class="cv">${valStr}</div><div class="cg">${sub?esc(sub):'&nbsp;'}</div></button>`;}
let VALS={proj:[],val:[],rost:[],out:[]};
function recomputeProd(){
  const proj=[],val=[],rost=[],out=[];
  for(const g of GROUPS){
    g._prodVar=activeVar(g);
    const p=projPts(g); if(p!=null)proj.push(p);
    const vv=projValue(g); if(vv!=null)val.push(vv);
    const r=Number(g.rostership); if(!isNaN(r))rost.push(r);
    const o=outputVal(g); if(o!=null)out.push(o);
  }
  const sort=a=>a.slice().sort((x,y)=>x-y);
  VALS={proj:sort(proj),val:sort(val),rost:sort(rost),out:sort(out)};
}

/* ---------- Filters / sort ---------- */
function uniq(getter){return [...new Set(GROUPS.map(getter).filter(v=>v!=null&&v!==''))];}
function populateFilters(){
  populateSlates();
  MS.team.setOptions(uniq(g=>g.team).sort());
  MS.hand.setOptions(uniq(g=>g.hand).sort());
  if(mode==='batter'){ POS_ACTIVE=POS_SLOTS; MS.pos.setOptions(POS_SLOTS.map(x=>x[0])); }
  else{ filters.pos.clear(); POS_ACTIVE=[]; MS.pos.setOptions([]); }   // pitchers: position filter removed
  document.querySelectorAll('input[data-filter]').forEach(el=>{const k=el.getAttribute('data-filter'); el.value=filters[k]||'';});
  els.search.value=filters.search||'';
}
function applySort(){
  recomputeProd();
  const dir=sortDir==='asc'?1:-1;
  SORTED=GROUPS.slice().sort((a,b)=>{
    const sa=sortValue(a),sb=sortValue(b);
    if(sa==null&&sb==null) return a._q<b._q?-1:a._q>b._q?1:0;
    if(sa==null) return 1; if(sb==null) return -1;
    if(sa!==sb) return (sa-sb)*dir;
    return a._q<b._q?-1:a._q>b._q?1:0;
  });
  applyFilters();
}
function applyFilters(){
  const s=filters.search.trim().toLowerCase();
  const prMin=filters.prMin!==''?parseFloat(filters.prMin):null, prMax=filters.prMax!==''?parseFloat(filters.prMax):null;
  const pjMin=filters.projMin!==''?parseFloat(filters.projMin):null;
  const vMin=filters.valMin!==''?parseFloat(filters.valMin):null;
  const gMin=filters.gMin!==''?parseInt(filters.gMin,10):null;
  const av=g=>keyVar(g,sortMode);
  VIEW=SORTED.filter(g=>{
    if(s&&!g._q.includes(s))return false;
    if(currentSlate&&!(g._slates&&g._slates.has(currentSlate)))return false;
    if(filters.team.has(g.team))return false;
    if(!posMatch(g))return false;
    if(filters.hand.has(g.hand))return false;
    if(prMin!=null&&(g.price==null||g.price<prMin))return false;
    if(prMax!=null&&(g.price==null||g.price>prMax))return false;
    if(pjMin!=null){const p=projPts(g);if(p==null||p<pjMin)return false;}
    if(vMin!=null){const r=projValue(g);if(r==null||r<vMin)return false;}
    if(gMin!=null){const gp=Number(g.gp);if(!isFinite(gp)||gp<gMin)return false;}
    return true;
  });
  rendered=0;els.grid.innerHTML='';els.grid.hidden=VIEW.length===0;els.count.textContent=VIEW.length.toLocaleString();
  if(VIEW.length===0){els.content.innerHTML='<div class="state"><h3>No matching players</h3><p>Loosen a filter to see more.</p></div>';els.content.hidden=false;}
  else{els.content.hidden=true;fillViewport();}
  const active=(filters.team.size?1:0)+(filters.pos.size?1:0)+(filters.hand.size?1:0)+['prMin','prMax','projMin','valMin','gMin'].filter(k=>filters[k]!=='').length;
  els.filterCount.hidden=active===0;els.filterCount.textContent=active;
}

/* ---------- Render ---------- */
function statTable(set, rows){
  const heads=set.map(([d])=>`<th>${esc(d)}</th>`).join('');
  const body=rows.map(([lbl,obj])=>{
    const tds=set.map(([,col,typ])=>`<td>${fmtType(typ,obj?obj[col]:null)}</td>`).join('');
    return `<tr><td>${esc(lbl)}</td>${tds}</tr>`;
  }).join('');
  return `<div class="mini-scroll"><table class="mini"><thead><tr><th></th>${heads}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function valCell(g,key,label){
  const v=keyVar(g,key);const active=sortMode===key?' active':'';
  if(!v||projOf(v)==null)return `<div class="cell empty${active}"><div class="cl">${esc(label)}</div><div class="cv">–</div><div class="cg">&nbsp;</div></div>`;
  const c=valColors(ratioOf(v));   // color still hints value; number is now the raw historical figure
  return `<button type="button" class="cell${active}" data-sortkey="${key}" style="--cbg:${c.bg};--cfg:${c.fg}"><div class="cl">${esc(label)}</div><div class="cv">${fmtAvg(projOf(v))}</div><div class="cg">${valBasis==='high'?'High':'Median'} Output</div></button>`;
}
function cardHTML(g){
  const isBat=mode==='batter';
  const hand=g.hand?`<span class="tag">${esc(handTag(g.hand))}</span>`:'';
  const lu=isBat?lineupTag(g.lineup):''; const luCls=/proj/i.test(g.lineup||'')?'proj':(/conf/i.test(g.lineup||'')?'conf':'');
  const luTag=lu?`<span class="tag lu ${luCls}" title="${esc(g.lineup||'')}">${esc(lu)}</span>`:'';
  const loc=g.location||'Loc';
  const c=pctColor(projPts(g),VALS.proj,false);   // edge accent = projection percentile
  const swS=(g.luNS&&String(g.luNS)!=='0')?(' / '+raw(g.luNS)+' SHB'):'';
  const mini = isBat ? `vs <b>${esc(g.sp||'—')}</b>` : `vs <b>${g.luNL!=null?(raw(g.luNL)+' LHB / '+raw(g.luNR)+' RHB'+swS):'lineup'}</b>`;
  return `
  <div class="card" data-key="${esc(g.key)}" style="--edge-c:${c.edge}">
    <div class="c-head">
      <div class="c-main"><div class="c-name">${esc(g.player)}</div>
        <div class="c-sub"><span class="tag">${esc(abbrTeam(g.team))}</span> ${hand} ${luTag} <span class="tag">${esc(g.pos||'–')}</span> <span class="tag">${fmtPrice(g.price)}</span></div>
        <div class="c-matchup">${esc(g._matchupAb)}</div></div>
    </div>
    <div class="cgrid">
      ${sortCard(g,'proj:pts','Projected Points',projPts(g)!=null?fmtAvg(projPts(g)):'–','pts',pctColor(projPts(g),VALS.proj,false))}
      ${sortCard(g,'proj:val','Projected Value',projValue(g)!=null?fmtRatio(projValue(g)):'–','pts/$',pctColor(projValue(g),VALS.val,false))}
      ${sortCard(g,'rost','Projected Rostership',rostDisp(g),'',pctColor(Number(g.rostership),VALS.rost,true))}
      ${sortCard(g,'output',outputLabel(g),outputVal(g)!=null?fmtAvg(outputVal(g)):'–','output',pctColor(outputVal(g),VALS.out,false))}
    </div>
    <div class="expand-row"><div class="matchup-mini">${mini}</div>
      <button class="exp-btn" type="button">Detail <span class="car">▾</span></button></div>
    <div class="detail"></div>
  </div>`;
}

/* ---------- Detail (lazy) ---------- */
function detailHTML(g){
  const isBat=mode==='batter';
  const [perRaw,spRaw]=dispWS.split('|');
  const perLbl=perRaw==='Full Season'?'full season':'last 30 days';
  const splitLbl=(spRaw==='loc'&&g.location)?(' · '+g.location.toLowerCase()):' · all games';
  const v=g._prodVar||g._season;
  const oppA=isBat?'vs LHP':'vs LHB', oppB=isBat?'vs RHP':'vs RHB';
  const prodH=isBat?'Hitter production':'Pitcher production';
  const prodPanel = `<div class="panel"><div class="panel-h">${prodH} — ${perLbl}${splitLbl}</div>${v?statTable(ownSet(),[['Overall',v.prod.O],[oppA,v.prod.L],[oppB,v.prod.R]]):''}</div>`;
  let oppPanel;
  if(isBat){
    const spHand=/\(L\)/i.test(g.sp||'')?'L':(/\(R\)/i.test(g.sp||'')?'R':null);
    const faceHand=g.hand==='B'?(spHand==='R'?'L':spHand==='L'?'R':null):(g.hand==='L'?'L':g.hand==='R'?'R':null);
    const faceLbl=faceHand==='L'?'vs LHB':faceHand==='R'?'vs RHB':'Platoon';
    const batsLbl=g.hand==='L'?'LHB':(g.hand==='R'?'RHB':'switch hitters');
    oppPanel=`
    <div class="panel"><div class="panel-h">Opposing starter — ${esc(g.sp||'—')} · ${perLbl}</div>
      ${statTable(SET_OPP_SP,[['Overall',v&&v.spO],[faceLbl,v&&v.spV]])}</div>
    <div class="panel"><div class="panel-h">Opposing bullpen — ${raw(g.bpNL)} LH / ${raw(g.bpNR)} RH · ${perLbl}</div>
      ${statTable(SET_OPP_BP,[['LH pen vs '+batsLbl,v&&v.bpL],['RH pen vs '+batsLbl,v&&v.bpR]])}</div>`;
  }else{
    const myHand=g.hand==='L'?'L':g.hand==='R'?'R':null;
    const vsLbl=myHand?('vs '+myHand+'HP'):'vs hand';
    const sw=(g.luNS&&String(g.luNS)!=='0')?(' / '+raw(g.luNS)+' S'):'';
    oppPanel=`
    <div class="panel"><div class="panel-h">Opposing lineup — ${raw(g.luNL)} LHB / ${raw(g.luNR)} RHB${sw}</div>
      ${statTable(SET_BAT,[['Overall',g.luO],[vsLbl,g.luV]])}</div>`;
  }
  const pf=`<div class="panel-h" style="margin-top:10px">Park factors (rank)</div>
    <div class="pf-grid">${g.pf.map(([lbl,val])=>`<div><span class="pfk">${esc(lbl)}</span><span class="pfv">${esc(fmtPark(val))}</span></div>`).join('')}</div>`;
  return `
    ${prodPanel}
    ${oppPanel}
    <div class="panel"><div class="panel-h">Environment</div>
      <div class="kv"><span class="k">Spread</span><span class="v">${esc(g.spread||'–')}</span>
        <span class="k">Total</span><span class="v">${esc(g.total||'–')}</span>
        <span class="k">Games played</span><span class="v">${raw(g.gp)}</span>
        <span class="k">Stadium</span><span class="v">${esc(g.stadium||'–')}</span>
        <span class="k">Dome</span><span class="v">${esc(g.dome||'–')}</span></div>
      ${pf}
      ${g.wx.length?`<div class="wx">${g.wx.map(w=>`<div>${esc(capWx(w))}</div>`).join('')}</div>`:''}
    </div>`;
}

function renderMore(){if(rendered>=VIEW.length)return;const slice=VIEW.slice(rendered,rendered+BATCH);els.grid.insertAdjacentHTML('beforeend',slice.map(cardHTML).join(''));rendered+=slice.length;}
function fillViewport(){let guard=0;do{renderMore();guard++;}while(rendered<VIEW.length&&els.sentinel.getBoundingClientRect().top<window.innerHeight+700&&guard<50);}
const io=new IntersectionObserver(e=>{if(e[0].isIntersecting)fillViewport();},{rootMargin:'700px'});io.observe(els.sentinel);

/* ---------- Events ---------- */
function setSort(mode_){sortMode=mode_;sortDir='desc';if(els.sortSel.value!==mode_)els.sortSel.value=mode_;els.sortDir.textContent='▼';applySort();}
els.grid.addEventListener('click',e=>{
  const cell=e.target.closest('.cell[data-sortkey]');
  if(cell){setSort(cell.dataset.sortkey);window.scrollTo({top:0,behavior:'smooth'});return;}
  if(e.target.closest('a'))return;
  const card=e.target.closest('.card');if(!card)return;
  if(!e.target.closest('.exp-btn')&&!e.target.closest('.c-head'))return;
  const opening=!card.classList.contains('open');
  if(opening){const d=card.querySelector('.detail');if(!d.firstChild){const g=GMAP.get(card.dataset.key);if(g)d.innerHTML=detailHTML(g);}}
  card.classList.toggle('open');
});
let searchTimer;
els.search.addEventListener('input',e=>{filters.search=e.target.value;clearTimeout(searchTimer);searchTimer=setTimeout(()=>{saveFilters();applyFilters();},120);});
els.filterToggle.addEventListener('click',()=>{const open=els.filters.classList.toggle('open');els.filterToggle.setAttribute('aria-expanded',open);});
document.querySelectorAll('input[data-filter]').forEach(el=>{const k=el.getAttribute('data-filter');el.addEventListener('input',()=>{filters[k]=el.value;saveFilters();applyFilters();});});
els.clearFilters.addEventListener('click',()=>{const sv=filters.search;filters=newFilters();filters.search=sv;document.querySelectorAll('input[data-filter]').forEach(el=>el.value='');Object.values(MS).forEach(c=>c.setOptions(c.options));saveFilters();applyFilters();});
els.sortSel.addEventListener('change',e=>setSort(e.target.value));
els.slateSel.addEventListener('change',e=>{currentSlate=e.target.value;applyFilters();});
els.sortDir.addEventListener('click',()=>{sortDir=sortDir==='asc'?'desc':'asc';els.sortDir.textContent=sortDir==='asc'?'▲':'▼';applySort();});
els.owSel.addEventListener('change',e=>{dispWS=e.target.value;applySort();});
els.basisSel.addEventListener('change',e=>{valBasis=e.target.value;applySort();});

function applyModeUI(){
  els.titleText.textContent=BOOK_NAME+' DFS · '+M().title;
  const hl=document.querySelector('[data-hand-label]'); if(hl) hl.textContent=M().handLabel;
  const posEl=document.querySelector('.ms[data-ms="pos"]'), posFg=posEl&&posEl.closest('.fg');
  if(posFg) posFg.style.display=(mode==='batter')?'':'none';   // no meaningful position filter for pitchers
}
els.modeToggle.addEventListener('click',e=>{
  const btn=e.target.closest('button[data-mode]'); if(!btn) return;
  const next=btn.getAttribute('data-mode'); if(next===mode) return;
  saveFilters();
  mode=next;
  [...els.modeToggle.querySelectorAll('button')].forEach(b=>{const on=b===btn;b.classList.toggle('t-on',on);b.setAttribute('aria-pressed',on);});
  loadFilters();
  applyModeUI();
  GROUPS=[];SORTED=[];GMAP.clear();els.grid.innerHTML='';els.grid.hidden=true;
  els.content.hidden=false;els.content.innerHTML='<div class="state"><div class="spinner"></div><p>Loading…</p></div>';
  boot();
});

/* ---------- Cache (Cache API) ---------- */
async function cacheGet(key){if(location.protocol==='file:'||!('caches'in self))return null;try{const c=await caches.open('bbdfs-v1');const r=await c.match('/'+key);return r?await r.json():null;}catch(e){return null;}}
async function cacheSet(key,obj){if(location.protocol==='file:'||!('caches'in self))return;try{const c=await caches.open('bbdfs-v1');await c.put('/'+key,new Response(JSON.stringify(obj),{headers:{'Content-Type':'application/json'}}));}catch(e){}}

/* ---------- Boot (stream the full table; cache; stale-while-revalidate) ---------- */
function fmtN(n){return n>=1000?(((n/1000).toFixed(n>=10000?0:1)).replace(/\.0$/,''))+'k':String(n);}
function setProg(loaded,total){if(!els.loadpill)return;els.loadpill.hidden=false;els.loadpill.textContent='Loading…';}
function setProgDone(){if(els.loadpill)els.loadpill.hidden=true;}
function ingest(rows){GROUPS=buildGroups(rows);populateFilters();applySort();}
/* count-only probe used to confirm the table isn't mid-upload */
async function countOnly(url){try{const r=await fetchPage(url,0,{Prefer:'count=exact'},1);const m=/\/(\d+)$/.exec(r.contentRange||'');return m?parseInt(m[1],10):null;}catch(e){return null;}}
/* Load the full table, retrying if we catch it mid-upload (count unstable / rows != count). */
async function fetchVerified(cb){
  const TRIES=4; let last=[];
  for(let t=0;t<TRIES;t++){
    const {rows,total,url}=await fetchAll(t===0?cb:null);
    last=rows;
    const after=await countOnly(url);
    if(total!=null && rows.length===total && after===total) return {rows, complete:true};
    await new Promise(r=>setTimeout(r, 400*(t+1)));
  }
  return {rows:last, complete:false};
}
async function boot(){
  const seq=++bootSeq;
  const table=M().table, cacheKey='bbdfs_'+BOOK+'_'+mode;
  const cached=await cacheGet(cacheKey);
  if(seq!==bootSeq)return;
  const warm=cached&&Array.isArray(cached.rows)&&cached.rows.length;
  if(warm){ingest(cached.rows);if((Date.now()-cached.t)<=CACHE_TTL)return;}
  try{
    const {rows,complete}=await fetchVerified((firstRows,total,isFirst,loaded)=>{
      if(seq!==bootSeq)return;
      if(!warm&&isFirst&&firstRows&&firstRows.length&&!GROUPS.length) ingest(firstRows);
      setProg(loaded,total);
    });
    if(seq!==bootSeq)return;
    if(complete) ingest(rows);
    else if(!warm) ingest(rows);
    setProgDone();
    if(!GROUPS.length){
      els.grid.hidden=true;els.content.hidden=false;
      els.content.innerHTML = `<div class="state"><h3>Nothing to show yet</h3><p>Check back closer to game time.</p></div>`;
      return;
    }
    if(complete&&rows.length) cacheSet(cacheKey,{t:Date.now(),rows});
  }catch(err){
    if(seq!==bootSeq)return;
    setProgDone();
    if(!GROUPS.length){els.content.innerHTML=`<div class="state"><h3>Couldn't load right now</h3><p>Please refresh in a moment.</p></div>`;els.content.hidden=false;}
  }
}
applyModeUI();
boot();
</script>
