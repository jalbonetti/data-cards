<style>
  /* Teal-on-dark-purple theme (matches the Same-Team Prop Checker). Scoped to .wrap. */
  .wrap{--brand:#06b6d4;--brand-dark:#0891b2;--glow:rgba(6,182,212,.28);--accent-soft:rgba(6,182,212,.14);

<script>
/* Joins four Supabase tables on Matchup ID:
   BaseballMatchupsGame / ...Batters / ...Starters / ...Bullpen
   Each card = one team's lineup + the OPPOSING starter & bullpen it faces. */
const SUPABASE_URL = "https://hcwolbvmffkmjcxsumwn.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhjd29sYnZtZmZrbWpjeHN1bXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDAzNDQzMTIsImV4cCI6MjA1NTkyMDMxMn0.tM4RwXZpZM6ZHuFFMhWcKYLT3E4NA6Ig90CHw7QtJf0";
const CACHE_TTL = 3 * 60 * 1000;
const BATCH = 12;
const PAGE_SIZE = 1000;
const MAX_PARALLEL = 6;

const TEAM_NAME_MAP = {'Arizona Diamondbacks':'ARI','Atlanta Braves':'ATL','Baltimore Orioles':'BAL','Boston Red Sox':'BOS','Chicago Cubs':'CHC','Chicago White Sox':'CHW','Cincinnati Reds':'CIN','Cleveland Guardians':'CLE','Colorado Rockies':'COL','Detroit Tigers':'DET','Houston Astros':'HOU','Kansas City Royals':'KCR','Los Angeles Angels':'LAA','Los Angeles Dodgers':'LAD','Miami Marlins':'MIA','Milwaukee Brewers':'MIL','Minnesota Twins':'MIN','New York Mets':'NYM','New York Yankees':'NYY','Athletics':'ATH','Philadelphia Phillies':'PHI','Pittsburgh Pirates':'PIT','San Diego Padres':'SDP','San Francisco Giants':'SFG','Seattle Mariners':'SEA','St. Louis Cardinals':'STL','Tampa Bay Rays':'TBR','Texas Rangers':'TEX','Toronto Blue Jays':'TOR','Washington Nationals':'WSN'};

/* Stat-set definitions — [display, columnToken, formatType] */
const SET_BAT = [['G','Games','int'],['PA','PA','int'],['AB','AB','int'],['H','H','int'],['1B','1B','int'],['2B','2B','int'],['3B','3B','int'],['HR','HR','int'],['RBI','RBI','int'],['R','R','int'],['BB','BB','int'],['IBB','IBB','int'],['SO','SO','int'],['HBP','HBP','int'],['SB','SB','int'],['CS','CS','int'],['SF','SF','int'],['SH','SH','int'],['GDP','GDP','int'],['AVG','AVG','rate'],['OBP','OBP','rate'],['SLG','SLG','rate'],['H/PA','H/PA','rate']];
const SET_SP  = [['G','Games','int'],['IP','IP','ip'],['TBF','TBF','int'],['H','H','int'],['2B','2B','int'],['3B','3B','int'],['HR','HR','int'],['R','R','int'],['ER','ER','int'],['BB','BB','int'],['IBB','IBB','int'],['SO','SO','int'],['HBP','HBP','int'],['W','W','int'],['AVG','AVG','rate'],['OBP','OBP','rate'],['SLG','SLG','rate'],['ERA','ERA','era'],['H/TBF','H/TBF','rate']];
const SET_BP  = [['IP','IP','ip'],['TBF','TBF','int'],['H','H','int'],['HR','HR','int'],['R','R','int'],['ER','ER','int'],['BB','BB','int'],['SO','SO','int'],['H/TBF','H/TBF','rate']];
const PF_STATS = ['H','1B','2B','3B','HR','R','BB','SO'];
const SET_PF = PF_STATS.map(s=>[s,s,'park']);

/* ---------- State ---------- */
let CARDS = [], VIEW = [], rendered = 0;
const GMAP = new Map();
let split = 'Full Season|All';   // window + location
const filters = {search:'',team:'',game:'',side:''};
const els = {content:document.getElementById('content'),grid:document.getElementById('grid'),count:document.getElementById('count'),search:document.getElementById('search'),filters:document.getElementById('filters'),filterToggle:document.getElementById('filterToggle'),filterCount:document.getElementById('filterCount'),clearFilters:document.getElementById('clearFilters'),splitSel:document.getElementById('splitSel'),sentinel:document.getElementById('sentinel'),loadpill:document.getElementById('loadpill')};

/* ---------- Helpers ---------- */
const num = v=>{const n=parseFloat(v);return isNaN(n)?null:n;};
const raw = v=>{if(v==null)return '–';const s=String(v).trim();return s===''?'–':s;};
const has = v=>v!=null&&String(v).trim()!==''&&String(v).trim()!=='-';
const fmt2 = v=>{const n=parseFloat(v);return isNaN(n)?'–':n.toFixed(2);};
const fmtAvg3 = v=>{const n=parseFloat(v);if(isNaN(n))return '–';const sign=n<0?'-':'';const t=(Math.trunc(Math.abs(n)*1000)/1000).toFixed(3);return (sign+t).replace(/^(-?)0\./,'$1.');};
const fmtIP = v=>{if(v==null)return '–';const s=String(v).trim();if(s===''||s==='-')return '–';return s.includes('.')?s:s+'.0';};
const fmtPark = v=>{if(v==null)return '–';const s=String(v).trim();if(s===''||s==='-')return '–';return s.replace(/\((\d+)\)/g,' (#$1)');};
const fmtType = (t,v)=> t==='rate'?fmtAvg3(v) : t==='era'?fmt2(v) : t==='ip'?fmtIP(v) : t==='park'?fmtPark(v) : raw(v);
const esc = s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const CODE_ALIAS={SD:'SDP',SF:'SFG',TB:'TBR',WSH:'WSN',KC:'KCR',CWS:'CHW'};   // tolerate short-code variants
const canonTeam=c=>{const u=String(c||'').trim().toUpperCase();return CODE_ALIAS[u]||u;};
const abbrTeam=v=>{if(!v)return '';const s=String(v).trim();return TEAM_NAME_MAP[s]||canonTeam(s);};
function etTz(){const d=new Date(),y=d.getFullYear();const m1=new Date(y,2,1),n1=new Date(y,10,1);const dstStart=new Date(y,2,1+((7-m1.getDay())%7)+7);const dstEnd=new Date(y,10,1+((7-n1.getDay())%7));return (d>=dstStart&&d<dstEnd)?'EDT':'EST';}
const ET_TZ = etTz();
const fmtTime = v=>!v?'':String(v).replace(/\b(EST|EDT)\b/g,ET_TZ);
const stripHand = v=>String(v||'').replace(/\s*\([LRS]\)\s*$/i,'').trim();
const handOf = v=>{const m=String(v||'').match(/\(([LRS])\)\s*$/i);return m?m[1].toUpperCase():'';};
const readCols = (row,fn,set)=>{const o={};for(const t of set)o[t[1]]=row[fn(t[1])];return o;};

/* ---------- Data ---------- */
async function fetchPage(table,offset,extra,limit){const lim=limit||PAGE_SIZE;const url=`${SUPABASE_URL}/rest/v1/${table}?select=*`;const res=await fetch(url,{headers:{apikey:ANON_KEY,Authorization:"Bearer "+ANON_KEY,Accept:"application/json",'Range-Unit':'items',Range:`${offset}-${offset+lim-1}`,...extra}});if(!res.ok){const e=new Error(`Supabase ${res.status}`);e.status=res.status;throw e;}return {rows:await res.json(),contentRange:res.headers.get('content-range')};}
async function fetchTable(table){
  const first=await fetchPage(table,0,{Prefer:'count=exact'},PAGE_SIZE);
  const ps=first.rows.length||PAGE_SIZE;
  const m=/\/(\d+)$/.exec(first.contentRange||'');
  const total=m?parseInt(m[1],10):(first.rows.length<PAGE_SIZE?first.rows.length:null);
  let out=first.rows.slice();
  if(ps===0||(total!=null&&out.length>=total)||(total==null&&first.rows.length<PAGE_SIZE))return {rows:out, total};
  if(total!=null){
    const offsets=[];for(let o=ps;o<total;o+=ps)offsets.push(o);
    const results=new Array(offsets.length);let i=0;
    await Promise.all(Array.from({length:Math.min(MAX_PARALLEL,offsets.length)},async()=>{while(i<offsets.length){const idx=i++;const r=await fetchPage(table,offsets[idx],{},ps);results[idx]=r.rows;}}));
    for(const r of results) out=out.concat(r);
  }else{
    let offset=ps;while(true){const r=await fetchPage(table,offset,{},ps);out=out.concat(r.rows);if(r.rows.length<ps)break;offset+=ps;}
  }
  return {rows:out, total};
}

/* count-only probe used to confirm a table isn't mid-upload */
async function countTable(table){try{const r=await fetchPage(table,0,{Prefer:'count=exact'},1);const m=/\/(\d+)$/.exec(r.contentRange||'');return m?parseInt(m[1],10):null;}catch(e){return null;}}
/* Load one table, retrying if we catch it mid-upload (count unstable / rows != count). */
async function fetchTableVerified(table){
  const TRIES=4; let last=[];
  for(let t=0;t<TRIES;t++){
    const {rows,total}=await fetchTable(table);
    last=rows;
    const after=await countTable(table);
    if(total!=null && rows.length===total && after===total) return {rows, complete:true};
    await new Promise(r=>setTimeout(r, 400*(t+1)));
  }
  return {rows:last, complete:false};
}

/* ---------- Build cards ---------- */
function parseMatchup(s){
  const sep=String(s||'').includes(' @ ')?' @ ':(String(s||'').includes(' vs ')?' vs ':null);
  if(!sep)return {awayFull:'',homeFull:''};
  const [a,h]=s.split(sep).map(x=>x.split(',')[0].trim());
  return {awayFull:a,homeFull:h};
}
function lineupStatusOf(lineup){
  const blob=(lineup||[]).map(p=>String(p.status||'')).join(' ').toLowerCase();
  if(blob.includes('conf')) return 'Confirmed';
  if(blob.includes('proj')||blob.includes('expect')) return 'Projected';
  return 'Projected';
}
function buildCards(games,batters,starters,bullpen){
  const G=new Map();
  for(const r of games){
    const id=r['Matchup ID']; if(id==null) continue;
    const {awayFull,homeFull}=parseMatchup(r['Matchup']);
    const pf={};for(const sp of ['All','L','R']){const o={};for(const st of PF_STATS)o[st]=r[`PF ${sp} ${st}`];pf[sp]=o;}
    G.set(String(id),{id:String(id),matchup:r['Matchup'],matchupAb:`${abbrTeam(awayFull)} @ ${abbrTeam(homeFull)}`,
      awayFull,homeFull,away:abbrTeam(awayFull),home:abbrTeam(homeFull),
      gametime:fmtTime(r['Gametime']),spread:r['Spread'],total:r['Total'],homeSP:r['Home SP'],awaySP:r['Away SP'],
      stadium:r['Stadium'],dome:r['Dome'],wx:[r['Weather 1'],r['Weather 2'],r['Weather 3'],r['Weather 4']].filter(Boolean),pf,
      cnt:{Home:{L:r['Home LHB #'],R:r['Home RHB #'],S:r['Home SWH #'],bpL:r['Home BP L #'],bpR:r['Home BP R #']},
           Away:{L:r['Away LHB #'],R:r['Away RHB #'],S:r['Away SWH #'],bpL:r['Away BP L #'],bpR:r['Away BP R #']}}});
  }
  const BAT=new Map();
  for(const r of batters){
    const id=String(r['Matchup ID']),team=abbrTeam(r['Team']),player=r['Player']; if(!id||!team||!player)continue;
    const k=id+'|'+team; let arr=BAT.get(k); if(!arr){arr=new Map();BAT.set(k,arr);}
    let p=arr.get(player); if(!p){p={player,bats:r['Bats'],pos:num(r['Lineup Pos']),status:r['Lineup Status'],oppSP:r['Opposing SP'],variants:{}};arr.set(player,p);}
    p.variants[`${r['Time Period']}|${r['Stat Split']}`]=readCols(r,c=>c,SET_BAT);
  }
  const SP=new Map();
  for(const r of starters){
    const id=String(r['Matchup ID']),team=abbrTeam(r['Team']); if(!id||!team)continue;
    const k=id+'|'+team; let sp=SP.get(k); if(!sp){sp={name:r['SP Name'],throws:r['Throws'],variants:{}};SP.set(k,sp);}
    sp.variants[`${r['Time Period']}|${r['Stat Split']}`]=readCols(r,c=>c,SET_SP);
  }
  const BP=new Map();
  for(const r of bullpen){
    const id=String(r['Matchup ID']),team=abbrTeam(r['Team']); if(!id||!team)continue;
    const k=id+'|'+team; let bp=BP.get(k); if(!bp){bp={variants:{}};BP.set(k,bp);}
    bp.variants[`${r['Time Period']}|${r['Stat Split']}`]={
      L:readCols(r,c=>`L ${c}`,SET_BP),R:readCols(r,c=>`R ${c}`,SET_BP),Comb:readCols(r,c=>`Comb ${c}`,SET_BP)};
  }
  const cards=[];
  GMAP.clear();
  for(const game of G.values()){
    for(const side of ['away','home']){
      const isHome=side==='home';
      const team=isHome?game.home:game.away;
      const oppTeam=isHome?game.away:game.home;
      if(!team) continue;
      const lineupMap=BAT.get(game.id+'|'+team);
      const lineup=lineupMap?[...lineupMap.values()].sort((a,b)=>(a.pos==null?99:a.pos)-(b.pos==null?99:b.pos)):[];
      const ourSPraw=isHome?game.homeSP:game.awaySP, oppSPraw=isHome?game.awaySP:game.homeSP;
      const oppSP=SP.get(game.id+'|'+oppTeam)||null;
      const card={key:game.id+'|'+team,id:game.id,idNum:num(game.id)||0,team,teamFull:isHome?game.homeFull:game.awayFull,
        isHome,loc:isHome?'Home':'Away',oppLoc:isHome?'Away':'Home',game,oppTeam,
        lineup,status:lineupStatusOf(lineup),
        oppSP,oppBP:BP.get(game.id+'|'+oppTeam)||null,
        oppSPName:oppSP?oppSP.name:stripHand(oppSPraw),oppSPHand:oppSP?oppSP.throws:handOf(oppSPraw),
        ourSPName:stripHand(ourSPraw),ourSPHand:handOf(ourSPraw),
        lineCnt:game.cnt[isHome?'Home':'Away'], oppBpCnt:game.cnt[isHome?'Away':'Home'],
        _q:`${team} ${game.away} ${game.home} ${game.matchupAb} ${side} ${(lineup||[]).map(p=>p.player).join(' ')}`.toLowerCase()};
      cards.push(card); GMAP.set(card.key,card);
    }
  }
  cards.sort((a,b)=> a.idNum!==b.idNum ? a.idNum-b.idNum : (a.isHome===b.isHome?0:(a.isHome?1:-1)));
  return cards;
}

/* variant getter — builds the Stat Split string from window + location + handedness */
function splitKey(loc,h){ return !h ? loc : (loc==='All' ? h : loc+' '+h); }
function getVar(variants,loc,h){
  if(!variants) return null;
  const [period,locMode]=split.split('|');
  const actualLoc = locMode==='loc' ? loc : 'All';
  if(h) return variants[`${period}|${splitKey(actualLoc,h)}`] || variants[`${period}|${h}`] || null;  // handed: exact only
  return variants[`${period}|${actualLoc}`] || variants[`${period}|All`] || null;
}

/* ---------- Filters ---------- */
function uniq(getter){return [...new Set(CARDS.map(getter).filter(v=>v!=null&&v!==''))];}
function populateFilters(){
  const set=(sel,vals)=>{const el=document.querySelector(`select[data-filter="${sel}"]`);if(!el)return;const prev=el.value;el.innerHTML=sel==='side'?el.innerHTML:'<option value="">All</option>';if(sel!=='side')vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o);});if(prev)el.value=prev;};
  set('team',uniq(c=>c.team).sort());
  set('game',uniq(c=>c.game.matchupAb));
}
function applyFilters(){
  const s=filters.search.trim().toLowerCase();
  VIEW=CARDS.filter(c=>{
    if(s&&!c._q.includes(s))return false;
    if(filters.team&&c.team!==filters.team)return false;
    if(filters.game&&c.game.matchupAb!==filters.game)return false;
    if(filters.side&&c.loc!==filters.side)return false;
    return true;
  });
  rendered=0;els.grid.innerHTML='';els.grid.hidden=VIEW.length===0;els.count.textContent=VIEW.length.toLocaleString();
  if(VIEW.length===0){els.content.innerHTML='<div class="state"><h3>No matching teams</h3><p>Loosen a filter to see more.</p></div>';els.content.hidden=false;}
  else{els.content.hidden=true;fillViewport();}
  const active=['team','game','side'].filter(k=>filters[k]!=='').length;
  els.filterCount.hidden=active===0;els.filterCount.textContent=active;
}

/* ---------- Render ---------- */
function statTable(set,rows){
  const heads=set.map(([d])=>`<th>${esc(d)}</th>`).join('');
  const body=rows.map(([lbl,obj])=>{
    const tds=set.map(([,col,typ])=>`<td>${fmtType(typ,obj?obj[col]:null)}</td>`).join('');
    return `<tr><td>${esc(lbl)}</td>${tds}</tr>`;
  }).join('');
  return `<div class="mini-scroll"><table class="mini"><thead><tr><th></th>${heads}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function lineCountStr(c){const p=[];if(has(c.L))p.push(raw(c.L)+' LHB');if(has(c.R))p.push(raw(c.R)+' RHB');if(has(c.S)&&String(c.S)!=='0')p.push(raw(c.S)+' SWH');return p.join(' / ');}
function bpCountStr(c){const p=[];if(has(c.bpL))p.push(raw(c.bpL)+' LH');if(has(c.bpR))p.push(raw(c.bpR)+' RH');return p.join(' / ');}
function lineupTable(c){
  const heads=SET_BAT.map(([d])=>`<th>${esc(d)}</th>`).join('');
  const cells=o=>SET_BAT.map(([,col,typ])=>`<td>${fmtType(typ,o?o[col]:null)}</td>`).join('');
  let body='';
  c.lineup.forEach((p,i)=>{
    const O=getVar(p.variants,c.loc,''),L=getVar(p.variants,c.loc,'vL'),R=getVar(p.variants,c.loc,'vR');
    const lbl=`${p.pos!=null?p.pos:'–'} ${esc(p.player)}${p.bats?' ('+esc(p.bats)+')':''}`;
    body+=`<tr class="lp-row" data-idx="${i}"><td><span class="car-sm">▸</span> ${lbl}</td>${cells(O)}</tr>`;
    body+=`<tr class="lp-sub" data-idx="${i}" hidden><td>↳ vs LHP</td>${cells(L)}</tr>`;
    body+=`<tr class="lp-sub" data-idx="${i}" hidden><td>↳ vs RHP</td>${cells(R)}</tr>`;
  });
  return `<div class="mini-scroll"><table class="mini"><thead><tr><th></th>${heads}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function cardHTML(c){
  const sideTag=c.isHome?'<span class="tag home">Home</span>':'<span class="tag away">Away</span>';
  const edge=c.isHome?'var(--good)':'var(--away)';
  const statusCls=c.status==='Confirmed'?'conf':'proj';
  return `
  <div class="card" data-key="${esc(c.key)}" style="--edge-c:${edge}">
    <div class="c-head">
      <div class="c-main"><div class="c-name">${esc(c.teamFull||c.team)}</div>
        <div class="c-sub"><span class="tag">${esc(c.team)}</span> ${sideTag} <span>${esc(c.game.matchupAb)}${c.game.gametime?' · '+esc(c.game.gametime):''}</span></div></div>
    </div>
    <div class="mtl">Lineup vs SP <b>${esc(c.oppSPName||'—')}</b>${c.oppSPHand?' ('+esc(c.oppSPHand)+')':''}</div>
    <div class="odds">
      <div class="o"><div class="k">Spread</div><div class="v">${esc(c.game.spread||'–')}</div></div>
      <div class="o"><div class="k">Total</div><div class="v">${esc(c.game.total||'–')}</div></div>
      <div class="o"><div class="k">First pitch</div><div class="v">${esc(c.game.gametime||'–')}</div></div>
    </div>
    <div class="expand-row"><div class="status-line">Lineup: <span class="${statusCls}">${esc(c.status)}</span></div>
      <button class="exp-btn" type="button">Detail <span class="car">▾</span></button></div>
    <div class="detail"></div>
  </div>`;
}
function detailHTML(c){
  const [perRaw,locMode]=split.split('|');
  const perLbl=perRaw==='Full Season'?'Full season':'Last 30 days';
  const locLbl=locMode==='loc'?(c.loc==='Home'?'home games':'away games'):'all games';
  const splitNote=`${perLbl} · ${locLbl}`;
  // lineup (own) — each batter expands to vs LHP / vs RHP
  const lineCnt=lineCountStr(c.lineCnt||{});
  const lineupPanel=`<div class="panel"><div class="panel-h">Lineup${lineCnt?' — '+esc(lineCnt):''}</div>${c.lineup.length?lineupTable(c):'<div class="note-sm">No lineup for this split.</div>'}<div class="note-sm">${esc(splitNote)} · tap a batter for vs-LHP / vs-RHP.</div></div>`;
  // opposing starter — Overall / vs LHB / vs RHB all visible (uses opponent's home/away location)
  let spPanel;
  if(!c.oppSP){spPanel=`<div class="panel"><div class="panel-h">Opposing starter — ${esc(c.oppSPName||'—')}</div><div class="note-sm">No starter data for this split.</div></div>`;}
  else{
    const O=getVar(c.oppSP.variants,c.oppLoc,''),L=getVar(c.oppSP.variants,c.oppLoc,'vL'),R=getVar(c.oppSP.variants,c.oppLoc,'vR');
    spPanel=`<div class="panel"><div class="panel-h">Opposing starter — ${esc(c.oppSPName||'—')}${c.oppSPHand?' ('+esc(c.oppSPHand)+')':''}</div>${statTable(SET_SP,[['Overall',O],['vs LHB',L],['vs RHB',R]])}</div>`;
  }
  // opposing bullpen
  const bpVar=c.oppBP?getVar(c.oppBP.variants,c.oppLoc,''):null;
  const bpCnt=bpCountStr(c.oppBpCnt||{});
  const bpPanel=`<div class="panel"><div class="panel-h">Opposing bullpen${bpCnt?' — '+esc(bpCnt):''}</div>${bpVar?statTable(SET_BP,[['LH pen',bpVar.L],['RH pen',bpVar.R],['Combined',bpVar.Comb]]):'<div class="note-sm">No bullpen data for this split.</div>'}</div>`;
  // park factors
  const pf=c.game.pf;
  const pfPanel=`<div class="panel"><div class="panel-h">Park factors (rank)</div>${statTable(SET_PF,[['All',pf.All],['vL',pf.L],['vR',pf.R]])}
    <div class="note-sm">100 is league average; higher inflates, lower suppresses. Same for both teams in the game.</div></div>`;
  // environment
  const envPanel=`<div class="panel"><div class="panel-h">Environment</div>
    <div class="kv"><span class="k">Spread</span><span class="v">${esc(c.game.spread||'–')}</span>
      <span class="k">Total</span><span class="v">${esc(c.game.total||'–')}</span>
      <span class="k">First pitch</span><span class="v">${esc(c.game.gametime||'–')}</span>
      <span class="k">Stadium</span><span class="v">${esc(c.game.stadium||'–')}</span>
      <span class="k">Dome</span><span class="v">${esc(c.game.dome||'–')}</span></div>
    ${c.game.wx.length?`<div class="wx">${c.game.wx.map(w=>`<div>${esc(w)}</div>`).join('')}</div>`:''}</div>`;
  return lineupPanel+spPanel+bpPanel+pfPanel+envPanel;
}

function renderMore(){if(rendered>=VIEW.length)return;const slice=VIEW.slice(rendered,rendered+BATCH);els.grid.insertAdjacentHTML('beforeend',slice.map(cardHTML).join(''));rendered+=slice.length;}
function fillViewport(){let guard=0;do{renderMore();guard++;}while(rendered<VIEW.length&&els.sentinel.getBoundingClientRect().top<window.innerHeight+700&&guard<50);}
const io=new IntersectionObserver(e=>{if(e[0].isIntersecting)fillViewport();},{rootMargin:'700px'});io.observe(els.sentinel);

/* ---------- Events ---------- */
function refreshOpen(){document.querySelectorAll('.card.open').forEach(card=>{const c=GMAP.get(card.dataset.key);if(c)card.querySelector('.detail').innerHTML=detailHTML(c);});}
els.grid.addEventListener('click',e=>{
  const lp=e.target.closest('.lp-row');
  if(lp){const t=lp.closest('table');const i=lp.getAttribute('data-idx');t.querySelectorAll('.lp-sub[data-idx="'+i+'"]').forEach(r=>{r.hidden=!r.hidden;});lp.classList.toggle('open');return;}
  const card=e.target.closest('.card');if(!card)return;
  if(!e.target.closest('.exp-btn')&&!e.target.closest('.c-head'))return;
  const opening=!card.classList.contains('open');
  if(opening){const d=card.querySelector('.detail');const c=GMAP.get(card.dataset.key);if(c)d.innerHTML=detailHTML(c);}
  card.classList.toggle('open');
});
let searchTimer;
els.search.addEventListener('input',e=>{filters.search=e.target.value;clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,120);});
els.filterToggle.addEventListener('click',()=>{const open=els.filters.classList.toggle('open');els.filterToggle.setAttribute('aria-expanded',open);});
document.querySelectorAll('[data-filter]').forEach(el=>{const k=el.getAttribute('data-filter');el.addEventListener('input',()=>{filters[k]=el.value;applyFilters();});});
els.clearFilters.addEventListener('click',()=>{Object.keys(filters).forEach(k=>{if(k!=='search')filters[k]='';});document.querySelectorAll('[data-filter]').forEach(el=>{el.value='';});applyFilters();});
els.splitSel.addEventListener('change',e=>{split=e.target.value;refreshOpen();});

/* ---------- Cache ---------- */
async function cacheGet(key){if(location.protocol==='file:'||!('caches'in self))return null;try{const c=await caches.open('bbmatch-v2');const r=await c.match('/'+key);return r?await r.json():null;}catch(e){return null;}}
async function cacheSet(key,obj){if(location.protocol==='file:'||!('caches'in self))return;try{const c=await caches.open('bbmatch-v2');await c.put('/'+key,new Response(JSON.stringify(obj),{headers:{'Content-Type':'application/json'}}));}catch(e){}}

/* ---------- Boot ---------- */
function ingest(d){CARDS=buildCards(d.games,d.batters,d.starters,d.bullpen);populateFilters();applyFilters();}
function showEmpty(){els.grid.hidden=true;els.content.hidden=false;els.content.innerHTML='<div class="state"><h3>Nothing to show yet</h3><p>Check back closer to game time.</p></div>';}
async function boot(){
  els.loadpill.hidden=false;els.loadpill.textContent='Loading…';
  const cached=await cacheGet('all');
  const warm=cached&&cached.games;
  if(warm){ingest(cached);if((Date.now()-cached.t)<=CACHE_TTL){els.loadpill.hidden=true;return;}}
  try{
    const [g,b,s,bp]=await Promise.all([
      fetchTableVerified('BaseballMatchupsGame'),fetchTableVerified('BaseballMatchupsBatters'),
      fetchTableVerified('BaseballMatchupsStarters'),fetchTableVerified('BaseballMatchupsBullpen')]);
    const allComplete=g.complete&&b.complete&&s.complete&&bp.complete;   // every table caught in a stable state
    const d={t:Date.now(),games:g.rows,batters:b.rows,starters:s.rows,bullpen:bp.rows};
    if(allComplete||!warm) ingest(d);        // adopt if verified, or on a cold load show what we have
    els.loadpill.hidden=true;                // (!allComplete && warm) → keep the good cached view
    if(!CARDS.length){showEmpty();return;}
    if(allComplete) cacheSet('all',d);       // only cache when all four tables verified complete
  }catch(err){
    els.loadpill.hidden=true;
    if(!CARDS.length){els.content.innerHTML='<div class="state"><h3>Couldn’t load right now</h3><p>Please refresh in a moment.</p></div>';els.content.hidden=false;}
  }
}
boot();
</script>
