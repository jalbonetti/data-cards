<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Matchups — Card Layout</title>
<link rel="preconnect" href="https://hcwolbvmffkmjcxsumwn.supabase.co" crossorigin />
<style>
  .wrap{--brand:#b91c1c;--brand-dark:#991b1b;--page-bg:#eef0f2;--card:#fff;--ink:#15171a;--muted:#6b7280;--muted-2:#9aa1ab;--line:#e6e8eb;--line-2:#eef0f2;--radius:14px;--shadow:0 1px 2px rgba(16,18,22,.06),0 4px 14px rgba(16,18,22,.05);--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    max-width:1180px;margin:0 auto;padding:0 12px 48px;background:transparent;color:var(--ink);font-family:var(--font);-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;}
  .wrap,.wrap *,.wrap *::before,.wrap *::after{box-sizing:border-box;}
  .bar{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,var(--brand),var(--brand-dark));margin:0 -12px;padding:10px 12px;box-shadow:0 2px 10px rgba(0,0,0,.12);}
  .bar-top{display:flex;align-items:center;gap:8px;}
  .title{font-size:15px;font-weight:700;color:#fff;margin-right:auto;display:flex;align-items:baseline;gap:8px;}
  .title .count{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);background:rgba(255,255,255,.18);padding:2px 7px;border-radius:999px;}
  .field{background:#fff;border:none;border-radius:9px;font-family:var(--font);font-size:13px;color:var(--ink);padding:8px 10px;height:36px;}
  .field:focus{outline:2px solid rgba(255,255,255,.65);outline-offset:1px;}
  .search{flex:1 1 130px;min-width:0;}
  .icon-btn{height:36px;border:none;border-radius:9px;background:rgba(255,255,255,.16);color:#fff;font-size:13px;font-weight:600;padding:0 12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .icon-btn:hover{background:rgba(255,255,255,.26);}
  .badge-dot{background:#fff;color:var(--brand-dark);border-radius:999px;font-size:10px;min-width:16px;height:16px;padding:0 4px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;}
  .bar-row2{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;}
  .seg{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border-radius:9px;padding:0 10px;height:36px;}
  .seg label{font-size:11px;font-weight:700;color:rgba(255,255,255,.9);text-transform:uppercase;letter-spacing:.4px;}
  .seg select{background:transparent;border:none;color:#fff;font-weight:600;font-size:13px;height:34px;max-width:240px;}
  .seg select option{color:var(--ink);}
  .filters{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:12px;padding:14px;display:none;}
  .filters.open{display:block;}
  .filters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px 12px;}
  .fg{display:flex;flex-direction:column;gap:5px;}
  .fg>label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  .fg select{background:#fff;border:1px solid var(--line);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--ink);padding:8px 9px;height:36px;}
  .fg select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px rgba(185,28,28,.18);}
  .filters-foot{display:flex;justify-content:flex-end;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-2);}
  .clear-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer;}
  .clear-btn:hover{border-color:var(--brand);color:var(--brand-dark);}
  .grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px;}
  @media (min-width:680px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media (min-width:1020px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;font-variant-numeric:tabular-nums;content-visibility:auto;contain-intrinsic-size:auto 220px;}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--edge-c,var(--line));}
  .c-head{display:flex;align-items:flex-start;gap:10px;padding:13px 14px 0;cursor:pointer;}
  .c-main{flex:1;min-width:0;}
  .c-name{font-size:15px;font-weight:700;line-height:1.2;}
  .c-sub{margin-top:4px;font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .tag{font-weight:700;color:var(--ink);background:var(--line-2);border-radius:5px;padding:1px 5px;font-size:10.5px;letter-spacing:.3px;}
  .tag.home{background:#dcfce7;color:#15803d;} .tag.away{background:#e0e7ff;color:#3730a3;}
  .mtl{margin:10px 14px 0;font-size:12.5px;font-weight:600;}
  .mtl b{font-weight:800;} .mtl .op{color:var(--muted);}
  .odds{margin:11px 14px 0;display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line-2);border-radius:9px;overflow:hidden;}
  .odds .o{padding:7px 6px 6px;text-align:center;border-right:1px solid var(--line-2);}
  .odds .o:last-child{border-right:none;}
  .odds .o .k{font-size:8.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted-2);}
  .odds .o .v{font-size:13px;font-weight:700;margin-top:2px;}
  .expand-row{display:flex;align-items:center;justify-content:space-between;margin:11px 14px 13px;}
  .matchup-mini{font-size:11.5px;color:var(--muted);}
  .exp-btn{background:none;border:1px solid var(--line);color:var(--brand-dark);font-weight:700;font-size:12px;border-radius:8px;padding:6px 12px;cursor:pointer;display:inline-flex;gap:6px;align-items:center;}
  .exp-btn .car{transition:transform .15s ease;}
  @media (prefers-reduced-motion:reduce){.exp-btn .car{transition:none;}}
  .card.open .exp-btn .car{transform:rotate(180deg);}
  .detail{display:none;border-top:1px solid var(--line-2);background:#fbfbfc;padding:6px 14px 14px;}
  .card.open .detail{display:block;}
  .panel{margin-top:12px;}
  .panel-h{font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--brand-dark);margin:0 0 6px;}
  .mini-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table.mini{width:100%;border-collapse:collapse;font-size:11.5px;}
  table.mini th,table.mini td{padding:4px 6px;text-align:right;border-bottom:1px solid var(--line-2);white-space:nowrap;}
  table.mini th:first-child,table.mini td:first-child{text-align:left;color:var(--muted);font-weight:600;position:sticky;left:0;background:#fbfbfc;}
  table.mini thead th{color:var(--muted-2);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line);}
  table.mini td{font-weight:600;}
  .note-sm{font-size:10px;color:var(--muted-2);margin-top:5px;line-height:1.3;}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:3px 14px;font-size:11.5px;}
  .kv .k{color:var(--muted);} .kv .v{font-weight:600;text-align:right;}
  .wx{font-size:11px;color:var(--ink);display:flex;flex-direction:column;gap:2px;margin-top:6px;}
  .state{text-align:center;padding:60px 20px;color:var(--muted);}
  .state h3{color:var(--ink);margin:0 0 6px;font-size:16px;}
  .state code{background:#fff;border:1px solid var(--line);padding:1px 5px;border-radius:4px;}
  .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;margin:0 auto 14px;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){.spinner{animation-duration:1.6s;}}
  .sentinel{height:1px;}
  .loadpill{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:var(--brand-dark);color:#fff;font-size:12px;font-weight:700;padding:8px 14px;border-radius:999px;box-shadow:0 4px 14px rgba(0,0,0,.22);z-index:50;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <div class="bar-top">
        <div class="title">Matchups <span class="count" id="count">—</span></div>
      </div>
      <div class="bar-top" style="margin-top:8px;">
        <input class="field search" id="search" type="search" placeholder="Search team or player…" autocomplete="off" aria-label="Search" />
        <button class="icon-btn" id="filterToggle" aria-expanded="false">Filters <span class="badge-dot" id="filterCount" hidden>0</span></button>
      </div>
      <div class="bar-row2">
        <div class="seg"><label for="splitSel">Stats</label>
          <select id="splitSel">
            <option value="Full Season|All">Season · all games</option>
            <option value="Full Season|loc">Season · game location</option>
            <option value="Last 30 Days|All">Last 30 Days · all games</option>
            <option value="Last 30 Days|loc">Last 30 Days · game location</option>
          </select>
        </div>
      </div>
      <div class="hint" style="margin-top:7px;font-size:11px;font-weight:600;color:rgba(255,255,255,.85);">Cards are ordered by start time. Open one to see the lineup, starter, bullpen &amp; park factors — all in the selected split.</div>
    </div>

    <div class="filters" id="filters">
      <div class="filters-grid">
        <div class="fg"><label>Team</label><select data-filter="team"><option value="">All</option></select></div>
        <div class="fg"><label>Matchup</label><select data-filter="game"><option value="">All</option></select></div>
        <div class="fg"><label>Side</label><select data-filter="side"><option value="">All</option><option value="Away">Away</option><option value="Home">Home</option></select></div>
      </div>
      <div class="filters-foot"><button class="clear-btn" id="clearFilters">Clear all</button></div>
    </div>

    <div id="content"><div class="state"><div class="spinner"></div><p>Loading matchups…</p></div></div>
    <div class="grid" id="grid" hidden></div>
    <div class="sentinel" id="sentinel"></div>
    <div class="loadpill" id="loadpill" hidden></div>
  </div>

<script>
/* ============================================================
   CONFIG — joins four Supabase tables on Matchup ID:
   BaseballMatchupsGame / ...Batters / ...Starters / ...Bullpen
   ============================================================ */
const SUPABASE_URL = "https://hcwolbvmffkmjcxsumwn.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhjd29sYnZtZmZrbWpjeHN1bXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDAzNDQzMTIsImV4cCI6MjA1NTkyMDMxMn0.tM4RwXZpZM6ZHuFFMhWcKYLT3E4NA6Ig90CHw7QtJf0";
const CACHE_TTL = 3 * 60 * 1000;
const BATCH = 12;
const PAGE_SIZE = 1000;
const MAX_PARALLEL = 6;

const TEAM_NAME_MAP = {'Arizona Diamondbacks':'ARI','Atlanta Braves':'ATL','Baltimore Orioles':'BAL','Boston Red Sox':'BOS','Chicago Cubs':'CHC','Chicago White Sox':'CHW','Cincinnati Reds':'CIN','Cleveland Guardians':'CLE','Colorado Rockies':'COL','Detroit Tigers':'DET','Houston Astros':'HOU','Kansas City Royals':'KC','Los Angeles Angels':'LAA','Los Angeles Dodgers':'LAD','Miami Marlins':'MIA','Milwaukee Brewers':'MIL','Minnesota Twins':'MIN','New York Mets':'NYM','New York Yankees':'NYY','Athletics':'ATH','Philadelphia Phillies':'PHI','Pittsburgh Pirates':'PIT','San Diego Padres':'SD','San Francisco Giants':'SF','Seattle Mariners':'SEA','St. Louis Cardinals':'STL','Tampa Bay Rays':'TB','Texas Rangers':'TEX','Toronto Blue Jays':'TOR','Washington Nationals':'WSH'};

/* Stat-set definitions — [display, columnToken, formatType] */
const SET_BAT = [['G','Games','int'],['PA','PA','int'],['AB','AB','int'],['H','H','int'],['1B','1B','int'],['2B','2B','int'],['3B','3B','int'],['HR','HR','int'],['RBI','RBI','int'],['R','R','int'],['BB','BB','int'],['IBB','IBB','int'],['SO','SO','int'],['HBP','HBP','int'],['SB','SB','int'],['CS','CS','int'],['SF','SF','int'],['SH','SH','int'],['GDP','GDP','int'],['AVG','AVG','rate'],['OBP','OBP','rate'],['SLG','SLG','rate'],['H/PA','H/PA','rate']];
const SET_SP  = [['G','Games','int'],['IP','IP','ip'],['TBF','TBF','int'],['H','H','int'],['2B','2B','int'],['3B','3B','int'],['HR','HR','int'],['R','R','int'],['ER','ER','int'],['BB','BB','int'],['IBB','IBB','int'],['SO','SO','int'],['HBP','HBP','int'],['W','W','int'],['AVG','AVG','rate'],['OBP','OBP','rate'],['SLG','SLG','rate'],['ERA','ERA','era'],['H/TBF','H/TBF','rate']];
const SET_BP  = [['IP','IP','ip'],['TBF','TBF','int'],['H','H','int'],['HR','HR','int'],['R','R','int'],['ER','ER','int'],['BB','BB','int'],['SO','SO','int'],['H/TBF','H/TBF','rate']];
const PF_STATS = ['H','1B','2B','3B','HR','R','BB','SO'];
const SET_PF = PF_STATS.map(s=>[s,s,'park']);

/* ---------- State ---------- */
let CARDS = [], VIEW = [], rendered = 0;
const GMAP = new Map();
let split = 'Full Season|All';
const filters = {search:'',team:'',game:'',side:''};
const els = {content:document.getElementById('content'),grid:document.getElementById('grid'),count:document.getElementById('count'),search:document.getElementById('search'),filters:document.getElementById('filters'),filterToggle:document.getElementById('filterToggle'),filterCount:document.getElementById('filterCount'),clearFilters:document.getElementById('clearFilters'),splitSel:document.getElementById('splitSel'),sentinel:document.getElementById('sentinel'),loadpill:document.getElementById('loadpill')};

/* ---------- Helpers ---------- */
const num = v=>{const n=parseFloat(v);return isNaN(n)?null:n;};
const raw = v=>{if(v==null)return '–';const s=String(v).trim();return s===''?'–':s;};
const fmt2 = v=>{const n=parseFloat(v);return isNaN(n)?'–':n.toFixed(2);};
const fmtAvg3 = v=>{const n=parseFloat(v);if(isNaN(n))return '–';const sign=n<0?'-':'';const t=(Math.trunc(Math.abs(n)*1000)/1000).toFixed(3);return (sign+t).replace(/^(-?)0\./,'$1.');};
const fmtIP = v=>{if(v==null)return '–';const s=String(v).trim();if(s===''||s==='-')return '–';return s.includes('.')?s:s+'.0';};
const fmtPark = v=>{if(v==null)return '–';const s=String(v).trim();if(s===''||s==='-')return '–';return s.replace(/\((\d+)\)/g,' (#$1)');};
const fmtType = (t,v)=> t==='rate'?fmtAvg3(v) : t==='era'?fmt2(v) : t==='ip'?fmtIP(v) : t==='park'?fmtPark(v) : raw(v);
const esc = s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const abbrTeam = v=>{if(!v)return '';const s=String(v).trim();return TEAM_NAME_MAP[s]||s;};
function etTz(){const d=new Date(),y=d.getFullYear();const m1=new Date(y,2,1),n1=new Date(y,10,1);const dstStart=new Date(y,2,1+((7-m1.getDay())%7)+7);const dstEnd=new Date(y,10,1+((7-n1.getDay())%7));return (d>=dstStart&&d<dstEnd)?'EDT':'EST';}
const ET_TZ = etTz();
const fmtTime = v=>!v?'':String(v).replace(/\b(EST|EDT)\b/g,ET_TZ);
const stripHand = v=>String(v||'').replace(/\s*\([LRS]\)\s*$/i,'').trim();
const handOf = v=>{const m=String(v||'').match(/\(([LRS])\)\s*$/i);return m?m[1].toUpperCase():'';};
const readCols = (row,fn,set)=>{const o={};for(const t of set)o[t[1]]=row[fn(t[1])];return o;};

/* ---------- Data ---------- */
async function fetchPage(table,offset,extra,limit){const lim=limit||PAGE_SIZE;const url=`${SUPABASE_URL}/rest/v1/${table}?select=*`;const res=await fetch(url,{headers:{apikey:ANON_KEY,Authorization:"Bearer "+ANON_KEY,Accept:"application/json",'Range-Unit':'items',Range:`${offset}-${offset+lim-1}`,...extra}});if(!res.ok){const e=new Error(`Supabase ${res.status} on ${table}`);e.status=res.status;throw e;}return {rows:await res.json(),contentRange:res.headers.get('content-range')};}
async function fetchTable(table){
  const first=await fetchPage(table,0,{Prefer:'count=exact'},PAGE_SIZE);
  const ps=first.rows.length||PAGE_SIZE;
  const m=/\/(\d+)$/.exec(first.contentRange||'');
  const total=m?parseInt(m[1],10):(first.rows.length<PAGE_SIZE?first.rows.length:null);
  let out=first.rows.slice();
  if(ps===0||(total!=null&&out.length>=total)||(total==null&&first.rows.length<PAGE_SIZE))return out;
  if(total!=null){
    const offsets=[];for(let o=ps;o<total;o+=ps)offsets.push(o);
    const results=new Array(offsets.length);let i=0;
    await Promise.all(Array.from({length:Math.min(MAX_PARALLEL,offsets.length)},async()=>{while(i<offsets.length){const idx=i++;const r=await fetchPage(table,offsets[idx],{},ps);results[idx]=r.rows;}}));
    for(const r of results) out=out.concat(r);
  }else{
    let offset=ps;while(true){const r=await fetchPage(table,offset,{},ps);out=out.concat(r.rows);if(r.rows.length<ps)break;offset+=ps;}
  }
  return out;
}

/* ---------- Build cards ---------- */
function parseMatchup(s){
  const sep=String(s||'').includes(' @ ')?' @ ':(String(s||'').includes(' vs ')?' vs ':null);
  if(!sep)return {awayFull:'',homeFull:''};
  const [a,h]=s.split(sep).map(x=>x.split(',')[0].trim());
  return {awayFull:a,homeFull:h};
}
function buildCards(games,batters,starters,bullpen){
  // index game rows
  const G=new Map();
  for(const r of games){
    const id=r['Matchup ID']; if(id==null) continue;
    const {awayFull,homeFull}=parseMatchup(r['Matchup']);
    const pf={};
    for(const sp of ['All','L','R']){const o={};for(const st of PF_STATS)o[st]=r[`PF ${sp} ${st}`];pf[sp]=o;}
    G.set(String(id),{id:String(id),matchup:r['Matchup'],matchupAb:`${abbrTeam(awayFull)} @ ${abbrTeam(homeFull)}`,
      awayFull,homeFull,away:abbrTeam(awayFull),home:abbrTeam(homeFull),
      gametime:fmtTime(r['Gametime']),spread:r['Spread'],total:r['Total'],homeSP:r['Home SP'],awaySP:r['Away SP'],
      stadium:r['Stadium'],dome:r['Dome'],wx:[r['Weather 1'],r['Weather 2'],r['Weather 3'],r['Weather 4']].filter(Boolean),pf});
  }
  // batters -> by mid|team -> players with variants
  const BAT=new Map();
  for(const r of batters){
    const id=String(r['Matchup ID']),team=r['Team'],player=r['Player']; if(!id||!team||!player)continue;
    const k=id+'|'+team; let arr=BAT.get(k); if(!arr){arr=new Map();BAT.set(k,arr);}
    let p=arr.get(player); if(!p){p={player,bats:r['Bats'],pos:num(r['Lineup Pos']),oppSP:r['Opposing SP'],variants:{}};arr.set(player,p);}
    p.variants[`${r['Time Period']}|${r['Stat Split']}`]=readCols(r,c=>c,SET_BAT);
  }
  // starters -> by mid|team
  const SP=new Map();
  for(const r of starters){
    const id=String(r['Matchup ID']),team=r['Team']; if(!id||!team)continue;
    const k=id+'|'+team; let sp=SP.get(k); if(!sp){sp={name:r['SP Name'],throws:r['Throws'],opp:r['Opponent'],variants:{}};SP.set(k,sp);}
    sp.variants[`${r['Time Period']}|${r['Stat Split']}`]=readCols(r,c=>c,SET_SP);
  }
  // bullpen -> by mid|team
  const BP=new Map();
  for(const r of bullpen){
    const id=String(r['Matchup ID']),team=r['Team']; if(!id||!team)continue;
    const k=id+'|'+team; let bp=BP.get(k); if(!bp){bp={variants:{}};BP.set(k,bp);}
    bp.variants[`${r['Time Period']}|${r['Stat Split']}`]={
      L:readCols(r,c=>`L ${c}`,SET_BP),R:readCols(r,c=>`R ${c}`,SET_BP),Comb:readCols(r,c=>`Comb ${c}`,SET_BP)};
  }
  // assemble one card per team per game
  const cards=[];
  GMAP.clear();
  for(const game of G.values()){
    for(const side of ['away','home']){
      const team = side==='home'?game.home:game.away;
      if(!team) continue;
      const k=game.id+'|'+team;
      const lineupMap=BAT.get(k); const lineup=lineupMap?[...lineupMap.values()].sort((a,b)=>(a.pos==null?99:a.pos)-(b.pos==null?99:b.pos)):[];
      const sp=SP.get(k)||null;
      const ourSPraw = side==='home'?game.homeSP:game.awaySP;
      const oppSPraw = side==='home'?game.awaySP:game.homeSP;
      const card={key:k,id:game.id,idNum:num(game.id)||0,team,teamFull:side==='home'?game.homeFull:game.awayFull,
        isHome:side==='home',loc:side==='home'?'Home':'Away',game,lineup,sp,bullpen:BP.get(k)||null,
        spName:sp?sp.name:stripHand(ourSPraw),spHand:sp?sp.throws:handOf(ourSPraw),
        oppSPName:stripHand(oppSPraw),oppSPHand:handOf(oppSPraw),
        _q:`${team} ${game.away} ${game.home} ${game.matchupAb} ${side} ${(lineup||[]).map(p=>p.player).join(' ')}`.toLowerCase()};
      cards.push(card); GMAP.set(k,card);
    }
  }
  cards.sort((a,b)=> a.idNum!==b.idNum ? a.idNum-b.idNum : (a.isHome===b.isHome?0:(a.isHome?1:-1))); // by time, away then home
  return cards;
}

/* variant getter honoring the 4-split changer (loc -> the team's home/away) */
function getVar(variants,key,loc){if(!variants)return null;const [period,sp]=key.split('|');const real=sp==='loc'?loc:sp;return variants[`${period}|${real}`]||variants[`${period}|All`]||null;}

/* ---------- Filters ---------- */
function uniq(getter){return [...new Set(CARDS.map(getter).filter(v=>v!=null&&v!==''))];}
function populateFilters(){
  const set=(sel,vals)=>{const el=document.querySelector(`select[data-filter="${sel}"]`);if(!el)return;const prev=el.value;const keep=sel==='side'?el.innerHTML:'<option value="">All</option>';el.innerHTML=keep;if(sel!=='side')vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o);});if(prev)el.value=prev;};
  set('team',uniq(c=>c.team).sort());
  set('game',uniq(c=>c.game.matchupAb));
}
function applyFilters(){
  const s=filters.search.trim().toLowerCase();
  VIEW=CARDS.filter(c=>{
    if(s&&!c._q.includes(s))return false;
    if(filters.team&&c.team!==filters.team)return false;
    if(filters.game&&c.game.matchupAb!==filters.game)return false;
    if(filters.side&&c.loc!==filters.side)return false;
    return true;
  });
  rendered=0;els.grid.innerHTML='';els.grid.hidden=VIEW.length===0;els.count.textContent=VIEW.length.toLocaleString();
  if(VIEW.length===0){els.content.innerHTML='<div class="state"><h3>No matching teams</h3><p>Loosen a filter to see more.</p></div>';els.content.hidden=false;}
  else{els.content.hidden=true;fillViewport();}
  const active=['team','game','side'].filter(k=>filters[k]!=='').length;
  els.filterCount.hidden=active===0;els.filterCount.textContent=active;
}

/* ---------- Render ---------- */
function statTable(set,rows){
  const heads=set.map(([d])=>`<th>${esc(d)}</th>`).join('');
  const body=rows.map(([lbl,obj])=>{
    const tds=set.map(([,col,typ])=>`<td>${fmtType(typ,obj?obj[col]:null)}</td>`).join('');
    return `<tr><td>${esc(lbl)}</td>${tds}</tr>`;
  }).join('');
  return `<div class="mini-scroll"><table class="mini"><thead><tr><th></th>${heads}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function cardHTML(c){
  const sideTag=c.isHome?'<span class="tag home">Home</span>':'<span class="tag away">Away</span>';
  const edge=c.isHome?'var(--brand)':'#a5b4fc';
  const oppHand=c.oppSPHand?` (${esc(c.oppSPHand)})`:'';
  const ourHand=c.spHand?` (${esc(c.spHand)})`:'';
  return `
  <div class="card" data-key="${esc(c.key)}" style="--edge-c:${edge}">
    <div class="c-head">
      <div class="c-main"><div class="c-name">${esc(c.teamFull||c.team)}</div>
        <div class="c-sub"><span class="tag">${esc(c.team)}</span> ${sideTag} <span>${esc(c.game.matchupAb)}${c.game.gametime?' · '+esc(c.game.gametime):''}</span></div></div>
    </div>
    <div class="mtl">SP <b>${esc(c.spName||'—')}</b>${ourHand} <span class="op">&nbsp;·&nbsp; vs ${esc(c.oppSPName||'—')}${oppHand}</span></div>
    <div class="odds">
      <div class="o"><div class="k">Spread</div><div class="v">${esc(c.game.spread||'–')}</div></div>
      <div class="o"><div class="k">Total</div><div class="v">${esc(c.game.total||'–')}</div></div>
      <div class="o"><div class="k">First pitch</div><div class="v">${esc(c.game.gametime||'–')}</div></div>
    </div>
    <div class="expand-row"><div class="matchup-mini">${c.lineup.length} batters · lineup, SP, bullpen</div>
      <button class="exp-btn" type="button">Detail <span class="car">▾</span></button></div>
    <div class="detail"></div>
  </div>`;
}
function detailHTML(c){
  const [perRaw,spRaw]=split.split('|');
  const perLbl=perRaw==='Full Season'?'full season':'last 30 days';
  const splitLbl=(spRaw==='loc')?(' · '+c.loc.toLowerCase()):' · all games';
  // lineup
  const batRows=c.lineup.map(p=>{const v=getVar(p.variants,split,c.loc);const lbl=`${p.pos!=null?p.pos:'–'} ${p.player}${p.bats?' ('+p.bats+')':''}`;return [lbl,v];});
  const lineupPanel=`<div class="panel"><div class="panel-h">Lineup vs ${esc(c.oppSPName||'—')}${c.oppSPHand?' ('+esc(c.oppSPHand)+')':''} — ${perLbl}${splitLbl}</div>${batRows.length?statTable(SET_BAT,batRows):'<div class="note-sm">No lineup rows for this split.</div>'}</div>`;
  // starter
  const spVar=c.sp?getVar(c.sp.variants,split,c.loc):null;
  const spPanel=`<div class="panel"><div class="panel-h">Starting pitcher — ${esc(c.spName||'—')}${c.spHand?' ('+esc(c.spHand)+')':''}</div>${spVar?statTable(SET_SP,[[c.spHand==='L'?'LHP':(c.spHand==='R'?'RHP':'SP'),spVar]]):'<div class="note-sm">No starter data for this split.</div>'}</div>`;
  // bullpen
  const bpVar=c.bullpen?getVar(c.bullpen.variants,split,c.loc):null;
  const bpPanel=`<div class="panel"><div class="panel-h">Bullpen — ${perLbl}${splitLbl}</div>${bpVar?statTable(SET_BP,[['LH pen',bpVar.L],['RH pen',bpVar.R],['Combined',bpVar.Comb]]):'<div class="note-sm">No bullpen data for this split.</div>'}</div>`;
  // park factors (game-level)
  const pf=c.game.pf;
  const pfPanel=`<div class="panel"><div class="panel-h">Park factors (rank)</div>${statTable(SET_PF,[['All',pf.All],['vL',pf.L],['vR',pf.R]])}
    <div class="note-sm">League-average is 100; lower suppresses, higher inflates. Same for both teams in this game.</div></div>`;
  // environment
  const envPanel=`<div class="panel"><div class="panel-h">Environment</div>
    <div class="kv"><span class="k">Spread</span><span class="v">${esc(c.game.spread||'–')}</span>
      <span class="k">Total</span><span class="v">${esc(c.game.total||'–')}</span>
      <span class="k">First pitch</span><span class="v">${esc(c.game.gametime||'–')}</span>
      <span class="k">Stadium</span><span class="v">${esc(c.game.stadium||'–')}</span>
      <span class="k">Dome</span><span class="v">${esc(c.game.dome||'–')}</span></div>
    ${c.game.wx.length?`<div class="wx">${c.game.wx.map(w=>`<div>${esc(w)}</div>`).join('')}</div>`:''}</div>`;
  return lineupPanel+spPanel+bpPanel+pfPanel+envPanel;
}

function renderMore(){if(rendered>=VIEW.length)return;const slice=VIEW.slice(rendered,rendered+BATCH);els.grid.insertAdjacentHTML('beforeend',slice.map(cardHTML).join(''));rendered+=slice.length;}
function fillViewport(){let guard=0;do{renderMore();guard++;}while(rendered<VIEW.length&&els.sentinel.getBoundingClientRect().top<window.innerHeight+700&&guard<50);}
const io=new IntersectionObserver(e=>{if(e[0].isIntersecting)fillViewport();},{rootMargin:'700px'});io.observe(els.sentinel);

/* ---------- Events ---------- */
els.grid.addEventListener('click',e=>{
  const card=e.target.closest('.card');if(!card)return;
  if(!e.target.closest('.exp-btn')&&!e.target.closest('.c-head'))return;
  const opening=!card.classList.contains('open');
  if(opening){const d=card.querySelector('.detail');const c=GMAP.get(card.dataset.key);if(c)d.innerHTML=detailHTML(c);}
  card.classList.toggle('open');
});
let searchTimer;
els.search.addEventListener('input',e=>{filters.search=e.target.value;clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,120);});
els.filterToggle.addEventListener('click',()=>{const open=els.filters.classList.toggle('open');els.filterToggle.setAttribute('aria-expanded',open);});
document.querySelectorAll('[data-filter]').forEach(el=>{const k=el.getAttribute('data-filter');el.addEventListener('input',()=>{filters[k]=el.value;applyFilters();});});
els.clearFilters.addEventListener('click',()=>{Object.keys(filters).forEach(k=>{if(k!=='search')filters[k]='';});document.querySelectorAll('[data-filter]').forEach(el=>{el.value='';});applyFilters();});
els.splitSel.addEventListener('change',e=>{split=e.target.value;document.querySelectorAll('.card.open').forEach(card=>{const c=GMAP.get(card.dataset.key);if(c)card.querySelector('.detail').innerHTML=detailHTML(c);});});

/* ---------- Cache ---------- */
async function cacheGet(key){if(location.protocol==='file:'||!('caches'in self))return null;try{const c=await caches.open('bbmatch-v1');const r=await c.match('/'+key);return r?await r.json():null;}catch(e){return null;}}
async function cacheSet(key,obj){if(location.protocol==='file:'||!('caches'in self))return;try{const c=await caches.open('bbmatch-v1');await c.put('/'+key,new Response(JSON.stringify(obj),{headers:{'Content-Type':'application/json'}}));}catch(e){}}

/* ---------- Boot ---------- */
function ingest(d){CARDS=buildCards(d.games,d.batters,d.starters,d.bullpen);populateFilters();applyFilters();}
async function boot(){
  els.loadpill.hidden=false;els.loadpill.textContent='Loading matchups…';
  const cached=await cacheGet('all');
  if(cached&&cached.games){ingest(cached);if((Date.now()-cached.t)<=CACHE_TTL){els.loadpill.hidden=true;return;}}
  try{
    const [games,batters,starters,bullpen]=await Promise.all([
      fetchTable('BaseballMatchupsGame'),fetchTable('BaseballMatchupsBatters'),
      fetchTable('BaseballMatchupsStarters'),fetchTable('BaseballMatchupsBullpen')]);
    const d={t:Date.now(),games,batters,starters,bullpen};
    ingest(d); els.loadpill.hidden=true;
    if(!CARDS.length){
      els.grid.hidden=true;els.content.hidden=false;
      els.content.innerHTML=`<div class="state"><h3>No matchups</h3><p>The game query returned ${games.length} rows but produced no cards. If games should be present, check RLS on <code>BaseballMatchupsGame</code>.</p></div>`;
      return;
    }
    console.log(`[load] matchups: ${games.length} games, ${batters.length} batter rows, ${starters.length} SP rows, ${bullpen.length} bullpen rows -> ${CARDS.length} cards`);
    cacheSet('all',d);
  }catch(err){
    els.loadpill.hidden=true;
    if(!CARDS.length){els.content.innerHTML=`<div class="state"><h3>Couldn't load data</h3><p>${esc(err.message)}</p></div>`;els.content.hidden=false;}
  }
}
boot();
</script>
</body>
</html>
