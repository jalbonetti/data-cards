const oddsInt = v=>{if(v==null||v===''||v==='-')return null;const n=parseInt(String(v).replace('+',''),10);return isNaN(n)?null:n;};
const fmtOdds = n=>n==null?'–':(n>0?'+'+n:''+n);

const fmtRate = v=>{if(v==null)return '–';const s=String(v).trim();if(s==='')return '–';return s.replace(/^(-?)0\.(?=\d)/,'$1.');};
const esc = s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const CODE_ALIAS={SD:'SDP',SF:'SFG',TB:'TBR',WSH:'WSN',KC:'KCR',CWS:'CHW'};

function etTz(){const d=new Date(),y=d.getFullYear();const m1=new Date(y,2,1),n1=new Date(y,10,1);const dstStart=new Date(y,2,1+((7-m1.getDay())%7)+7);const dstEnd=new Date(y,10,1+((7-n1.getDay())%7));return (d>=dstStart&&d<dstEnd)?'EDT':'EST';}
const ET_TZ = etTz();

const fmtPark = v=>!v?'–':String(v).replace(/\((\d+)\)/g,' (#$1)');

/* ---------- Data ---------- */
function buildQuery(lean){const select=lean?[...new Set(Object.values(F))].map(c=>`"${c}"`).join(','):'*';return `${SUPABASE_URL}/rest/v1/${TABLE}?select=${encodeURIComponent(select)}`;}
async function fetchPage(url,offset,extra,limit){const lim=limit||PAGE_SIZE;const res=await fetch(url,{headers:{apikey:ANON_KEY,Authorization:"Bearer "+ANON_KEY,Accept:"application/json",'Range-Unit':'items',Range:`${offset}-${offset+lim-1}`,...extra}});if(!res.ok){const e=new Error(`Supabase ${res.status}`);e.status=res.status;throw e;}return {rows:await res.json(),contentRange:res.headers.get('content-range')};}
/* count-only probe (no rows) used to confirm the table isn't mid-upload */
let _lastTotal=null,_lastUrl='';
async function countOnly(url){try{const res=await fetch(url,{headers:{apikey:ANON_KEY,Authorization:"Bearer "+ANON_KEY,Accept:"application/json",'Range-Unit':'items',Range:'0-0',Prefer:'count=exact'}});const m=/\/(\d+)$/.exec(res.headers.get('content-range')||'');return m?parseInt(m[1],10):null;}catch(e){return null;}}
async function fetchAll(cb){
  let url=buildQuery(false), first;
  try{first=await fetchPage(url,0,{Prefer:'count=exact'},PAGE_SIZE);}
  catch(err){if(err.status===400||err.status===404){url=buildQuery(false);first=await fetchPage(url,0,{Prefer:'count=exact'},PAGE_SIZE);}else throw err;}
  const ps=first.rows.length||PAGE_SIZE;                       // real page size the server allows (cap-proof)
  const m=/\/(\d+)$/.exec(first.contentRange||'');
  const total=m?parseInt(m[1],10):(first.rows.length<PAGE_SIZE?first.rows.length:null);
  _lastTotal=total; _lastUrl=url;
  let out=first.rows.slice();
  if(cb)cb(out,total,true,out.length);                         // paint first page immediately
  if(ps===0||(total!=null&&out.length>=total)||(total==null&&first.rows.length<PAGE_SIZE))return out;
  if(total!=null){
    const offsets=[];for(let o=ps;o<total;o+=ps)offsets.push(o);
    const results=new Array(offsets.length);let i=0,loaded=out.length;
    await Promise.all(Array.from({length:Math.min(MAX_PARALLEL,offsets.length)},async()=>{while(i<offsets.length){const idx=i++;const r=await fetchPage(url,offsets[idx],{},ps);results[idx]=r.rows;loaded+=r.rows.length;if(cb)cb(null,total,false,loaded);}}));
    for(const r of results) out=out.concat(r);
  }else{
    let offset=ps;while(true){const r=await fetchPage(url,offset,{},ps);out=out.concat(r.rows);if(cb)cb(null,null,false,out.length);if(r.rows.length<ps)break;offset+=ps;}
  }
  return out;
}

/* Load the full table, retrying if we catch it mid-upload — see batterClearances. */
async function fetchVerified(cb){
  const TRIES=4; let last=[];
  for(let t=0;t<TRIES;t++){
    const rows=await fetchAll(t===0?cb:null);
    last=rows;
    const total=_lastTotal;
    const after=await countOnly(_lastUrl);
    if(total!=null && rows.length===total && after===total) return {rows, complete:true};
    await new Promise(r=>setTimeout(r, 400*(t+1)));   // caught mid-upload — back off and retry
  }
  return {rows:last, complete:false};
}

/* ---------- Grouping ---------- */
function buildGroups(rows){
  const map=new Map();
  const r0=rows[0]||{};
  const K={
    lL:findKey(r0,'Lineup L Ratio','Lineup L Rate'),
    lLt:findKey(r0,'Lineup L Total','Lineup L Tot'),
    lR:findKey(r0,'Lineup R Ratio','Lineup R Rate'),
    lRt:findKey(r0,'Lineup R Total','Lineup R Tot'),
    lC:findKey(r0,'Lineup Combined Ratio','Lineup Combined Rate'),
    lCt:findKey(r0,'Lineup Combined Total','Lineup Combined Tot'),
    nLHB:findKey(r0,'Lineup LHB #','LHB','Lineup L #'),
    nRHB:findKey(r0,'Lineup RHB #','RHB','Lineup R #'),
  };
  for(const row of rows){
    const player=row[F.player];if(!player)continue;
    const prop=row[F.prop],line=row[F.line],key=`${player}|${prop}|${line}`;
    let g=map.get(key);
    if(!g){
      g={key,player,team:row[F.team],throws:row[F.throws],prop,line:num(line),oppLineupStatus:row[F.oppLineupStatus],oppLineupSplit:row[F.oppLineupSplit],
        matchup:row[F.matchup],spread:row[F.spread],total:row[F.total],park:row[F.park],stadium:row[F.stadium],dome:row[F.dome],
        nLHB:K.nLHB?row[K.nLHB]:null,nRHB:K.nRHB?row[K.nRHB]:null,
        medOver:oddsInt(row[F.medOver]),medUnder:oddsInt(row[F.medUnder]),
        bestOver:oddsInt(row[F.bestOver]),bestOverBk:row[F.bestOverBk],bestUnder:oddsInt(row[F.bestUnder]),bestUnderBk:row[F.bestUnderBk],
        wx:[row[F.wx1],row[F.wx2],row[F.wx3],row[F.wx4]].filter(Boolean),variants:{},
        _q:String(player).toLowerCase(),_matchupAb:abbrMatchup(row[F.matchup])};
      map.set(key,g);
    }
    const vk=`${row[F.period]}|${row[F.split]}`;const gm=String(row[F.games]||'').split('/');
    g.variants[vk]={clr:num(String(row[F.clearance]||'').replace('%','')),gCleared:gm[0]?parseInt(gm[0],10):null,gTotal:gm[1]?parseInt(gm[1],10):null,
      lineLTotal:K.lLt?row[K.lLt]:null,lineL:K.lL?row[K.lL]:null,lineRTotal:K.lRt?row[K.lRt]:null,lineR:K.lR?row[K.lR]:null,lineCTotal:K.lCt?row[K.lCt]:null,lineC:K.lC?row[K.lC]:null,
      prod:{tot:row[F.spTotal],avg:row[F.spAvg],hi:row[F.spHigh],ratio:row[F.spRatio],
        Ltot:row[F.spLTotal],Lavg:row[F.spLAvg],Lhi:row[F.spLHigh],Lratio:row[F.spLRatio],
        Rtot:row[F.spRTotal],Ravg:row[F.spRAvg],Rhi:row[F.spRHigh],Rratio:row[F.spRRatio]}};
  }
  const arr=[...map.values()];
  GMAP.clear();
  for(const g of arr){
    const ks=Object.keys(g.variants);
    g.location=ks.some(k=>k.endsWith('|Home'))?'Home':(ks.some(k=>k.endsWith('|Away'))?'Away':null);
    g._season=g.variants['Full Season|All']||Object.values(g.variants)[0]||null;
    GMAP.set(g.key,g);
  }
  return arr;
}

function cellVar(g,period,sp){if(sp==='loc'){if(!g.location)return null;return g.variants[`${period}|${g.location}`]||null;}return g.variants[`${period}|${sp}`]||null;}
function clrVar(g,key){const [period,sp]=key.slice(4).split('|');return cellVar(g,period,sp);}
function activeVar(g){const [period,sp]=sortMode.slice(4).split('|');return cellVar(g,period,sp)||variantFor(g,period,'All')||g._season;}

  if(!container) return;

  const btn=document.createElement('button'); btn.type='button'; btn.className='ms-btn'; btn.setAttribute('aria-expanded','false'); btn.textContent='All';
  const pop=document.createElement('div'); pop.className='ms-pop'; pop.hidden=true;

function applySort(){
  recomputeProd();
  const dir=sortDir==='asc'?1:-1;
  const cv=g=>clrVar(g,sortMode);
  SORTED=GROUPS.slice().sort((a,b)=>{
    const va=cv(a),vb=cv(b);
    const pa=va?va.clr:null,pb=vb?vb.clr:null;
    if(pa==null&&pb==null) return a._q<b._q?-1:a._q>b._q?1:0;
    if(pa==null) return 1; if(pb==null) return -1;
    if(pa!==pb) return (pa-pb)*dir;                                  // 1) clearance %
    const na=(va&&va.gCleared!=null)?va.gCleared:-1, nb=(vb&&vb.gCleared!=null)?vb.gCleared:-1;
    if(na!==nb) return nb-na;                                        // 2) tie -> more games cleared first
    return a._q<b._q?-1:a._q>b._q?1:0;                               // 3) still tied -> name A->Z
  });
  applyFilters();
}
function applyFilters(){
  const s=filters.search.trim().toLowerCase();
  const gMin=filters.gMin!==''?parseInt(filters.gMin,10):null;
  const cMin=filters.clrMin!==''?parseFloat(filters.clrMin):null;
  const boMin=filters.boMin!==''?parseInt(filters.boMin,10):null,boMax=filters.boMax!==''?parseInt(filters.boMax,10):null;
  const buMin=filters.buMin!==''?parseInt(filters.buMin,10):null,buMax=filters.buMax!==''?parseInt(filters.buMax,10):null;
  const moMin=filters.medMin!==''?parseInt(filters.medMin,10):null,moMax=filters.medMax!==''?parseInt(filters.medMax,10):null;
  const activeClr=g=>{const v=sortMode.startsWith('clr:')?clrVar(g,sortMode):cellVar(g,'Full Season','All');return v?v.clr:null;};
  VIEW=SORTED.filter(g=>{
    if(s&&!g._q.includes(s))return false;
    if(filters.team.has(g.team))return false;
    if(filters.prop.has(g.prop))return false;
    if(filters.line.has(String(g.line)))return false;
    if(filters.throws.has(g.throws))return false;
    if(gMin!=null){const sv=cellVar(g,'Full Season','All');if(!sv||sv.gTotal==null||sv.gTotal<gMin)return false;}
    if(cMin!=null){const c=activeClr(g);if(c==null||c<cMin)return false;}
    if(boMin!=null&&(g.bestOver==null||g.bestOver<boMin))return false;
    if(boMax!=null&&(g.bestOver==null||g.bestOver>boMax))return false;
    if(buMin!=null&&(g.bestUnder==null||g.bestUnder<buMin))return false;
    if(buMax!=null&&(g.bestUnder==null||g.bestUnder>buMax))return false;
    if(moMin!=null&&(g.medOver==null||g.medOver<moMin))return false;
    if(moMax!=null&&(g.medOver==null||g.medOver>moMax))return false;
    return true;
  });
  rendered=0;els.grid.innerHTML='';els.grid.hidden=VIEW.length===0;els.count.textContent=VIEW.length.toLocaleString();
  if(VIEW.length===0){els.content.innerHTML='<div class="state"><h3>No matching props</h3><p>Loosen a filter to see more.</p></div>';els.content.hidden=false;}
  else{els.content.hidden=true;fillViewport();}
  const active=(filters.team.size?1:0)+(filters.prop.size?1:0)+(filters.line.size?1:0)+(filters.throws.size?1:0)+['clrMin','boMin','boMax','buMin','buMax','medMin','medMax'].filter(k=>filters[k]!=='').length+(filters.gMin!==''&&filters.gMin!=='0'?1:0);
  els.filterCount.hidden=active===0;els.filterCount.textContent=active;
}

      <div class="kv"><span class="k">Spread</span><span class="v">${esc(g.spread||'–')}</span>
        <span class="k">Total</span><span class="v">${esc(g.total||'–')}</span>
        <span class="k">Park factor (rank)</span><span class="v">${esc(fmtPark(g.park))}</span>
        <span class="k">Stadium</span><span class="v">${esc(g.stadium||'–')}</span>
        <span class="k">Dome</span><span class="v">${esc(g.dome||'–')}</span></div>
      ${g.wx.length?`<div class="wx">${g.wx.map(w=>`<div>${esc(capWx(w))}</div>`).join('')}</div>`:''}
    </div>`;
}

function renderMore(){if(rendered>=VIEW.length)return;const slice=VIEW.slice(rendered,rendered+BATCH);els.grid.insertAdjacentHTML('beforeend',slice.map(cardHTML).join(''));rendered+=slice.length;}
function fillViewport(){let guard=0;do{renderMore();guard++;}while(rendered<VIEW.length&&els.sentinel.getBoundingClientRect().top<window.innerHeight+700&&guard<50);}
const io=new IntersectionObserver(e=>{if(e[0].isIntersecting)fillViewport();},{rootMargin:'700px'});io.observe(els.sentinel);

/* ---------- Events ---------- */
function setSort(mode){sortMode=mode;sortDir=(mode==='name')?'asc':'desc';if(els.sortSel.value!==mode)els.sortSel.value=mode;els.sortDir.textContent=sortDir==='asc'?'▲':'▼';applySort();}
els.grid.addEventListener('click',e=>{
  const cell=e.target.closest('.cell[data-sortkey]');
  if(cell){setSort(cell.dataset.sortkey);window.scrollTo({top:0,behavior:'smooth'});return;}
  if(e.target.closest('a'))return;
  const card=e.target.closest('.card');if(!card)return;
  if(!e.target.closest('.exp-btn')&&!e.target.closest('.c-head'))return;
  const opening=!card.classList.contains('open');
  if(opening){const d=card.querySelector('.detail');if(!d.firstChild){const g=GMAP.get(card.dataset.key);if(g)d.innerHTML=detailHTML(g);}}
  card.classList.toggle('open');
});
let searchTimer;
els.search.addEventListener('input',e=>{filters.search=e.target.value;clearTimeout(searchTimer);searchTimer=setTimeout(()=>{saveFilters();applyFilters();},120);});
els.filterToggle.addEventListener('click',()=>{const open=els.filters.classList.toggle('open');els.filterToggle.setAttribute('aria-expanded',open);});
document.querySelectorAll('input[data-filter]').forEach(el=>{const k=el.getAttribute('data-filter');el.addEventListener('input',()=>{filters[k]=el.value;saveFilters();applyFilters();});});
els.clearFilters.addEventListener('click',()=>{const sv=filters.search;filters=newFilters();filters.search=sv;document.querySelectorAll('input[data-filter]').forEach(el=>{el.value=el.getAttribute('data-filter')==='gMin'?'0':'';});Object.values(MS).forEach(c=>c.setOptions(c.options));saveFilters();applyFilters();});
els.sortSel.addEventListener('change',e=>setSort(e.target.value));
els.sortDir.addEventListener('click',()=>{sortDir=sortDir==='asc'?'desc':'asc';els.sortDir.textContent=sortDir==='asc'?'▲':'▼';applySort();});

/* ---------- Cache (Cache API) ---------- */
async function cacheGet(key){if(location.protocol==='file:'||!('caches'in self))return null;try{const c=await caches.open('bbclear-v4');const r=await c.match('/'+key);return r?await r.json():null;}catch(e){return null;}}
async function cacheSet(key,obj){if(location.protocol==='file:'||!('caches'in self))return;try{const c=await caches.open('bbclear-v4');await c.put('/'+key,new Response(JSON.stringify(obj),{headers:{'Content-Type':'application/json'}}));}catch(e){}}

/* ---------- Boot (stream the full table; cache; stale-while-revalidate) ---------- */
function fmtN(n){return n>=1000?(((n/1000).toFixed(n>=10000?0:1)).replace(/\.0$/,''))+'k':String(n);}
function setProg(loaded,total){if(!els.loadpill)return;els.loadpill.hidden=false;els.loadpill.textContent='Loading…';}
function setProgDone(){if(els.loadpill)els.loadpill.hidden=true;}
function ingest(rows){GROUPS=buildGroups(rows);populateFilters();applySort();}
async function boot(){
  const cacheKey=TABLE;
  const cached=await cacheGet(cacheKey);
  const warm=cached&&Array.isArray(cached.rows)&&cached.rows.length;
  if(warm){ingest(cached.rows);if((Date.now()-cached.t)<=CACHE_TTL)return;}
  try{
    const cb=(firstRows,total,isFirst,loaded)=>{
      if(!warm&&isFirst&&firstRows&&firstRows.length) ingest(firstRows);
      setProg(loaded,total);
    };
    const {rows,complete}=await fetchVerified(warm?null:cb);
    setProgDone();
    if(complete) ingest(rows);
    else if(!warm) ingest(rows);
    if(!GROUPS.length){
      els.grid.hidden=true;els.content.hidden=false;
      els.content.innerHTML=`<div class="state"><h3>Nothing to show yet</h3><p>Check back closer to game time.</p></div>`;
      return;
    }
    if(complete&&rows.length) cacheSet(cacheKey,{t:Date.now(),rows});
  }
  catch(err){setProgDone();if(!GROUPS.length){els.content.innerHTML=`<div class="state"><h3>Couldn't load right now</h3><p>Please refresh in a moment.</p></div>`;els.content.hidden=false;}}
}
boot();
</script>
